            <div class="panel-header"><div><h2 class="panel-title">Nodos de verificación</h2><div class="panel-subtitle">Confirmaciones, pendientes y brechas detectadas por el diagnóstico.</div></div></div>
            <div class="panel-body endpoint-grid">${this.moodleProbeNodes(probe)}</div>
          </section>`;
      },

      moodleProbeResult(probe) {
        if (!probe) return VisionComponents.empty('Ejecute un diagnóstico o cargue el último diagnóstico disponible.');
        const tone = /CRITIC|ERROR|BAJO|NO_ENCONTRADO/i.test((probe.estado_general || '') + ' ' + (probe.prioridad || '')) ? 'danger' : /RIESGO|MEDIA|PENDIENTE|OBSERV/i.test((probe.estado_general || '') + ' ' + (probe.prioridad || '')) ? 'warn' : 'ok';
        return `
          <div class="inspector-hero ${tone}">
            <div class="inspector-hero-title">${VisionUtils.esc(probe.sigla_curso || 'Sin sigla')} · ${VisionUtils.esc(probe.estado_general || 'Sin estado')}</div>
            <div class="inspector-hero-subtitle">${VisionUtils.esc(probe.observacion || probe.resumen_evidencia || 'Sin observación disponible.')}</div>
            <div class="class-badges" style="margin-top:10px;">
              ${VisionComponents.badge('Puntaje ' + (probe.puntaje || '—'), 'info')}
              ${VisionComponents.badge(probe.prioridad || 'Sin prioridad', tone)}
            </div>
          </div>
          <div class="inspector-action-box" style="margin-top:10px;">
            <div class="inspector-action-title">Acción recomendada</div>
            <div class="inspector-action-text">${VisionUtils.esc(probe.accion_recomendada || 'Sin acción recomendada registrada.')}</div>
          </div>`;
      },

      moodleProbeNodes(probe) {
        if (!probe) return VisionComponents.empty('Sin nodos disponibles.');
        const nodes = this.extractMoodleNodes(probe);
        if (!nodes.length) return VisionComponents.empty('El diagnóstico no entregó nodos desagregados.');
        return nodes.map(n => `
          <div class="endpoint-row">
            <div class="endpoint-action">${VisionUtils.esc(n.name)}</div>
            <div>${VisionComponents.badge(n.status || '—', VisionUtils.badgeClass(n.status))}</div>
            <div class="endpoint-detail">${VisionUtils.esc(n.detail || '')}</div>
            <div class="endpoint-latency">${VisionUtils.esc(n.weight || '')}</div>
          </div>`).join('');
      },
      moodlePhaseBoard(probe) {
        if (!probe) return VisionComponents.empty('Ejecute un diagnóstico para ver a Visión revisando cada fase.');
        const phases = this.moodlePhases(probe);
        return `<div class="moodle-phase-board">${phases.map(phase => this.moodlePhaseCard(phase)).join('')}</div>`;
      },

      moodlePhaseCard(phase) {
        const tone = this.moodlePhaseTone(phase.items.map(x => x.status).join(' '));
        const icon = tone === 'ok' ? '✓' : tone === 'danger' ? '!' : tone === 'warn' ? '◷' : '•';
        return `
          <article class="moodle-phase-card ${tone}">
            <div class="moodle-phase-head">
              <div class="moodle-phase-icon">${icon}</div>
              <div>
                <div class="moodle-phase-title">${VisionUtils.esc(phase.title)}</div>
                <div class="moodle-phase-subtitle">${VisionUtils.esc(phase.subtitle)}</div>
              </div>
            </div>
            <div class="moodle-phase-items">
              ${phase.items.map(item => this.moodlePhaseItem(item)).join('')}
            </div>
          </article>`;
      },

      moodlePhaseItem(item) {
        const tone = this.moodlePhaseTone(item.status);
        const icon = tone === 'ok' ? '✓' : tone === 'danger' ? '!' : tone === 'warn' ? '◷' : '•';
        return `
          <div class="moodle-phase-item">
            <span class="moodle-check ${tone}">${icon}</span>
            <span class="moodle-phase-label">${VisionUtils.esc(item.label)}</span>
            <span class="moodle-phase-status">${VisionUtils.esc(item.status || '—')}</span>
          </div>`;
      },

      moodlePhaseTone(status) {
        const raw = String(status || '').toUpperCase();
        if (/ERROR|NO_ENCONTRADO|FALTA|CRITIC|BAJO/.test(raw)) return 'danger';
        if (/OBSERV|PENDIENTE|VALIDAR|RIESGO|MEDIA/.test(raw)) return 'warn';
        if (/OK|CONFIRMADO|ENCONTRADO|CORRECTO/.test(raw)) return 'ok';
        return 'info';
      },

      moodlePhases(probe) {
        const node = (key, label) => ({ label, status: this.moodleNodeStatus(probe, key) });
        return [
          {
            title: 'Fase 1 · Fuente operativa',
            subtitle: 'Visión cruza la sigla con CURSOS.',
            items: [
              node('nodo_cursos', 'Curso existe en CURSOS'),
              node('nodo_regla_perfil_cohorte', 'Regla perfil/cohorte'),
              { label: 'Sigla diagnosticada', status: probe.sigla_curso ? 'OK' : 'FALTA_VALIDAR' }
            ]
          },
          {
            title: 'Fase 2 · Curso Moodle',
            subtitle: 'Visión valida el curso esperado.',
            items: [
              node('nodo_moodle_curso', 'Curso Moodle'),
              { label: 'Shortname esperado', status: probe.shortname_moodle_esperado || probe.course_fullname ? 'OK' : 'FALTA_VALIDAR' },
              { label: 'Course ID', status: probe.course_id ? 'OK' : 'FALTA_VALIDAR' }
            ]
          },
          {
            title: 'Fase 3 · Cohorte y grupo',
            subtitle: 'Visión revisa sincronización académica.',
            items: [
              node('nodo_cohorte', 'Cohorte'),
              node('nodo_grupo', 'Grupo'),
              { label: 'Campo perfil esperado', status: probe.profile_field_esperado ? 'OK' : 'FALTA_VALIDAR' }
            ]
          },
          {
            title: 'Fase 4 · Recursos visibles',
            subtitle: 'Visión inspecciona asistencia y Zoom.',
            items: [
              node('nodo_recurso_asistencia', 'Recurso asistencia'),
              node('nodo_recurso_zoom', 'Recurso Zoom'),
              node('nodo_html_zoom', 'HTML / iframe Zoom')
            ]
          },
          {
            title: 'Fase 5 · Restricciones',
            subtitle: 'Visión revisa reglas de acceso.',
            items: [
              node('nodo_restricciones_asistencia', 'Restricción asistencia'),
              node('nodo_restricciones_zoom', 'Restricción Zoom'),
              node('nodo_regla_perfil_cohorte', 'Regla por perfil/cohorte')
            ]
          },
          {
            title: 'Fase 6 · Docencia',
            subtitle: 'Visión valida profesor y grupo.',
            items: [
              node('nodo_profesor_matriculado', 'Profesor matriculado'),
              node('nodo_profesor_grupo', 'Profesor en grupo'),
              { label: 'Acción recomendada', status: probe.accion_recomendada ? 'OK' : 'FALTA_VALIDAR' }
            ]
          }
        ];
      },

      moodleNodeStatus(probe, key) {
        return probe?.[key] || 'FALTA_VALIDAR';
      },

      extractMoodleNodes(probe) {
        const explicit = [];
        const labelMap = {
          cursos: 'Curso existe en CURSOS',
          moodleCurso: 'Curso Moodle',
          cohorte: 'Cohorte',
          grupo: 'Grupo',
          recursoAsistencia: 'Recurso asistencia',
          restriccionesAsistencia: 'Restricción asistencia',
          recursoZoom: 'Recurso Zoom',
          htmlZoom: 'HTML / iframe Zoom',
          restriccionesZoom: 'Restricción Zoom',
          profesorMatriculado: 'Profesor matriculado',
          profesorGrupo: 'Profesor en grupo',
          reglaPerfilCohorte: 'Regla perfil/cohorte'
        };
        if (probe?.nodos && typeof probe.nodos === 'object') {
          Object.entries(probe.nodos).forEach(([k, v]) => explicit.push({ name: labelMap[k] || k.replace(/([A-Z])/g, ' $1'), status: String(v || ''), detail: '' }));
        }
        try {
          const detail = typeof probe.detalle_json === 'string' ? JSON.parse(probe.detalle_json || '{}') : probe.detalle_json;
          const nodes = detail?.nodes || detail?.moodle?.nodes || [];
          if (Array.isArray(nodes)) {
            nodes.forEach(n => explicit.push({ name: n.name || n.label || n.id || 'Nodo', status: n.status || n.estado || '', detail: n.detail || n.detalle || n.descripcion || '', weight: n.weight || n.peso || '' }));
          }
        } catch (err) {}
        if (explicit.length) return explicit;
        return Object.entries(probe)
          .filter(([k]) => /^nodo_/i.test(k))
          .map(([k, v]) => ({ name: k.replace(/^nodo_/i, '').replace(/_/g, ' '), status: String(v || ''), detail: '' }));
      },

      viewConfig() {
        const s = VisionState.normalized.sistema;
        const e = VisionState.normalized.estado;
        const backendConfigured = !!VisionConfig.GAS_WEB_APP_URL;
        const runtimeOk = VisionConfig.dataSourceMode === 'BACKEND_REAL_RUNTIME' || VisionConfig.dataSourceMode === 'BACKEND_REAL_OVERRIDE_LOCAL';
        return `
          <section class="panel">
            <div class="panel-header"><div><h2 class="panel-title">Conexión backend</h2><div class="panel-subtitle">Visión carga la Web App productiva desde configuración runtime, sin que cada usuario deba pegar la URL.</div></div></div>
            <div class="panel-body config-grid">
              <div class="${backendConfigured ? 'backend-ok' : 'backend-warning'}">
                ${backendConfigured
                  ? 'Frontend conectado al backend real mediante configuración runtime. Las vistas consultan snapshots reales del backend.'
                  : 'No hay backend real disponible. Revise vision.runtime.json; Visión no usará Mock automáticamente en producción.'}
              </div>
              <div class="config-field">
                <label class="config-label">Fuente de configuración</label>
                <div class="config-input" style="display:flex;align-items:center;min-height:38px;">${VisionUtils.esc(runtimeOk ? VisionConfig.runtimeConfigUrl : (VisionConfig.runtimeError || 'Runtime pendiente'))}</div>
              </div>
              <div class="config-field">
                <label class="config-label">Backend productivo activo</label>
                <div class="config-input" style="display:flex;align-items:center;min-height:38px;">${VisionUtils.esc(backendConfigured ? 'Web App de Google Apps Script configurada' : 'No disponible')}</div>
              </div>
              <div class="config-actions">
                <button class="action-btn primary" onclick="VisionActions.reloadRuntimeConfig()">Recargar configuración runtime</button>
                <button class="action-btn" onclick="VisionActions.testLiveEndpoint()">Probar operación viva</button>
                <button class="action-btn" onclick="VisionActions.testAllEndpoints()">Probar endpoints</button>
              </div>
              <div class="backend-warning">
                El modo Mock queda reservado para demo explícita mediante <b>?demo=1</b>. En producción, si el backend real no responde, Visión debe mostrar error y no simular operación.
              </div>
            </div>
          </section>
          <section class="panel" style="margin-top:12px;">
            <div class="panel-header"><div><h2 class="panel-title">Diagnóstico de endpoints</h2><div class="panel-subtitle">Verifica qué acciones del backend están disponibles para el frontend.</div></div></div>
            <div class="panel-body endpoint-grid">
              ${this.endpointHealthRows()}
            </div>
          </section>
          <section class="panel" style="margin-top:12px;">
            <div class="panel-header">
              <div><h2 class="panel-title">Rutas backend requeridas en doGet</h2><div class="panel-subtitle">Checklist mínimo para que Visión vNext lea operación, analítica, GO, salud y Moodle.</div></div>
              <button class="action-btn" onclick="VisionActions.copyDoGetRoutes()">Copiar bloque doGet</button>
            </div>
            <div class="panel-body backend-checklist">
              ${this.backendRoutesRows()}
              <pre class="code-box" id="doGetRoutesSnippet">${VisionUtils.esc(this.doGetRoutesSnippet())}</pre>
            </div>
          </section>
          <section class="panel" style="margin-top:12px;">
            <div class="panel-header"><div><h2 class="panel-title">Estado técnico visible</h2><div class="panel-subtitle">Parámetros frontend y lectura del snapshot.</div></div></div>
            <div class="panel-body detail-grid">
              ${this.detailRow('Frontend', VisionConfig.version)}
              ${this.detailRow('Modo datos', VisionConfig.dataSourceMode)}
              ${this.detailRow('Runtime cargado', VisionConfig.runtimeLoaded ? 'SI' : 'NO')}
              ${this.detailRow('Error runtime', VisionConfig.runtimeError || '—')}
              ${this.detailRow('Endpoint vivo', VisionConfig.endpoints.live)}
              ${this.detailRow('Endpoint salud implementación', VisionConfig.endpoints.implementation)}
              ${this.detailRow('Fuente', s.fuente || '—')}
              ${this.detailRow('Generado en', s.generadoEn || '—')}
              ${this.detailRow('Estado operativo', e.operativo || '—')}
              ${this.detailRow('Detalle', e.detalle || '—')}
              ${this.detailRow('Refresco', VisionConfig.refreshSeconds + ' segundos')}
            </div>
          </section>`;
      },

      endpointHealthRows() {
        const rows = VisionState.normalized.endpointHealth || [];
        if (!rows.length) {
          return VisionComponents.empty('Aún no se han probado endpoints. Use el botón “Probar endpoints”.');
        }
        return rows.map(r => `
          <div class="endpoint-row">
            <div class="endpoint-action">${VisionUtils.esc(r.action)}</div>
            <div>${VisionComponents.badge(r.ok ? 'OK' : 'ERROR', r.ok ? 'ok' : 'danger')}</div>
            <div class="endpoint-detail">${VisionUtils.esc(r.modulo || r.error || r.status || 'Sin detalle')}</div>
            <div class="endpoint-latency">${VisionUtils.esc(r.latencyMs || 0)} ms</div>
          </div>`).join('');
      },

      backendRoutesRows() {
        return this.backendRoutes().map(r => `
          <div class="backend-route">
            <div class="backend-route-action">${VisionUtils.esc(r.action)}</div>
            <div class="backend-route-handler">${VisionUtils.esc(r.handler)}</div>
            <div>${VisionComponents.badge(r.required ? 'REQUERIDO' : 'OPCIONAL', r.required ? 'info' : 'neutral')}</div>
          </div>`).join('');
      },

      backendRoutes() {
        return [
          { action: 'visionLiveOperationsSnapshot', handler: 'VL_handleVisionLiveOperationsSnapshot_(e)', required: true },
          { action: 'visionExecutiveSnapshot', handler: 'VE_handleVisionExecutiveSnapshot_(e)', required: true },
          { action: 'visionAnalyticsSnapshotV2', handler: 'VAZ_handleVisionAnalyticsSnapshotV2_(e)', required: true },
          { action: 'visionGoSatelliteSnapshot', handler: 'GS_handleGoSatelliteSnapshot_(e)', required: true },
          { action: 'visionImplementationHealthSnapshot', handler: 'IH_handleImplementationHealthSnapshot_(e)', required: true },
          { action: 'visionMoodleImplementationProbeSnapshot', handler: 'IMP_handleMoodleImplementationProbeSnapshot_(e)', required: true },
          { action: 'visionRunMoodleImplementationProbe', handler: 'IMP_handleRunMoodleImplementationProbe_(e)', required: true },
          { action: 'legacyZoomDashboard', handler: 'VE_handleDashboardZoomLegacy_(e)', required: false }
        ];
      },

      doGetRoutesSnippet() {
        return `function doGet(e) {
  e = e || { parameter: {} };
  const action = String(e.parameter.action || '').trim();

  if (action === 'visionExecutiveSnapshot') {
    return VE_handleVisionExecutiveSnapshot_(e);
  }

  if (action === 'visionAnalyticsSnapshot') {
    return VA_handleVisionAnalyticsSnapshot_(e);
  }

  if (action === 'visionAnalyticsSnapshotV2') {
    return VAZ_handleVisionAnalyticsSnapshotV2_(e);
  }

  if (action === 'visionGoSatelliteSnapshot') {
    return GS_handleGoSatelliteSnapshot_(e);
  }

  if (action === 'visionImplementationHealthSnapshot') {
    return IH_handleImplementationHealthSnapshot_(e);
  }

  if (action === 'visionMoodleImplementationProbeSnapshot') {
    return IMP_handleMoodleImplementationProbeSnapshot_(e);
  }

  if (action === 'visionRunMoodleImplementationProbe') {
    return IMP_handleRunMoodleImplementationProbe_(e);
  }

  if (action === 'visionLiveOperationsSnapshot') {
    return VL_handleVisionLiveOperationsSnapshot_(e);
  }

  if (!action || action === 'legacyZoomDashboard') {
    return VE_handleDashboardZoomLegacy_(e);
  }

  return ContentService
    .createTextOutput(JSON.stringify({
      ok: false,
      error: 'Acción no reconocida.',
      action: action
    }))
    .setMimeType(ContentService.MimeType.JSON);
}`;
      },

      placeholder(text) {
        return `<section class="panel"><div class="panel-body">${VisionComponents.empty(text)}</div></section>`;
      },

      kpiRow() {
        const k = VisionState.normalized.kpis;
        return `<div class="grid-kpi">
          ${VisionComponents.kpi('Clases monitoreadas', k.clasesMonitoreadasHoy, 'Snapshot vivo')}
          ${VisionComponents.kpi('Zoom activo', k.clasesConZoomActivoHoy, 'Clases con evidencia live')}
          ${VisionComponents.kpi('Eventos hoy', k.eventosRegistradosHoy, 'EVENTOS_CLASE')}
          ${VisionComponents.kpi('Incidencias abiertas', k.incidenciasAbiertas, 'Casos vigentes')}
          ${VisionComponents.kpi('Críticas operativas', k.criticasOperativasAbiertas, 'Requieren atención')}
          ${VisionComponents.kpi('Telegram hoy', (k.recordatoriosEnviadosHoy || 0) + (k.alertasIncidenciaHoy || 0), 'Recordatorios + alertas')}
        </div>`;
      },

      liveCommandStrip() {
        const k = VisionState.normalized.kpis;
        const e = VisionState.normalized.estado;
        const clases = VisionState.normalized.clases || [];
        const activas = clases.filter(c => c.zoomActivo || /INICIADA|BAJA|PROFESOR|SIN_ESTUDIANTES/i.test(c.estado)).length;
        const criticas = k.criticasOperativasAbiertas || 0;
        const telegram = (k.recordatoriosEnviadosHoy || 0) + (k.alertasIncidenciaHoy || 0);
        const lectura = criticas > 0
          ? 'Visión detecta incidencias críticas operativas abiertas. Conviene revisar la bandeja y validar si corresponde escalar a Implementación o contactar al profesor.'
          : activas > 0
            ? 'Visión observa clases en desarrollo. La prioridad es mantener seguimiento de Zoom activo, asistencia observada y eventuales alertas.'
            : 'Visión no detecta clases activas en este snapshot. Se mantiene la vigilancia sobre clases próximas, incidencias y Telegram.';
        return `

              <div class="readout-avatar"></div>
              <div class="readout-content">
                <div class="readout-kicker"><span class="pulse"></span> Lectura del asistente</div>
                <div class="readout-title">${VisionUtils.esc(e.operativo || 'OPERANDO')} · Visión está trabajando</div>
                <div class="readout-text">${VisionUtils.esc(lectura)}</div>
              </div>
            </section>
            <section class="ops-board">
              <div class="ops-chip"><div class="ops-chip-label">Clases activas</div><div class="ops-chip-value">${VisionUtils.esc(activas)}</div><div class="ops-chip-note">Zoom o estado operativo en curso</div></div>
              <div class="ops-chip"><div class="ops-chip-label">Críticas</div><div class="ops-chip-value">${VisionUtils.esc(criticas)}</div><div class="ops-chip-note">Prioridad de revisión</div></div>
              <div class="ops-chip"><div class="ops-chip-label">Telegram</div><div class="ops-chip-value">${VisionUtils.esc(telegram)}</div><div class="ops-chip-note">Mensajes operativos hoy</div></div>
              <div class="ops-chip"><div class="ops-chip-label">Bandeja</div><div class="ops-chip-value">${VisionUtils.esc(k.pendientesBandeja || 0)}</div><div class="ops-chip-note">Pendientes de gestión humana</div></div>
            </section>
          </div>`;
      },

      timelineItems(max) {
        return (VisionState.normalized.timeline || []).slice(0, max).map(t => VisionComponents.timelineItem(t)).join('') || VisionComponents.empty('Sin eventos recientes para mostrar.');
      },

      filteredClasses() {
        const list = VisionState.normalized.clases || [];
        const f = VisionState.ui.classFilter;
        if (f === 'activas') return list.filter(c => c.zoomActivo || /INICIADA|BAJA|PROFESOR|SIN_ESTUDIANTES/i.test(c.estado));
        if (f === 'proximas') return list.filter(c => /PROXIMA|VENTANA|ESPERANDO/i.test(c.estado));
        return list;
      },

      filteredIncidents() {
        const list = VisionState.normalized.incidencias || [];
        const f = VisionState.ui.incidentFilter;
        if (f === 'criticas') return list.filter(i => /CRITICA|ALTA|NO_INICIADA/i.test(i.severidad + ' ' + i.estadoDetectado));
        if (f === 'abiertas') return list.filter(i => !/CERRADA/i.test(i.estadoIncidencia));
        return list;
      },

              <div class="inspector-head"><h2 class="inspector-title">Inspector</h2><div class="inspector-subtitle">Seleccione una clase, incidencia o notificación.</div></div>
              <div class="inspector-body">${VisionComponents.empty('El inspector contextual mostrará evidencia, trazabilidad y acciones sugeridas.')}</div>
            </aside>`;
        }
        return `
          <aside class="inspector">
            <div class="inspector-head"><h2 class="inspector-title">${VisionUtils.esc(this.inspectorTitle(type, item))}</h2><div class="inspector-subtitle">Detalle contextual de la unidad seleccionada.</div></div>
            <div class="inspector-body detail-grid">${this.inspectorDetails(type, item)}</div>
          </aside>`;

      classInspector(c) {

        return `
          <div class="inspector-hero ${tone}">
            <div class="inspector-hero-title">${VisionUtils.esc(c.sigla)}</div>

          </div>
          <section class="inspector-section">
            <div class="inspector-section-head"><div class="inspector-section-title">Datos de clase</div></div>
            <div class="inspector-section-body">
              <div class="inspector-mini-grid">
                ${this.inspectorMini('Profesor/a', c.profesor)}
                ${this.inspectorMini('Horario', (c.horaInicio || '—') + ' - ' + (c.horaFin || '—'))}
                ${this.inspectorMini('Fecha', c.fecha || 'No informada')}
                ${this.inspectorMini('Meeting ID', c.meetingId || 'No informado')}
              </div>
            </div>
          </section>
          <section class="inspector-section">
            <div class="inspector-section-head"><div class="inspector-section-title">Participación observada</div></div>
            <div class="inspector-section-body">
              <div class="inspector-mini-grid">
                ${this.inspectorMini('Participantes', c.participantes)}
                ${this.inspectorMini('Agendados', c.agendados)}
                ${this.inspectorMini('Asistencia', (c.asistenciaPct || 0) + '%')}
                ${this.inspectorMini('Avance', (c.avancePct || 0) + '%')}
              </div>
            </div>
          </section>

      async testLiveEndpoint() {
        try {
          const raw = await VisionAPI.getLiveSnapshot();
          const ok = raw && raw.ok !== false;
          alert(ok
            ? 'Endpoint visionLiveOperationsSnapshot respondió correctamente.'
            : 'El endpoint respondió, pero reportó ok=false. Revisa el backend.');
        } catch (err) {
          alert('No se pudo consultar visionLiveOperationsSnapshot: ' + err.message);
        }
      },

      async testAllEndpoints() {
        const actions = [
          VisionConfig.endpoints.live,
          VisionConfig.endpoints.executive,
          VisionConfig.endpoints.analytics,
          VisionConfig.endpoints.go,
          VisionConfig.endpoints.implementation,
          VisionConfig.endpoints.moodleSnapshot
        ];
        VisionState.normalized.endpointHealth = actions.map(action => ({
          action,
          ok: false,
          status: 'PROBANDO',
          modulo: 'Probando...',
          latencyMs: 0,
          error: ''
        }));
        VisionViews.render();

        const results = [];
        for (const action of actions) {
          const result = await VisionAPI.testEndpoint(action);
          results.push(result);
          VisionState.normalized.endpointHealth = results.concat(
            actions.slice(results.length).map(a => ({ action: a, ok: false, status: 'PENDIENTE', modulo: 'Pendiente...', latencyMs: 0, error: '' }))
          );
          VisionViews.render();
        }
      },

      async runMoodleProbe() {
        const input = document.getElementById('moodleSiglaInput');
        const sigla = String(input?.value || '').trim();
        if (!sigla) {
          alert('Debes ingresar una sigla de curso.');
          return;
        }
        try {
          VisionState.normalized.moodleProbe = { sigla_curso: sigla, estado_general: 'EJECUTANDO', observacion: 'Consultando diagnóstico Moodle...', prioridad: 'INFO' };
          VisionViews.render();
          const raw = await VisionAPI.runMoodleProbe(sigla);
          VisionState.normalized.moodleProbe = VisionAdapters.moodleProbe(raw, sigla);
          VisionViews.render();
        } catch (err) {
          console.warn('Diagnóstico Moodle usando mock por error:', err);
          VisionState.normalized.moodleProbe = VisionAdapters.moodleProbe(VisionMock.getMoodleProbe(sigla), sigla);

      copyDoGetRoutes() {
        const text = VisionViews.doGetRoutesSnippet();
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => alert('Bloque doGet copiado al portapapeles.'));
          return;
        }

        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert('Bloque doGet copiado al portapapeles.');
      }
    };

    const VisionApp = {
      async init() {
        this.showLoaderProgress(12, 'Preparando shell de aplicación.');
        await VisionRuntime.load();
        this.showLoaderProgress(20, VisionConfig.GAS_WEB_APP_URL ? 'Backend real detectado por configuración runtime.' : 'No se detectó backend real por configuración runtime.');
        VisionViews.render();
        await this.loadLive();
        this.startTimers();
      },

      async loadLive() {
        try {
          VisionState.loading = true;
          VisionState.error = null;
          this.showLoader(false);
          this.showLoaderProgress(28, 'Leyendo EVENTOS_CLASE, INCIDENCIAS y LOG_NOTIFICACIONES.');

          const raw = await VisionAPI.getLiveSnapshot();
          this.showLoaderProgress(68, 'Normalizando clases, incidencias, Telegram y bandeja.');

          VisionState.snapshots.live = raw;
          VisionState.normalized = VisionAdapters.live(raw);
          VisionState.lastRefresh = new Date();
          VisionState.nextRefreshIn = VisionConfig.refreshSeconds;

          this.showLoaderProgress(92, 'Renderizando cabina operativa.');
          VisionViews.render();
          this.showLoaderProgress(100, 'Visión operativo.');
          setTimeout(() => this.hideLoader(), 350);
        } catch (err) {
          VisionState.error = err;
          console.error(err);
          this.hideLoader();
          VisionViews.render();
          alert('No se pudo cargar Visión: ' + err.message);
        } finally {
          VisionState.loading = false;
        }
      },

      async loadImplementationHealth() {
        try {
          const raw = await VisionAPI.getImplementationHealth();
          VisionState.snapshots.implementation = raw;
          VisionState.normalized.saludImplementacion = VisionAdapters.implementation(raw);
          VisionViews.render();
        } catch (err) {
          console.warn('No se pudo cargar Salud de Implementación:', err);
          VisionState.normalized.saludImplementacion = VisionAdapters.implementation(VisionMock.getImplementation());
          VisionViews.render();
        }
      },

      startTimers() {
        clearInterval(VisionState.countdownTimer);
        clearInterval(VisionState.refreshTimer);

        VisionState.countdownTimer = setInterval(() => {
          VisionState.nextRefreshIn = Math.max(0, VisionState.nextRefreshIn - 1);
          const top = document.getElementById('countdownTop');
          const bottom = document.getElementById('countdownBottom');
          if (top) top.textContent = VisionState.nextRefreshIn;
          if (bottom) bottom.textContent = VisionState.nextRefreshIn;
          if (VisionState.nextRefreshIn <= 0) {
            VisionState.nextRefreshIn = VisionConfig.refreshSeconds;
            this.loadLive();
          }
        }, 1000);
      },

      showLoader(force = true) {
        const el = document.getElementById('loader');
        if (!el) return;
        if (force) el.classList.remove('hidden');
      },

      hideLoader() {
        const el = document.getElementById('loader');
        if (el) el.classList.add('hidden');
      },

      showLoaderProgress(pct, message) {
        const loader = document.getElementById('loader');
        const fill = document.getElementById('loaderFill');
        const subtitle = document.getElementById('loaderSubtitle');
        const foot = document.getElementById('loaderFoot');
        if (loader) loader.classList.remove('hidden');
        if (fill) fill.style.width = pct + '%';
        if (subtitle) subtitle.textContent = message;
        if (foot) foot.textContent = pct + '% · ' + message;
      }
    };

          nodo_restricciones_asistencia: 'FALTA_VALIDAR',
          nodo_recurso_zoom: 'OK',
          nodo_html_zoom: 'OK',
          nodo_restricciones_zoom: 'OBSERVAR',
          nodo_profesor_matriculado: 'FALTA_VALIDAR',
          nodo_profesor_grupo: 'OK',
          nodo_regla_perfil_cohorte: 'OBSERVAR'
        };
      },

      todayISO() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      },

      shiftTime(minutes) {
        const d = new Date(Date.now() + minutes * 60000);
        return d.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
      }
    };

    VisionApp.init();
  </script>
</body>
</html>

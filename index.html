        } catch (err) {
          VisionState.error = err;
          console.error(err);
          this.hideLoader();
          VisionViews.render();
          alert('No se pudo cargar Visión: ' + err.message);
        } finally {
          VisionState.loading = false;
        }
      },

      startTimers() {
        clearInterval(VisionState.countdownTimer);
        clearInterval(VisionState.refreshTimer);

        VisionState.countdownTimer = setInterval(() => {
          VisionState.nextRefreshIn = Math.max(0, VisionState.nextRefreshIn - 1);
          const top = document.getElementById('countdownTop');
          const bottom = document.getElementById('countdownBottom');
          if (top) top.textContent = VisionState.nextRefreshIn;
          if (bottom) bottom.textContent = VisionState.nextRefreshIn;
          if (VisionState.nextRefreshIn <= 0) {
            VisionState.nextRefreshIn = VisionConfig.refreshSeconds;
            this.loadLive();
          }
        }, 1000);
      },

      showLoader(force = true) {
        const el = document.getElementById('loader');
        if (!el) return;
        if (force) el.classList.remove('hidden');
      },

      hideLoader() {
        const el = document.getElementById('loader');
        if (el) el.classList.add('hidden');
      },

      showLoaderProgress(pct, message) {
        const loader = document.getElementById('loader');
        const fill = document.getElementById('loaderFill');
        const subtitle = document.getElementById('loaderSubtitle');
        const foot = document.getElementById('loaderFoot');
        if (loader) loader.classList.remove('hidden');
        if (fill) fill.style.width = pct + '%';
        if (subtitle) subtitle.textContent = message;
        if (foot) foot.textContent = pct + '% · ' + message;
      }
    };

    /***********************************************************
     * 10. Mock local para preview sin GAS configurado
     ***********************************************************/
    const VisionMock = {
      get(action) {
        const now = new Date();
        return {
          ok: true,
          sistema: {
            nombre: 'Visión',
            modulo: 'Snapshot Vivo Operacional',
            version: 'mock vNext',
            generadoEn: now.toLocaleString('es-CL'),
            generadoEnMs: now.getTime(),
            fuente: 'MOCK · EVENTOS_CLASE + INCIDENCIAS + LOG_NOTIFICACIONES + BANDEJA_INCIDENCIAS'
          },
          estado: {
            operativo: 'OPERANDO',
            detalle: 'Modo preview: shell vNext conectado a mock local. Configure GAS_WEB_APP_URL para operación real.',
            esSnapshotVivo: true
          },
          kpis: {
            clasesMonitoreadasHoy: 8,
            clasesIniciadasHoy: 4,
            clasesConZoomActivoHoy: 3,
            eventosRegistradosHoy: 42,
            incidenciasDetectadasHoy: 2,
            incidenciasCerradasHoy: 1,
            incidenciasAbiertas: 2,
            criticasOperativasAbiertas: 1,
            recordatoriosEnviadosHoy: 5,
            alertasIncidenciaHoy: 2,
            erroresNotificacionHoy: 0,
            participantesTotalHoy: 126,
            agendadosTotalHoy: 310,
            asistenciaObservadaPctHoy: 0.41,
            pendientesBandeja: 3
          },
          visionEnVivo: {
            clases: [
              {
                sigla: '2026 EET CR LEN01', programa: 'EET', asignatura: 'Competencia Lectora', profesor: 'Profesora Mabel Hervia', fecha: this.todayISO(), horaInicio: this.shiftTime(-35), horaFin: this.shiftTime(45), estado: 'INICIADA_NORMAL', severidad: 'INFO', zoomActivo: true, participantes: 38, agendados: 72, accionSugerida: 'Mantener observación normal.', observacion: 'Clase detectada en Zoom con participación estable.'
              },
              {
                sigla: '2026 DUO CR MAT03', programa: 'DUO', asignatura: 'Matemática M1', profesor: 'Profesor Juan Pérez', fecha: this.todayISO(), horaInicio: this.shiftTime(-10), horaFin: this.shiftTime(70), estado: 'BAJA_ASISTENCIA', severidad: 'ALTA', zoomActivo: true, participantes: 9, agendados: 64, accionSugerida: 'Observar asistencia y alertar si persiste.', observacion: 'Participación bajo el umbral esperado para la clase.'
              },
              {
                sigla: '2026 EET CR HIS02', programa: 'EET', asignatura: 'Historia', profesor: 'Profesora Ana Rojas', fecha: this.todayISO(), horaInicio: this.shiftTime(-8), horaFin: this.shiftTime(62), estado: 'NO_INICIADA_T5', severidad: 'CRITICA', zoomActivo: false, participantes: 0, agendados: 48, accionSugerida: 'Alertar a Implementación y Campus Virtual.', observacion: 'No se detecta sala Zoom activa después del inicio programado.'
              },
              {
                sigla: '2026 PGO GL BIO01', programa: 'GO', asignatura: 'Biología', profesor: 'Profesor Base', fecha: this.todayISO(), horaInicio: this.shiftTime(12), horaFin: this.shiftTime(92), estado: 'PROXIMA_A_INICIAR', severidad: 'INFO', zoomActivo: false, participantes: 0, agendados: 0, accionSugerida: 'Recordatorio preventivo.', observacion: 'Clase próxima a iniciar.'
              }
            ]
          },
          incidencias: {

              { id_incidencia: 'INC-20260525-HIS02', sigla_curso: '2026 EET CR HIS02', asignatura: 'Historia', profesor: 'Profesora Ana Rojas', estado_detectado: 'NO_INICIADA_T5', severidad: 'CRITICA', estado_incidencia: 'ABIERTA', responsable_revision: 'Campus Virtual / Implementación', accion_automatica: 'ALERTAR_IMPLEMENTACION_Y_CAMPUS', observacion_revision: 'Revisar si la clase inició en otra sala o si hay problema con el anfitrión.' },
              { id_incidencia: 'INC-20260525-MAT03', sigla_curso: '2026 DUO CR MAT03', asignatura: 'Matemática M1', profesor: 'Profesor Juan Pérez', estado_detectado: 'BAJA_ASISTENCIA', severidad: 'ALTA', estado_incidencia: 'ABIERTA', responsable_revision: 'Campus Virtual', accion_automatica: 'OBSERVAR_ASISTENCIA', observacion_revision: 'Baja asistencia inicial; mantener seguimiento.' }
            ]
          },
          notificaciones: {
            items: [
              { tipo: 'RECORDATORIO_INICIO_CLASE', resultado: 'ENVIADO', sigla_curso: '2026 PGO GL BIO01', destinatario: 'Grupo Campus', mensaje: 'Visión recuerda una clase próxima a iniciar.' },
              { tipo: 'ALERTA_INCIDENCIA', resultado: 'ENVIADO', sigla_curso: '2026 EET CR HIS02', destinatario: 'Grupo Implementación', mensaje: 'Visión registra clase no iniciada T5. Revisar sala Zoom y profesor.' },
              { tipo: 'ALERTA_INCIDENCIA', resultado: 'ENVIADO', sigla_curso: '2026 DUO CR MAT03', destinatario: 'Grupo Campus', mensaje: 'Visión detecta baja asistencia observada.' }
            ]
          },
          bandeja: {
            totalBandeja: 3,
            pendientesRevision: 3,
            abiertasEnBandeja: 2
          },
          lecturaOperativa: [
            'Visión mantiene operación viva con clases activas, alertas Telegram y bandeja humana disponible.',
            'Existe al menos una incidencia crítica abierta que requiere revisión inmediata.',
            'El frontend está en modo preview; al configurar GAS_WEB_APP_URL leerá datos reales del backend.'
          ]
        };
      },

      todayISO() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      },

      shiftTime(minutes) {
        const d = new Date(Date.now() + minutes * 60000);
        return d.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
      }
    };

    VisionApp.init();
  </script>
</body>

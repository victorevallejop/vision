<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visión | Frontend vNext</title>

  <style>
    :root {
      --app-bg: #0b1220;
      --app-bg-2: #111f36;
      --app-bg-3: #071426;
      --surface: #ffffff;
      --surface-soft: #f5f8fc;
      --surface-strong: #eaf2fb;
      --ink: #122033;
      --muted: #64748b;
      --line: rgba(120, 150, 180, .28);
      --line-strong: rgba(90, 120, 155, .42);
      --blue: #1d7df2;
      --blue-2: #54b6ff;
      --cyan: #7ee7ff;
      --green: #1f9d63;
      --orange: #f97316;
      --yellow: #b98000;
      --red: #d92d20;
      --purple: #7657d8;
      --shadow: 0 18px 48px rgba(0, 0, 0, .22);
      --shadow-soft: 0 10px 26px rgba(11, 31, 58, .11);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --topbar-h: 54px;
      --ribbon-h: 112px;
      --statusbar-h: 32px;
      --sidebar-w: 250px;
      --inspector-w: 360px;
      --font: "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(circle at 12% -10%, rgba(84, 182, 255, .30), transparent 32%),
        radial-gradient(circle at 95% 6%, rgba(126, 231, 255, .16), transparent 36%),
        linear-gradient(135deg, var(--app-bg-3) 0%, var(--app-bg-2) 58%, #050b14 100%);
      overflow: hidden;
    }

    button, input, select { font: inherit; }

    button { cursor: pointer; }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: var(--topbar-h) var(--ribbon-h) minmax(0, 1fr) var(--statusbar-h);
      color: var(--ink);
    }

    /* =========================================================
       Topbar
       ========================================================= */
    .topbar {
      height: var(--topbar-h);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      color: #eef7ff;
      border-bottom: 1px solid rgba(148, 184, 220, .18);
      background: rgba(8, 18, 34, .72);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 38% 28%, rgba(126, 231, 255, .95), transparent 28%),
        linear-gradient(135deg, rgba(29, 125, 242, .96), rgba(8, 45, 94, .96));
      box-shadow: 0 10px 22px rgba(0, 0, 0, .28);
      position: relative;
      overflow: hidden;
    }

    .brand-mark::after {
      content: "";
      width: 14px;
      height: 7px;
      border: 2px solid rgba(255,255,255,.9);
      border-top: 0;
      border-radius: 0 0 12px 12px;
      transform: translateY(3px);
    }

    .brand-text { min-width: 0; }

    .brand-title {
      font-weight: 950;
      letter-spacing: -.03em;
      line-height: 1.05;
      font-size: 16px;
    }

    .brand-subtitle {
      margin-top: 1px;
      font-size: 11px;
      color: rgba(234, 246, 255, .74);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-status {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color: rgba(238,247,255,.88);
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(31, 157, 99, .58);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(31,157,99,.58); }
      70% { box-shadow: 0 0 0 9px rgba(31,157,99,0); }
      100% { box-shadow: 0 0 0 0 rgba(31,157,99,0); }
    }

    .pill.ok { background: rgba(31,157,99,.18); border-color: rgba(31,157,99,.38); color: #ddfff0; }
    .pill.warn { background: rgba(249,115,22,.18); border-color: rgba(249,115,22,.38); color: #fff3e8; }
    .pill.danger { background: rgba(217,45,32,.18); border-color: rgba(217,45,32,.38); color: #ffe9e6; }
    .pill.info { background: rgba(29,125,242,.18); border-color: rgba(84,182,255,.38); color: #e8f5ff; }

    /* =========================================================
       Ribbon
       ========================================================= */
    .ribbon {
      height: var(--ribbon-h);
      display: grid;
      grid-template-rows: 34px minmax(0, 1fr);
      color: #eef7ff;
      border-bottom: 1px solid rgba(148, 184, 220, .18);
      background: linear-gradient(180deg, rgba(12, 28, 51, .98), rgba(10, 22, 39, .94));
    }

    .ribbon-tabs {
      display: flex;
      gap: 2px;
      align-items: end;
      padding: 0 10px;
      overflow-x: auto;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .ribbon-file-tab,
    .ribbon-tab {
      appearance: none;
      height: 30px;
      padding: 0 13px;
      border: 1px solid transparent;
      border-radius: 9px 9px 0 0;
      font-weight: 850;
      font-size: 12px;
      white-space: nowrap;
    }

    .ribbon-file-tab {
      color: #fff;
      background: linear-gradient(135deg, #0b4fa4, #1d7df2);
      border-color: rgba(126,231,255,.32);
      margin-right: 4px;
      box-shadow: 0 -3px 14px rgba(29,125,242,.20);
    }

    .ribbon-tab {
      color: rgba(238,247,255,.78);
      background: transparent;
    }

    .ribbon-tab.active {
      color: #09203d;
      background: linear-gradient(180deg, #ffffff, #eef6ff);
      border-color: rgba(148,184,220,.28);
      box-shadow: 0 -4px 18px rgba(255,255,255,.08);
    }

    .ribbon-body {
      display: flex;
      align-items: stretch;
      gap: 8px;
      padding: 8px 10px 9px;
      overflow-x: auto;
      background:
        linear-gradient(90deg, rgba(84,182,255,.07), transparent 28%, rgba(118,87,216,.06)),
        rgba(255,255,255,.025);
    }

    .ribbon-group {
      min-width: 146px;
      display: grid;
      grid-template-rows: 1fr 16px;
      gap: 4px;
      border: 1px solid rgba(255,255,255,.105);
      border-radius: 11px;
      padding: 7px;
      background: linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.038));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.07);
      position: relative;
    }

    .ribbon-group::after {
      content: "";
      position: absolute;
      right: -5px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: rgba(255,255,255,.12);
    }

    .ribbon-group:last-child::after { display: none; }

    .ribbon-buttons {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }

    .ribbon-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 9px;
      background: rgba(255,255,255,.075);
      color: rgba(238,247,255,.88);
      min-width: 54px;
      padding: 6px 7px;
      display: grid;
      place-items: center;
      gap: 3px;
      font-size: 10.5px;
      font-weight: 850;
      line-height: 1.05;
      white-space: nowrap;
    }

    .ribbon-btn:hover { background: rgba(255,255,255,.14); transform: translateY(-1px); }
    .ribbon-btn.primary { background: linear-gradient(135deg, var(--blue), var(--blue-2)); border-color: rgba(126,231,255,.45); color: #fff; }

    .ribbon-icon { font-size: 17px; line-height: 1; }
    .ribbon-label { text-align: center; color: rgba(238,247,255,.68); font-size: 10px; font-weight: 900; letter-spacing: .02em; }

    .backstage-summary {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .backstage-kpi {
      border: 1px solid rgba(29,125,242,.13);
      border-radius: 14px;
      padding: 8px;
      background: rgba(255,255,255,.68);
    }

    .backstage-kpi small {
      display: block;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      font-size: 9px;
      font-weight: 900;
      line-height: 1.15;
    }

    .backstage-kpi strong {
      display: block;
      margin-top: 4px;
      color: #0b1f3a;
      font-size: 20px;
      line-height: 1;
      letter-spacing: -.04em;
      font-weight: 950;
    }


    /* =========================================================
       Workbench layout
       ========================================================= */
    .workbench {
      min-height: 0;
      display: grid;
      grid-template-columns: var(--sidebar-w) minmax(0, 1fr) var(--inspector-w);
      gap: 10px;
      padding: 10px;
      overflow: hidden;
    }

    .sidebar,
    .main,
    .inspector {
      min-height: 0;
      border: 1px solid rgba(148,184,220,.22);
      background: rgba(255,255,255,.94);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(235,245,255,.92));
    }

    .sidebar-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .assistant-tile {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(29,125,242,.12), rgba(126,231,255,.10));
      border: 1px solid rgba(29,125,242,.16);
    }

    .assistant-avatar {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0b4fa4, #54b6ff);
      box-shadow: 0 10px 20px rgba(29,125,242,.20);
      position: relative;
      animation: floatBot 3.2s ease-in-out infinite;
    }

    @keyframes floatBot {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .assistant-avatar::before {
      content: "";
      width: 25px;
      height: 18px;
      border-radius: 9px;
      background: #fff;
      box-shadow: inset 8px 0 0 rgba(126,231,255,.55);
    }

    .assistant-avatar::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 4px;
      border-radius: 999px;
      background: #0b4fa4;
      transform: translateY(7px);
    }

    .assistant-name {
      font-weight: 950;
      color: #0b1f3a;
      letter-spacing: -.02em;
      font-size: 13px;
    }

    .assistant-status {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .nav-list {
      padding: 10px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 5px;
    }

    .nav-item {
      width: 100%;
      appearance: none;
      border: 1px solid transparent;
      background: transparent;
      color: #24364c;
      border-radius: 13px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px 9px;
      text-align: left;
      font-weight: 800;
      font-size: 12px;
    }

    .nav-item:hover { background: rgba(29,125,242,.07); }
    .nav-item.active { background: rgba(29,125,242,.13); border-color: rgba(29,125,242,.18); color: #083c72; }
    .nav-icon { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 10px; background: rgba(29,125,242,.08); }
    .nav-count { min-width: 24px; text-align: center; padding: 4px 7px; border-radius: 999px; background: #edf4fb; color: #0b4fa4; font-size: 10px; font-weight: 950; }

    .sidebar-foot {
      border-top: 1px solid var(--line);
      padding: 10px 12px;
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
    }

    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: rgba(245, 249, 253, .96);
    }

    .view-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(245,250,255,.90));
    }

    .view-title {
      margin: 0;
      font-size: 22px;
      color: #0b1f3a;
      letter-spacing: -.035em;
      line-height: 1.05;
    }

    .view-subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .view-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action-btn {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: #0b3d72;
      padding: 8px 10px;
      font-weight: 900;
      font-size: 11px;
      box-shadow: 0 6px 14px rgba(11,31,58,.06);
    }

    .action-btn.primary { color: #fff; border-color: rgba(29,125,242,.32); background: linear-gradient(135deg, var(--blue), var(--blue-2)); }

    .view-scroll {
      overflow: auto;
      padding: 14px 16px 18px;
    }

    .inspector {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(240,247,255,.94));
    }

    .inspector-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .inspector-title {
      margin: 0;
      color: #0b1f3a;
      font-size: 17px;
      letter-spacing: -.025em;
    }

    .inspector-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .inspector-body {
      overflow: auto;
      padding: 14px;
    }

    /* =========================================================
       Cards / content
       ========================================================= */
    .grid-kpi {
      display: grid;
      grid-template-columns: repeat(6, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .kpi-card {
      min-height: 98px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow-soft);
      padding: 12px;
    }

    .kpi-card::after {
      content: "";
      position: absolute;
      right: -28px;
      top: -28px;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: rgba(29,125,242,.09);
    }

    .kpi-label {
      position: relative;
      z-index: 1;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      font-size: 10px;
      font-weight: 900;
      line-height: 1.2;
    }

    .kpi-value {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      font-size: 28px;
      font-weight: 950;
      color: #0b1f3a;
      letter-spacing: -.04em;
      line-height: 1;
    }

    .kpi-note {
      position: relative;
      z-index: 1;
      margin-top: 5px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.25;
    }

    .section-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr);
      gap: 12px;
      align-items: start;
    }

    .live-command {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(360px, .9fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .assistant-readout,
    .ops-board {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, #fff, #f6fbff);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .assistant-readout {
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr);
      gap: 13px;
      padding: 14px;
      align-items: center;
      position: relative;
    }

    .assistant-readout::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 15%, rgba(84,182,255,.18), transparent 34%),
        linear-gradient(90deg, rgba(29,125,242,.07), transparent 55%);
      pointer-events: none;
    }

    .readout-avatar {
      position: relative;
      z-index: 1;
      width: 62px;
      height: 62px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0b4fa4, #54b6ff);
      box-shadow: 0 14px 28px rgba(29,125,242,.22);
      animation: floatBot 3.2s ease-in-out infinite;
    }

    .readout-avatar::before {
      content: "";
      width: 34px;
      height: 23px;
      border-radius: 13px;
      background: #fff;
      box-shadow: inset 12px 0 0 rgba(126,231,255,.52);
    }

    .readout-avatar::after {
      content: "";
      position: absolute;
      width: 17px;
      height: 5px;
      border-radius: 999px;
      background: #0b4fa4;
      transform: translateY(9px);
    }

    .readout-content {
      position: relative;
      z-index: 1;
      min-width: 0;
    }

    .readout-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(31,157,99,.11);
      color: #11643c;
      font-size: 10px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .07em;
      border: 1px solid rgba(31,157,99,.20);
    }

    .readout-title {
      margin-top: 8px;
      color: #0b1f3a;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -.035em;
      line-height: 1.12;
    }

    .readout-text {
      margin-top: 5px;
      color: #475569;
      font-size: 12px;
      line-height: 1.4;
    }

    .ops-board {
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-content: stretch;
    }

    .ops-chip {
      border: 1px solid rgba(120,150,180,.22);
      border-radius: 16px;
      background: #fff;
      padding: 10px;
      min-height: 70px;
      display: grid;
      align-content: center;
    }

    .ops-chip-label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      font-size: 9px;
      line-height: 1.15;
      font-weight: 950;
    }

    .ops-chip-value {
      margin-top: 5px;
      color: #0b1f3a;
      font-size: 22px;
      line-height: 1;
      letter-spacing: -.04em;
      font-weight: 950;
    }

    .ops-chip-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 10.5px;
      line-height: 1.2;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: #fff;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #f4f8fd);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      color: #0b1f3a;
      letter-spacing: -.015em;
    }

    .panel-subtitle {
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.3;
      color: var(--muted);
    }

    .panel-body { padding: 12px 14px 14px; }

    .class-grid {
      display: grid;
      gap: 10px;
    }

    .class-card {
      --accent: var(--blue);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 108px;
      grid-template-areas:
        "head donut"
        "meta donut"
        "action action"
        "progress progress";
      gap: 10px 14px;
      border: 1px solid var(--line);
      border-left: 8px solid var(--accent);
      border-radius: 20px;
      background: linear-gradient(180deg, #fff, #fbfdff);
      box-shadow: 0 9px 20px rgba(11,31,58,.07);
      padding: 13px;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
      position: relative;
      overflow: hidden;
    }

    .class-card::before {
      content: "";
      position: absolute;
      right: -42px;
      top: -42px;
      width: 116px;
      height: 116px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      pointer-events: none;
    }

    .class-card:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      box-shadow: 0 14px 28px rgba(11,31,58,.11);
    }

    .class-card.active { outline: 3px solid rgba(29,125,242,.16); }
    .class-card.warn { --accent: var(--orange); }
    .class-card.danger { --accent: var(--red); }
    .class-card.ok { --accent: var(--green); }
    .class-card.info { --accent: var(--blue); }

    .class-head {
      grid-area: head;
      position: relative;
      z-index: 1;
      min-width: 0;
    }

    .class-title-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .class-title {
      margin: 0;
      color: #071426;
      font-size: 18px;
      line-height: 1.12;
      font-weight: 950;
      letter-spacing: -.027em;
    }

    .class-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .class-time-chip {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 6px 9px;
      color: #0b4fa4;
      background: rgba(29,125,242,.10);
      border: 1px solid rgba(29,125,242,.18);
      font-size: 10px;
      font-weight: 950;
      white-space: nowrap;
    }

    .class-badges {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 10px;
      font-weight: 950;
      white-space: nowrap;
      line-height: 1;
    }

    .badge.ok { background: rgba(31,157,99,.12); color: #11643c; border-color: rgba(31,157,99,.25); }
    .badge.info { background: rgba(29,125,242,.11); color: #0b4fa4; border-color: rgba(29,125,242,.22); }
    .badge.warn { background: rgba(249,115,22,.12); color: #a94700; border-color: rgba(249,115,22,.25); }
    .badge.danger { background: rgba(217,45,32,.12); color: #b42318; border-color: rgba(217,45,32,.25); }
    .badge.neutral { background: rgba(100,116,139,.10); color: #475569; border-color: rgba(100,116,139,.18); }

    .class-meta {
      grid-area: meta;
      position: relative;
      z-index: 1;
      margin-top: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px 10px;
      color: #334155;
      font-size: 12px;
      line-height: 1.25;
    }

    .class-meta-card {
      border: 1px solid rgba(120,150,180,.18);
      border-radius: 13px;
      background: rgba(255,255,255,.74);
      padding: 8px;
      min-width: 0;
    }

    .class-meta-card small {
      display: block;
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 950;
      line-height: 1.15;
    }

    .class-meta-card strong {
      display: block;
      margin-top: 4px;
      color: #0b1f3a;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .class-action {
      grid-area: action;
      position: relative;
      z-index: 1;
      border: 1px solid rgba(120,150,180,.20);
      border-left: 4px solid var(--accent);
      border-radius: 15px;
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(246,250,255,.72));
      padding: 9px 10px;
      display: grid;
      gap: 4px;
    }

    .class-action-title {
      color: #0b1f3a;
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .class-action-text {
      color: #475569;
      font-size: 12px;
      line-height: 1.35;
    }

    .progress-block {
      grid-area: progress;
      position: relative;
      z-index: 1;
      margin-top: 0;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 5px;
    }

    .progress-track {
      height: 11px;
      border-radius: 999px;
      background: #e5edf6;
      overflow: visible;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #b77900, #f4b63f);
      position: relative;
      overflow: hidden;
      transition: width .35s linear;
    }

    .progress-fill::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-45deg, rgba(255,255,255,.26) 0, rgba(255,255,255,.26) 7px, transparent 7px, transparent 14px);
      animation: stripes 1.1s linear infinite;
    }

    @keyframes stripes { from { background-position: 0 0; } to { background-position: 24px 0; } }

    .donut-box {
      grid-area: donut;
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 6px;
      padding-top: 2px;
    }

    .donut {
      --pct: 0;
      width: 86px;
      height: 86px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--accent) calc(var(--pct) * 1%), #e6edf6 0);
    }

    .donut-inner {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff;
      color: #071426;
      font-size: 16px;
      font-weight: 950;
      box-shadow: inset 0 0 0 1px rgba(120,150,180,.14);
    }

    .donut-caption {
      text-align: center;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.15;
      font-weight: 850;
    }

    .timeline {
      display: grid;
      gap: 9px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 9px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #fff;
      padding: 10px;
    }

    .timeline-icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(29,125,242,.11);
      color: #0b4fa4;
      font-weight: 950;
    }

    .timeline-title {
      color: #0b1f3a;
      font-weight: 950;
      font-size: 12px;
      line-height: 1.25;
    }

    .timeline-text {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .feed-list, .incident-list { display: grid; gap: 8px; }

    .mini-card {
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #fff;
      padding: 10px;
    }

    .mini-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #0b1f3a;
      font-size: 12px;
      font-weight: 950;
      line-height: 1.3;
    }

    .mini-text {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .empty-state {
      border: 1px dashed rgba(120,150,180,.48);
      border-radius: 18px;
      padding: 18px;
      color: var(--muted);
      background: rgba(255,255,255,.62);
      font-size: 12px;
      line-height: 1.45;
      text-align: center;
    }

    .detail-grid {
      display: grid;
      gap: 8px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 8px;
      border-bottom: 1px solid rgba(120,150,180,.14);
      padding-bottom: 7px;
      color: #334155;
      font-size: 12px;
      line-height: 1.35;
    }

    .detail-row:last-child { border-bottom: 0; }
    .detail-key { color: var(--muted); font-weight: 900; }
    .detail-value { color: #0b1f3a; font-weight: 750; word-break: break-word; }

    .statusbar {
      height: var(--statusbar-h);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      color: rgba(238,247,255,.78);
      border-top: 1px solid rgba(148,184,220,.18);
      background: rgba(7, 14, 25, .86);
      font-size: 11px;
    }

    .statusbar-left, .statusbar-right { display: flex; gap: 12px; align-items: center; min-width: 0; }
    .statusbar-left { overflow: hidden; }
    .truncate { min-width: 0; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    /* =========================================================
       Loader
       ========================================================= */
    .loader-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 50% 20%, rgba(84,182,255,.24), transparent 36%),
        linear-gradient(135deg, #071426, #0b1f3a 58%, #050b14);
      transition: opacity .35s ease, visibility .35s ease;
    }

    .loader-screen.hidden { opacity: 0; visibility: hidden; }

    .loader-card {
      width: min(520px, calc(100vw - 36px));
      border: 1px solid rgba(148,184,220,.26);
      border-radius: 28px;
      padding: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(232,245,255,.90));
      box-shadow: 0 26px 70px rgba(0,0,0,.30);
      text-align: center;
      color: #0b1f3a;
    }

    .loader-bot {
      width: 104px;
      height: 104px;
      margin: 0 auto;
      border-radius: 34px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0b4fa4, #54b6ff);
      box-shadow: 0 18px 34px rgba(29,125,242,.24);
      animation: floatBot 3s ease-in-out infinite;
      position: relative;
    }

    .loader-bot::before {
      content: "";
      width: 56px;
      height: 38px;
      border-radius: 18px;
      background: #fff;
      box-shadow: inset 18px 0 0 rgba(126,231,255,.52);
    }

    .loader-bot::after {
      content: "";
      position: absolute;
      width: 26px;
      height: 7px;
      border-radius: 999px;
      background: #0b4fa4;
      transform: translateY(14px);
    }

    .loader-title {
      margin-top: 18px;
      font-size: 25px;
      font-weight: 950;
      letter-spacing: -.04em;
    }

    .loader-subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .loader-bar {
      height: 12px;
      margin-top: 18px;
      border-radius: 999px;
      background: #e6edf6;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--blue-2));
      position: relative;
      transition: width .2s linear;
      overflow: hidden;
    }

    .loader-fill::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-45deg, rgba(255,255,255,.27) 0, rgba(255,255,255,.27) 7px, transparent 7px, transparent 14px);
      animation: stripes 1s linear infinite;
    }

    .loader-foot {
      margin-top: 12px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    /* =========================================================
       Responsive
       ========================================================= */
    @media (max-width: 1280px) {
      :root { --inspector-w: 320px; --sidebar-w: 230px; }
      .grid-kpi { grid-template-columns: repeat(3, minmax(130px, 1fr)); }
      .section-grid { grid-template-columns: 1fr; }
      .live-command { grid-template-columns: 1fr; }
    }

    @media (max-width: 1020px) {
      body { overflow: auto; }
      .app { min-height: 100vh; height: auto; grid-template-rows: auto auto auto var(--statusbar-h); }
      .topbar { height: auto; grid-template-columns: 1fr; }
      .topbar-status { justify-content: flex-start; }
      .ribbon { height: auto; }
      .ribbon-body { padding-bottom: 8px; }
      .workbench { grid-template-columns: 1fr; overflow: visible; }
      .sidebar, .main, .inspector { min-height: auto; }
      .nav-list { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); max-height: none; }
      .inspector { display: none; }
    }

    @media (max-width: 680px) {
      .grid-kpi { grid-template-columns: 1fr 1fr; }
      .ops-board { grid-template-columns: 1fr; }
      .assistant-readout { grid-template-columns: 1fr; }
      .class-card { grid-template-columns: 1fr; grid-template-areas: "head" "donut" "meta" "action" "progress"; }
      .donut-box { justify-items: start; }
      .class-meta { grid-template-columns: 1fr; }
      .view-head { grid-template-columns: 1fr; }
      .view-actions { justify-content: flex-start; }
    }
  </style>
</head>

<body>
  <div id="loader" class="loader-screen">
    <div class="loader-card">
      <div class="loader-bot"></div>
      <div class="loader-title">Inicializando Visión</div>
      <div id="loaderSubtitle" class="loader-subtitle">Leyendo fuentes vivas de operación.</div>
      <div class="loader-bar"><div id="loaderFill" class="loader-fill"></div></div>
      <div id="loaderFoot" class="loader-foot">Preparando asistente operativo...</div>
    </div>
  </div>

  <div id="app" class="app"></div>

  <script>
    /***********************************************************
     * 1. Configuración
     ***********************************************************/
    const VisionConfig = {
      // Reemplazar por URL publicada del Web App de Apps Script.
      // Ejemplo: https://script.google.com/macros/s/AKfycb.../exec
      GAS_WEB_APP_URL: '',

      refreshSeconds: 180,
      useMockWhenNoUrl: true,
      defaultTab: 'operacion',
      version: 'vNext Sprint 1',

      endpoints: {
        live: 'visionLiveOperationsSnapshot',
        executive: 'visionExecutiveSnapshot',
        analytics: 'visionAnalyticsSnapshotV2',
        go: 'visionGoSatelliteSnapshot',
        implementation: 'visionImplementationHealthSnapshot',
        moodleRun: 'visionRunMoodleImplementationProbe',
        moodleSnapshot: 'visionMoodleImplementationProbeSnapshot'
      }
    };

    /***********************************************************
     * 2. Estado global
     ***********************************************************/
    const VisionState = {
      currentTab: VisionConfig.defaultTab,
      selectedItem: null,
      selectedItemType: null,
      loading: true,
      error: null,
      lastRefresh: null,
      nextRefreshIn: VisionConfig.refreshSeconds,
      refreshTimer: null,
      countdownTimer: null,
      snapshots: {
        live: null,
        executive: null,
        analytics: null,
        implementation: null,
        moodle: null,
        go: null
      },
      normalized: {
        sistema: {},
        estado: {},
        kpis: {},
        clases: [],
        incidencias: [],
        telegram: [],
        bandeja: {},
        timeline: [],
        lecturaOperativa: []
      },
      ui: {
        density: 'dense',
        classFilter: 'todas',
        incidentFilter: 'abiertas'
      }
    };

    /***********************************************************
     * 3. Utilidades
     ***********************************************************/
    const VisionUtils = {
      esc(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      },

      num(value, fallback = 0) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      },

      pct(value, fallback = 0) {
        const n = this.num(value, fallback);
        if (n <= 1 && n > 0) return Math.round(n * 100);
        return Math.max(0, Math.min(100, Math.round(n)));
      },

      text(value, fallback = '') {
        const t = String(value ?? '').trim();
        return t || fallback;
      },

      fmtTime(dateLike) {
        if (!dateLike) return '';
        const d = dateLike instanceof Date ? dateLike : new Date(dateLike);
        if (Number.isNaN(d.getTime())) return String(dateLike);
        return d.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
      },

      fmtDateTime(dateLike) {
        if (!dateLike) return '';
        const d = dateLike instanceof Date ? dateLike : new Date(dateLike);
        if (Number.isNaN(d.getTime())) return String(dateLike);
        return d.toLocaleString('es-CL', { dateStyle: 'short', timeStyle: 'medium' });
      },

      classSeverityClass(item) {
        const raw = String(item?.severidad || item?.estado || '').toUpperCase();
        if (raw.includes('CRITICA') || raw.includes('NO_INICIADA') || raw.includes('ERROR')) return 'danger';
        if (raw.includes('ALTA') || raw.includes('BAJA') || raw.includes('FINALIZACION')) return 'warn';
        if (raw.includes('INICIADA') || raw.includes('OK') || raw.includes('OPERANDO')) return 'ok';
        return 'info';
      },

      badgeClass(raw) {
        const t = String(raw || '').toUpperCase();
        if (t.includes('CRITICA') || t.includes('ERROR') || t.includes('NO_INICIADA')) return 'danger';
        if (t.includes('ALTA') || t.includes('ALERTA') || t.includes('BAJA') || t.includes('FINALIZACION')) return 'warn';
        if (t.includes('OK') || t.includes('OPERANDO') || t.includes('INICIADA')) return 'ok';
        return 'info';
      },

      short(raw, max = 110) {
        const t = String(raw || '').trim();
        return t.length > max ? t.slice(0, max - 1) + '…' : t;
      },

      parseDateTimeFromClass(c) {
        const fecha = c.fecha || c.fechaClase || '';
        const startText = c.horaInicio || c.inicio || '';
        const endText = c.horaFin || c.fin || '';
        return { fecha, startText, endText };
      },

      estimateProgress(c) {
        if (typeof c.avancePct === 'number') return Math.max(0, Math.min(100, c.avancePct));

        const now = new Date();
        const fecha = c.fecha || c.fechaClase;
        const start = this.buildDateWithTime(fecha, c.horaInicio || c.inicio);
        const end = this.buildDateWithTime(fecha, c.horaFin || c.fin);
        if (!start || !end || end <= start) return 0;
        if (now <= start) return 0;
        if (now >= end) return 100;
        return Math.round(((now - start) / (end - start)) * 100);
      },

      buildDateWithTime(fecha, hora) {
        if (!fecha || !hora) return null;
        const f = String(fecha).includes('T') ? new Date(fecha) : null;
        let yyyy, mm, dd;
        if (f && !Number.isNaN(f.getTime())) {
          yyyy = f.getFullYear(); mm = f.getMonth(); dd = f.getDate();
        } else {
          const s = String(fecha);
          let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
          if (m) { yyyy = +m[1]; mm = +m[2] - 1; dd = +m[3]; }
          else {
            m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
            if (!m) return null;
            yyyy = +m[3]; mm = +m[2] - 1; dd = +m[1];
          }
        }
        const hm = String(hora).match(/(\d{1,2}):(\d{2})/);
        if (!hm) return null;
        return new Date(yyyy, mm, dd, +hm[1], +hm[2], 0, 0);
      }
    };

    /***********************************************************
     * 4. Cliente API JSONP
     ***********************************************************/
    const VisionAPI = {
      jsonp(action, params = {}) {
        if (!VisionConfig.GAS_WEB_APP_URL) {
          if (VisionConfig.useMockWhenNoUrl) return Promise.resolve(VisionMock.get(action));
          return Promise.reject(new Error('Falta configurar GAS_WEB_APP_URL.'));
        }

        const callbackName = 'visionCb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const query = new URLSearchParams({
          action,
          callback: callbackName,
          _ts: Date.now(),
          ...params
        });

        const url = VisionConfig.GAS_WEB_APP_URL + '?' + query.toString();

        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          const timeout = setTimeout(() => {
            cleanup();
            reject(new Error('Timeout consultando endpoint: ' + action));
          }, 25000);

          function cleanup() {
            clearTimeout(timeout);
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
          }

          window[callbackName] = data => {
            cleanup();
            resolve(data);
          };

          script.onerror = () => {
            cleanup();
            reject(new Error('Error cargando JSONP: ' + action));
          };

          script.src = url;
          document.head.appendChild(script);
        });
      },

      getLiveSnapshot() {
        return this.jsonp(VisionConfig.endpoints.live);
      },

      getExecutiveSnapshot() {
        return this.jsonp(VisionConfig.endpoints.executive);
      },

      getAnalyticsSnapshot() {
        return this.jsonp(VisionConfig.endpoints.analytics);
      },

      getImplementationHealth() {
        return this.jsonp(VisionConfig.endpoints.implementation);
      },

      runMoodleProbe(sigla) {
        return this.jsonp(VisionConfig.endpoints.moodleRun, { sigla });
      }
    };

    /***********************************************************
     * 5. Adaptadores de datos
     ***********************************************************/
    const VisionAdapters = {
      live(raw) {
        const v = VisionUtils;
        const kpis = raw?.kpis || {};
        const live = raw?.visionEnVivo || raw?.motor || {};
        const inc = raw?.incidencias || {};
        const notif = raw?.notificaciones || {};
        const bandeja = raw?.bandeja || {};

        const clasesSource = live.clases || live.items || raw?.clases || raw?.motor?.clases || [];
        const incidenciasSource = inc.items || inc.abiertasItems || raw?.bandeja?.items || raw?.incidencias?.items || [];
        const telegramSource = notif.items || notif.ultimas || raw?.notificaciones?.items || [];

        const clases = Array.isArray(clasesSource)
          ? clasesSource.map((c, index) => this.classItem(c, index))
          : [];

        const incidencias = Array.isArray(incidenciasSource)
          ? incidenciasSource.map((i, index) => this.incidentItem(i, index))
          : [];

        const telegram = Array.isArray(telegramSource)
          ? telegramSource.map((t, index) => this.telegramItem(t, index))
          : [];

        const timeline = this.timeline(raw, clases, incidencias, telegram);

        return {
          sistema: {
            nombre: v.text(raw?.sistema?.nombre, 'Visión'),
            modulo: v.text(raw?.sistema?.modulo, 'Centro Operativo Inteligente'),
            version: v.text(raw?.sistema?.version, VisionConfig.version),
            generadoEn: v.text(raw?.sistema?.generadoEn, v.fmtDateTime(new Date())),
            generadoEnMs: v.num(raw?.sistema?.generadoEnMs, Date.now()),
            fuente: v.text(raw?.sistema?.fuente, 'Snapshot vivo')
          },
          estado: {
            operativo: v.text(raw?.estado?.operativo, 'OPERANDO'),
            detalle: v.text(raw?.estado?.detalle, 'Visión se encuentra operativo.'),
            modoProduccion: raw?.estado?.modoProduccion,
            telegramActivo: raw?.estado?.telegramActivo,
            horaSimulada: raw?.estado?.horaSimulada
          },
          kpis: {
            clasesMonitoreadasHoy: v.num(kpis.clasesMonitoreadasHoy),
            clasesIniciadasHoy: v.num(kpis.clasesIniciadasHoy),
            clasesConZoomActivoHoy: v.num(kpis.clasesConZoomActivoHoy),
            eventosRegistradosHoy: v.num(kpis.eventosRegistradosHoy),
            incidenciasDetectadasHoy: v.num(kpis.incidenciasDetectadasHoy),
            incidenciasCerradasHoy: v.num(kpis.incidenciasCerradasHoy),
            incidenciasAbiertas: v.num(kpis.incidenciasAbiertas),
            criticasOperativasAbiertas: v.num(kpis.criticasOperativasAbiertas),
            recordatoriosEnviadosHoy: v.num(kpis.recordatoriosEnviadosHoy),
            alertasIncidenciaHoy: v.num(kpis.alertasIncidenciaHoy),
            erroresNotificacionHoy: v.num(kpis.erroresNotificacionHoy),
            participantesTotalHoy: v.num(kpis.participantesTotalHoy),
            agendadosTotalHoy: v.num(kpis.agendadosTotalHoy),
            asistenciaObservadaPctHoy: v.pct(kpis.asistenciaObservadaPctHoy),
            pendientesBandeja: v.num(kpis.pendientesBandeja)
          },
          clases,
          incidencias,
          telegram,
          bandeja: {
            total: v.num(bandeja.total || bandeja.totalBandeja || kpis.pendientesBandeja),
            pendientesRevision: v.num(bandeja.pendientesRevision || kpis.pendientesBandeja),
            abiertasEnBandeja: v.num(bandeja.abiertasEnBandeja),
            resumen: bandeja.resumen || {}
          },
          timeline,
          lecturaOperativa: Array.isArray(raw?.lecturaOperativa)
            ? raw.lecturaOperativa
            : [v.text(raw?.estado?.detalle, 'Visión mantiene lectura operativa activa.')]
        };
      },

      classItem(c, index) {
        const v = VisionUtils;
        const asistenciaRaw = c.asistenciaPct ?? c.asistenciaObservadaPct ?? c.porcentajeAsistencia ?? c.asistencia_observada_pct;
        const participantes = v.num(c.participantes ?? c.maxParticipantes ?? c.participantesTotal, 0);
        const agendados = v.num(c.agendados ?? c.maxAgendados ?? c.agendadosTotal, 0);
        const asistenciaPct = asistenciaRaw !== undefined && asistenciaRaw !== ''
          ? v.pct(asistenciaRaw)
          : agendados > 0 ? Math.round((participantes / agendados) * 100) : 0;

        const out = {
          id: v.text(c.id || c.sigla || c.sigla_curso, 'clase-' + index),
          sigla: v.text(c.sigla || c.sigla_curso || c.curso, 'Sin sigla'),
          programa: v.text(c.programa, ''),
          asignatura: v.text(c.asignatura, 'Asignatura no informada'),
          profesor: v.text(c.profesor || c.docente || c.profesor_rankeado, 'Profesor/a no informado'),
          fecha: v.text(c.fecha || c.fecha_clase, ''),
          horaInicio: v.text(c.horaInicio || c.inicio || c.hora_programada || c.hora_inicio, ''),
          horaFin: v.text(c.horaFin || c.fin || c.hora_fin, ''),
          estado: v.text(c.estado || c.estadoCalculado || c.estado_calculado, 'SIN_ESTADO'),
          severidad: v.text(c.severidad, ''),
          zoomActivo: Boolean(c.zoomActivo ?? c.zoom_activo ?? c.live),
          participantes,
          agendados,
          asistenciaPct,
          avancePct: v.estimateProgress({ ...c, horaInicio: c.horaInicio || c.inicio || c.hora_programada || c.hora_inicio, horaFin: c.horaFin || c.fin || c.hora_fin }),
          accionSugerida: v.text(c.accionSugerida || c.accion_sugerida || c.accion, ''),
          observacion: v.text(c.observacion || c.detalle || c.evaluacion, ''),
          meetingId: v.text(c.meetingId || c.meeting_id, ''),
          linkZoom: v.text(c.linkZoom || c.link_zoom, '')
        };
        return out;
      },

      incidentItem(i, index) {
        const v = VisionUtils;
        return {
          id: v.text(i.id || i.id_incidencia, 'inc-' + index),
          fechaClase: v.text(i.fechaClase || i.fecha_clase, ''),
          timestamp: v.text(i.timestamp || i.timestamp_detectado, ''),
          sigla: v.text(i.sigla || i.sigla_curso, 'Sin sigla'),
          programa: v.text(i.programa, ''),
          asignatura: v.text(i.asignatura, ''),
          profesor: v.text(i.profesor, ''),
          estadoDetectado: v.text(i.estadoDetectado || i.estado_detectado, 'SIN_ESTADO'),
          severidad: v.text(i.severidad || i.prioridad_revision, ''),
          estadoIncidencia: v.text(i.estadoIncidencia || i.estado_incidencia, ''),
          estadoRevision: v.text(i.estadoRevision || i.estado_revision, ''),
          responsable: v.text(i.responsableRevision || i.responsable_revision || i.responsable_alertado, ''),
          accion: v.text(i.accionAutomatica || i.accion_automatica || i.accion_tomada || i.accion, ''),
          observacion: v.text(i.observacionRevision || i.observacion_revision || i.observacion, '')
        };
      },

      telegramItem(t, index) {
        const v = VisionUtils;
        return {
          id: v.text(t.id || t.clave || t.id_notificacion, 'tg-' + index),
          fecha: v.text(t.fecha || t.fecha_clase || t.timestamp_envio, ''),
          hora: v.text(t.hora || '', ''),
          tipo: v.text(t.tipo || t.tipo_notificacion || t.evento, 'NOTIFICACION'),
          resultado: v.text(t.resultado || t.estado || 'ENVIADO', ''),
          destinatario: v.text(t.destinatario || t.nombre || t.chat_id, ''),
          sigla: v.text(t.sigla || t.sigla_curso, ''),
          mensaje: v.text(t.mensaje || t.texto || t.respuesta || t.detalle, '')
        };
      },

      timeline(raw, clases, incidencias, telegram) {
        const out = [];
        telegram.slice(0, 8).forEach(t => out.push({
          type: 'telegram',
          icon: '✉',
          title: t.tipo + (t.sigla ? ' · ' + t.sigla : ''),
          text: (t.resultado ? t.resultado + '. ' : '') + (t.mensaje || 'Notificación registrada en LOG_NOTIFICACIONES.'),
          time: t.fecha || t.hora || ''
        }));

        incidencias.slice(0, 8).forEach(i => out.push({
          type: 'incidencia',
          icon: '!',
          title: i.estadoDetectado + ' · ' + i.sigla,
          text: (i.responsable ? 'Responsable: ' + i.responsable + '. ' : '') + (i.observacion || i.accion || 'Incidencia operativa registrada.'),
          time: i.timestamp || i.fechaClase || ''
        }));

        clases.slice(0, 8).forEach(c => out.push({
          type: 'clase',
          icon: '▶',
          title: c.estado + ' · ' + c.sigla,
          text: c.asignatura + ' · ' + c.profesor + ' · ' + (c.zoomActivo ? 'Zoom activo' : 'Zoom no activo'),
          time: c.horaInicio || ''
        }));

        return out.slice(0, 16);
      }
    };

    /***********************************************************
     * 6. Componentes
     ***********************************************************/
    const VisionComponents = {
      kpi(label, value, note = '') {
        return `
          <div class="kpi-card">
            <div class="kpi-label">${VisionUtils.esc(label)}</div>
            <div class="kpi-value">${VisionUtils.esc(value)}</div>
            <div class="kpi-note">${VisionUtils.esc(note)}</div>
          </div>`;
      },

      badge(label, tone) {
        return `<span class="badge ${tone || VisionUtils.badgeClass(label)}">${VisionUtils.esc(label)}</span>`;
      },

      classCard(c) {
        const tone = VisionUtils.classSeverityClass(c);
        const active = VisionState.selectedItemType === 'class' && VisionState.selectedItem?.id === c.id ? 'active' : '';
        const pct = Math.max(0, Math.min(100, VisionUtils.num(c.asistenciaPct)));
        const avance = Math.max(0, Math.min(100, VisionUtils.num(c.avancePct)));
        const zoomBadge = c.zoomActivo ? this.badge('ZOOM ACTIVO', 'ok') : this.badge('ZOOM NO ACTIVO', 'neutral');
        const estadoBadge = this.badge(c.estado, VisionUtils.badgeClass(c.estado));
        const sevBadge = c.severidad ? this.badge(c.severidad, VisionUtils.badgeClass(c.severidad)) : '';

        const accion = c.accionSugerida || c.observacion || 'Sin acción sugerida registrada para este snapshot.';
        return `
          <article class="class-card ${tone} ${active}" role="button" tabindex="0" onclick="VisionActions.selectItem('class','${VisionUtils.esc(c.id)}')">
            <div class="class-head">
              <div class="class-title-row">
                <div>
                  <h3 class="class-title">${VisionUtils.esc(c.sigla)}</h3>
                  <div class="class-subtitle">${VisionUtils.esc(c.asignatura)} · ${VisionUtils.esc(c.programa || 'Programa no informado')}</div>
                </div>
                <div class="class-time-chip">${VisionUtils.esc(c.horaInicio || '—')} - ${VisionUtils.esc(c.horaFin || '—')}</div>
              </div>
              <div class="class-badges">${estadoBadge}${zoomBadge}${sevBadge}</div>
            </div>
            <div class="donut-box">
              <div class="donut" style="--pct:${pct}"><div class="donut-inner">${pct}%</div></div>
              <div class="donut-caption">Asistencia observada<br>${VisionUtils.esc(c.participantes)} / ${VisionUtils.esc(c.agendados)}</div>
            </div>
            <div class="class-meta">
              <div class="class-meta-card"><small>Profesor/a</small><strong>${VisionUtils.esc(c.profesor)}</strong></div>
              <div class="class-meta-card"><small>Estado Zoom</small><strong>${VisionUtils.esc(c.zoomActivo ? 'Sala activa detectada' : 'Sin sala activa detectada')}</strong></div>
              <div class="class-meta-card"><small>Meeting ID</small><strong>${VisionUtils.esc(c.meetingId || 'No informado')}</strong></div>
              <div class="class-meta-card"><small>Fecha</small><strong>${VisionUtils.esc(c.fecha || 'No informada')}</strong></div>
            </div>
            <div class="class-action">
              <div class="class-action-title">Acción sugerida / observación</div>
              <div class="class-action-text">${VisionUtils.esc(VisionUtils.short(accion, 230))}</div>
            </div>
            <div class="progress-block">
              <div class="progress-label"><span>Avance de clase</span><b>${avance}%</b></div>
              <div class="progress-track"><div class="progress-fill" style="width:${avance}%"></div></div>
            </div>
          </article>`;
      },

      timelineItem(item) {
        return `
          <div class="timeline-item">
            <div class="timeline-icon">${VisionUtils.esc(item.icon || '•')}</div>
            <div>
              <div class="timeline-title">${VisionUtils.esc(item.title)}</div>
              <div class="timeline-text">${VisionUtils.esc(VisionUtils.short(item.text, 180))}</div>
            </div>
          </div>`;
      },

      incidentCard(i) {
        return `
          <div class="mini-card" onclick="VisionActions.selectItem('incident','${VisionUtils.esc(i.id)}')">
            <div class="mini-title">
              <span>${VisionUtils.esc(i.sigla)} · ${VisionUtils.esc(i.estadoDetectado)}</span>
              ${this.badge(i.severidad || i.estadoRevision || 'INC', VisionUtils.badgeClass(i.severidad || i.estadoRevision))}
            </div>
            <div class="mini-text">${VisionUtils.esc(VisionUtils.short(i.observacion || i.accion || 'Incidencia registrada para revisión operativa.', 150))}</div>
          </div>`;
      },

      telegramCard(t) {
        return `
          <div class="mini-card" onclick="VisionActions.selectItem('telegram','${VisionUtils.esc(t.id)}')">
            <div class="mini-title">
              <span>${VisionUtils.esc(t.tipo)} ${t.sigla ? '· ' + VisionUtils.esc(t.sigla) : ''}</span>
              ${this.badge(t.resultado || 'LOG', VisionUtils.badgeClass(t.resultado))}
            </div>
            <div class="mini-text">${VisionUtils.esc(VisionUtils.short(t.mensaje || 'Evento de notificación registrado.', 150))}</div>
          </div>`;
      },

      empty(text) {
        return `<div class="empty-state">${VisionUtils.esc(text)}</div>`;
      }
    };

    /***********************************************************
     * 7. Vistas
     ***********************************************************/
    const VisionViews = {
      render() {
        const app = document.getElementById('app');
        app.innerHTML = `
          ${this.topbar()}
          ${this.ribbon()}
          <div class="workbench">
            ${this.sidebar()}
            ${this.main()}
            ${this.inspector()}
          </div>
          ${this.statusbar()}
        `;
      },

      topbar() {
        const s = VisionState.normalized.sistema;
        const e = VisionState.normalized.estado;
        const operativo = e.operativo || 'OPERANDO';
        const tone = operativo === 'ALERTA' ? 'danger' : 'ok';
        return `
          <header class="topbar">
            <div class="brand">
              <div class="brand-mark" aria-hidden="true"></div>
              <div class="brand-text">
                <div class="brand-title">Visión | Centro Operativo Inteligente</div>
                <div class="brand-subtitle">${VisionUtils.esc(s.modulo || 'Asistente virtual de operación, monitoreo, alertas y trazabilidad')}</div>
              </div>
            </div>
            <div class="topbar-status">
              <span class="pill ${tone}"><span class="pulse"></span>${VisionUtils.esc(operativo)}</span>
              <span class="pill info">${VisionUtils.esc(VisionConfig.version)}</span>
              <span class="pill">Último snapshot: ${VisionUtils.esc(s.generadoEn || '—')}</span>
              <span class="pill">Refresco: <span id="countdownTop">${VisionState.nextRefreshIn}</span>s</span>
            </div>
          </header>`;
      },

      ribbon() {
        const tabs = [
          ['inicio', 'Inicio'],
          ['operacion', 'Operación'],
          ['incidencias', 'Incidencias'],
          ['telegram', 'Telegram'],
          ['implementacion', 'Implementación'],
          ['moodle', 'Moodle'],
          ['analitica', 'Analítica'],
          ['config', 'Configuración']
        ];

        return `
              <nav class="ribbon">
            <div class="ribbon-tabs">
              <button class="ribbon-file-tab" onclick="VisionActions.setTab('inicio')">Archivo</button>
              ${tabs.map(([id, label]) => `<button class="ribbon-tab ${VisionState.currentTab === id ? 'active' : ''}" onclick="VisionActions.setTab('${id}')">${label}</button>`).join('')}
            </div>
            <div class="ribbon-body">
              ${this.ribbonGroups()}
            </div>
          </nav>`;
      },

      ribbonGroups() {
        const tab = VisionState.currentTab;
        const group = (label, buttons) => `
          <div class="ribbon-group">
            <div class="ribbon-buttons">${buttons}</div>
            <div class="ribbon-label">${VisionUtils.esc(label)}</div>
          </div>`;
        const btn = (icon, text, action, primary = false) => `
          <button class="ribbon-btn ${primary ? 'primary' : ''}" onclick="${action}">
            <span class="ribbon-icon">${icon}</span><span>${text}</span>
          </button>`;

        if (tab === 'operacion') {
          return [
            group('Snapshot vivo', btn('↻', 'Actualizar', 'VisionActions.refreshNow()', true) + btn('▣', 'Denso', 'VisionActions.toggleDensity()')),
            group('Clases', btn('▶', 'Activas', "VisionActions.setClassFilter('activas')") + btn('◷', 'Próximas', "VisionActions.setClassFilter('proximas')") + btn('✓', 'Todas', "VisionActions.setClassFilter('todas')")),
            group('Asistente', btn('☷', 'Timeline', "VisionActions.scrollToPanel('timelinePanel')") + btn('✉', 'Telegram', "VisionActions.setTab('telegram')") + btn('!', 'Casos', "VisionActions.setTab('incidencias')"))
          ].join('');
        }

        if (tab === 'incidencias') {
          return [
            group('Bandeja', btn('!', 'Críticas', "VisionActions.setIncidentFilter('criticas')", true) + btn('□', 'Abiertas', "VisionActions.setIncidentFilter('abiertas')") + btn('✓', 'Todas', "VisionActions.setIncidentFilter('todas')")),
            group('Gestión', btn('⇢', 'Inspector', 'VisionActions.openInspector()') + btn('↻', 'Actualizar', 'VisionActions.refreshNow()'))
          ].join('');
        }

        if (tab === 'telegram') {
          return [
            group('LOG_NOTIFICACIONES', btn('↻', 'Actualizar', 'VisionActions.refreshNow()', true) + btn('🔔', 'Alertas', "VisionActions.setTab('telegram')")),
            group('Cruce', btn('!', 'Incidencias', "VisionActions.setTab('incidencias')") + btn('▶', 'Clases', "VisionActions.setTab('operacion')"))
          ].join('');
        }

        return [
          group('Operación', btn('↻', 'Actualizar', 'VisionActions.refreshNow()', true) + btn('▶', 'Vivo', "VisionActions.setTab('operacion')")),
          group('Gestión', btn('!', 'Incid.', "VisionActions.setTab('incidencias')") + btn('✉', 'Telegram', "VisionActions.setTab('telegram')")),
          group('Sistema', btn('⚙', 'Config', "VisionActions.setTab('config')") + btn('☷', 'Inicio', "VisionActions.setTab('inicio')"))
        ].join('');
      },

      sidebar() {
        const k = VisionState.normalized.kpis;
        const items = [
          ['inicio', '⌂', 'Resumen del día', ''],
          ['operacion', '▶', 'Operación en vivo', k.clasesMonitoreadasHoy],
          ['incidencias', '!', 'Incidencias abiertas', k.incidenciasAbiertas],
          ['telegram', '✉', 'Telegram hoy', (k.recordatoriosEnviadosHoy || 0) + (k.alertasIncidenciaHoy || 0)],
          ['implementacion', '▧', 'Salud implementación', ''],
          ['moodle', 'M', 'Diagnóstico Moodle', ''],
          ['analitica', '▥', 'Analítica', ''],
          ['config', '⚙', 'Configuración', '']
        ];
        return `
          <aside class="sidebar">
            <div class="sidebar-head">
              <div class="assistant-tile">
                <div class="assistant-avatar"></div>
                <div>
                  <div class="assistant-name">Asistente Visión</div>
                  <div class="assistant-status">Observando operación, incidencias, Telegram y salud del servicio.</div>
                </div>
              </div>
              <div class="backstage-summary">
                <div class="backstage-kpi"><small>Clases</small><strong>${VisionUtils.esc(k.clasesMonitoreadasHoy || 0)}</strong></div>
                <div class="backstage-kpi"><small>Zoom live</small><strong>${VisionUtils.esc(k.clasesConZoomActivoHoy || 0)}</strong></div>
                <div class="backstage-kpi"><small>Incidencias</small><strong>${VisionUtils.esc(k.incidenciasAbiertas || 0)}</strong></div>
                <div class="backstage-kpi"><small>Telegram</small><strong>${VisionUtils.esc((k.recordatoriosEnviadosHoy || 0) + (k.alertasIncidenciaHoy || 0))}</strong></div>
              </div>
            </div>
            <div class="nav-list">
              ${items.map(([id, icon, label, count]) => `
                <button class="nav-item ${VisionState.currentTab === id ? 'active' : ''}" onclick="VisionActions.setTab('${id}')">
                  <span class="nav-icon">${icon}</span>
                  <span class="truncate">${label}</span>
                  <span class="nav-count">${count === '' ? '·' : VisionUtils.esc(count)}</span>
                </button>`).join('')}
            </div>
            <div class="sidebar-foot">
              <div><b>Fuente:</b> ${VisionUtils.esc(VisionState.normalized.sistema.fuente || 'Snapshot vivo')}</div>
              <div><b>Estado:</b> ${VisionUtils.esc(VisionState.normalized.estado.detalle || 'Sin lectura disponible')}</div>
            </div>
          </aside>`;
      },

      main() {
        const map = {
          inicio: ['Resumen del día', 'Lectura ejecutiva de Visión con señales vivas del sistema.', this.viewInicio()],
          operacion: ['Operación en vivo', 'Clases, avance temporal, Zoom, participantes, agendados y timeline operativo.', this.viewOperacion()],
          incidencias: ['Incidencias y bandeja humana', 'Casos operativos priorizados para revisión y trazabilidad.', this.viewIncidencias()],
          telegram: ['Telegram / Comunicaciones', 'Mirror operacional desde LOG_NOTIFICACIONES.', this.viewTelegram()],
          implementacion: ['Salud de implementación', 'Prevalidación de cursos, nodos críticos y acciones recomendadas.', this.placeholder('Salud de implementación quedará conectada al endpoint visionImplementationHealthSnapshot.')],
          moodle: ['Diagnóstico Moodle', 'Diagnóstico dirigido por sigla, nodos, brechas y matriz de comparación.', this.placeholder('Módulo Moodle preparado para visionRunMoodleImplementationProbe.')],
          analitica: ['Analítica consolidada', 'Histórico Visión + Zoom + GO.', this.placeholder('Analítica preparada para visionAnalyticsSnapshotV2.')],
          config: ['Configuración y salud técnica', 'Modo producción, fuentes, triggers y estado del frontend.', this.viewConfig()]
        };
        const [title, subtitle, body] = map[VisionState.currentTab] || map.operacion;
        return `
          <main class="main">
            <div class="view-head">
              <div>
                <h1 class="view-title">${VisionUtils.esc(title)}</h1>
                <div class="view-subtitle">${VisionUtils.esc(subtitle)}</div>
              </div>
              <div class="view-actions">
                <button class="action-btn primary" onclick="VisionActions.refreshNow()">Actualizar ahora</button>
                <button class="action-btn" onclick="VisionActions.setTab('operacion')">Operación viva</button>
              </div>
            </div>
            <div class="view-scroll">${body}</div>
          </main>`;
      },

      viewInicio() {
        const k = VisionState.normalized.kpis;
        return `
          ${this.kpiRow()}
          ${this.liveCommandStrip()}
          <div class="section-grid">
            <section class="panel">
              <div class="panel-header">
                <div><h2 class="panel-title">Lectura operativa automática</h2><div class="panel-subtitle">Síntesis generada desde las fuentes vivas.</div></div>
              </div>
              <div class="panel-body">
                ${(VisionState.normalized.lecturaOperativa || []).map(x => `<div class="mini-card"><div class="mini-text">${VisionUtils.esc(typeof x === 'string' ? x : JSON.stringify(x))}</div></div>`).join('') || VisionComponents.empty('Sin lectura operativa disponible.')}
              </div>
            </section>
            <section class="panel">
              <div class="panel-header"><div><h2 class="panel-title">Actividad reciente</h2><div class="panel-subtitle">Últimas señales del asistente.</div></div></div>
              <div class="panel-body timeline">${this.timelineItems(8)}</div>
            </section>
          </div>`;
      },

      viewOperacion() {
        const clases = this.filteredClasses();
        return `
          ${this.kpiRow()}
          <div class="section-grid">
            <section class="panel">
              <div class="panel-header">
                <div><h2 class="panel-title">Clases monitoreadas</h2><div class="panel-subtitle">Vista densa: profesor, horario, Zoom, avance, participantes y agendados.</div></div>
                ${VisionComponents.badge(`${clases.length} clases`, 'info')}
              </div>
              <div class="panel-body">
                <div class="class-grid">${clases.map(c => VisionComponents.classCard(c)).join('') || VisionComponents.empty('No hay clases en el snapshot vivo actual.')}</div>
              </div>
            </section>
            <section class="panel" id="timelinePanel">
              <div class="panel-header"><div><h2 class="panel-title">Timeline vivo</h2><div class="panel-subtitle">Eventos recientes construidos desde clases, incidencias y Telegram.</div></div></div>
              <div class="panel-body timeline">${this.timelineItems(14)}</div>
            </section>
          </div>`;
      },

      viewIncidencias() {
        const items = this.filteredIncidents();
        return `
          ${this.kpiRow()}
          <section class="panel">
            <div class="panel-header">
              <div><h2 class="panel-title">Casos operativos</h2><div class="panel-subtitle">Incidencias como unidades de trabajo, no como simples filas.</div></div>
              ${VisionComponents.badge(`${items.length} casos`, 'warn')}
            </div>
            <div class="panel-body incident-list">
              ${items.map(i => VisionComponents.incidentCard(i)).join('') || VisionComponents.empty('No hay incidencias para el filtro actual.')}
            </div>
          </section>`;
      },

      viewTelegram() {
        const items = VisionState.normalized.telegram || [];
        return `
          ${this.kpiRow()}
          <section class="panel">
            <div class="panel-header">
              <div><h2 class="panel-title">Mirror LOG_NOTIFICACIONES</h2><div class="panel-subtitle">La voz operativa de Visión: recordatorios, alertas, errores y trazabilidad.</div></div>
              ${VisionComponents.badge(`${items.length} registros`, 'info')}
            </div>
            <div class="panel-body feed-list">
              ${items.map(t => VisionComponents.telegramCard(t)).join('') || VisionComponents.empty('No hay registros de Telegram disponibles en el snapshot actual.')}
            </div>
          </section>`;
      },

      viewConfig() {
        const s = VisionState.normalized.sistema;
        const e = VisionState.normalized.estado;
        return `
          <section class="panel">
            <div class="panel-header"><div><h2 class="panel-title">Estado técnico visible</h2><div class="panel-subtitle">Parámetros frontend y lectura del snapshot.</div></div></div>
            <div class="panel-body detail-grid">
              ${this.detailRow('Frontend', VisionConfig.version)}
              ${this.detailRow('GAS URL configurada', VisionConfig.GAS_WEB_APP_URL ? 'SI' : 'NO · usando mock local')}
              ${this.detailRow('Endpoint vivo', VisionConfig.endpoints.live)}
              ${this.detailRow('Fuente', s.fuente || '—')}
              ${this.detailRow('Generado en', s.generadoEn || '—')}
              ${this.detailRow('Estado operativo', e.operativo || '—')}
              ${this.detailRow('Detalle', e.detalle || '—')}
              ${this.detailRow('Refresco', VisionConfig.refreshSeconds + ' segundos')}
            </div>
          </section>`;
      },

      placeholder(text) {
        return `<section class="panel"><div class="panel-body">${VisionComponents.empty(text)}</div></section>`;
      },

      kpiRow() {
        const k = VisionState.normalized.kpis;
        return `<div class="grid-kpi">
          ${VisionComponents.kpi('Clases monitoreadas', k.clasesMonitoreadasHoy, 'Snapshot vivo')}
          ${VisionComponents.kpi('Zoom activo', k.clasesConZoomActivoHoy, 'Clases con evidencia live')}
          ${VisionComponents.kpi('Eventos hoy', k.eventosRegistradosHoy, 'EVENTOS_CLASE')}
          ${VisionComponents.kpi('Incidencias abiertas', k.incidenciasAbiertas, 'Casos vigentes')}
          ${VisionComponents.kpi('Críticas operativas', k.criticasOperativasAbiertas, 'Requieren atención')}
          ${VisionComponents.kpi('Telegram hoy', (k.recordatoriosEnviadosHoy || 0) + (k.alertasIncidenciaHoy || 0), 'Recordatorios + alertas')}
        </div>`;
      },

      liveCommandStrip() {
        const k = VisionState.normalized.kpis;
        const e = VisionState.normalized.estado;
        const clases = VisionState.normalized.clases || [];
        const activas = clases.filter(c => c.zoomActivo || /INICIADA|BAJA|PROFESOR|SIN_ESTUDIANTES/i.test(c.estado)).length;
        const criticas = k.criticasOperativasAbiertas || 0;
        const telegram = (k.recordatoriosEnviadosHoy || 0) + (k.alertasIncidenciaHoy || 0);
        const lectura = criticas > 0
          ? 'Visión detecta incidencias críticas operativas abiertas. Conviene revisar la bandeja y validar si corresponde escalar a Implementación o contactar al profesor.'
          : activas > 0
            ? 'Visión observa clases en desarrollo. La prioridad es mantener seguimiento de Zoom activo, asistencia observada y eventuales alertas.'
            : 'Visión no detecta clases activas en este snapshot. Se mantiene la vigilancia sobre clases próximas, incidencias y Telegram.';
        return `
          <div class="live-command">
            <section class="assistant-readout">
              <div class="readout-avatar"></div>
              <div class="readout-content">
                <div class="readout-kicker"><span class="pulse"></span> Lectura del asistente</div>
                <div class="readout-title">${VisionUtils.esc(e.operativo || 'OPERANDO')} · Visión está trabajando</div>
                <div class="readout-text">${VisionUtils.esc(lectura)}</div>
              </div>
            </section>
            <section class="ops-board">
              <div class="ops-chip"><div class="ops-chip-label">Clases activas</div><div class="ops-chip-value">${VisionUtils.esc(activas)}</div><div class="ops-chip-note">Zoom o estado operativo en curso</div></div>
              <div class="ops-chip"><div class="ops-chip-label">Críticas</div><div class="ops-chip-value">${VisionUtils.esc(criticas)}</div><div class="ops-chip-note">Prioridad de revisión</div></div>
              <div class="ops-chip"><div class="ops-chip-label">Telegram</div><div class="ops-chip-value">${VisionUtils.esc(telegram)}</div><div class="ops-chip-note">Mensajes operativos hoy</div></div>
              <div class="ops-chip"><div class="ops-chip-label">Bandeja</div><div class="ops-chip-value">${VisionUtils.esc(k.pendientesBandeja || 0)}</div><div class="ops-chip-note">Pendientes de gestión humana</div></div>
            </section>
          </div>`;
      },

      timelineItems(max) {
        return (VisionState.normalized.timeline || []).slice(0, max).map(t => VisionComponents.timelineItem(t)).join('') || VisionComponents.empty('Sin eventos recientes para mostrar.');
      },

      filteredClasses() {
        const list = VisionState.normalized.clases || [];
        const f = VisionState.ui.classFilter;
        if (f === 'activas') return list.filter(c => c.zoomActivo || /INICIADA|BAJA|PROFESOR|SIN_ESTUDIANTES/i.test(c.estado));
        if (f === 'proximas') return list.filter(c => /PROXIMA|VENTANA|ESPERANDO/i.test(c.estado));
        return list;
      },

      filteredIncidents() {
        const list = VisionState.normalized.incidencias || [];
        const f = VisionState.ui.incidentFilter;
        if (f === 'criticas') return list.filter(i => /CRITICA|ALTA|NO_INICIADA/i.test(i.severidad + ' ' + i.estadoDetectado));
        if (f === 'abiertas') return list.filter(i => !/CERRADA/i.test(i.estadoIncidencia));
        return list;
      },

      inspector() {
        const item = VisionState.selectedItem;
        const type = VisionState.selectedItemType;
        if (!item) {
          return `
            <aside class="inspector">
              <div class="inspector-head"><h2 class="inspector-title">Inspector</h2><div class="inspector-subtitle">Seleccione una clase, incidencia o notificación.</div></div>
              <div class="inspector-body">${VisionComponents.empty('El inspector contextual mostrará evidencia, trazabilidad y acciones sugeridas.')}</div>
            </aside>`;
        }
        return `
          <aside class="inspector">
            <div class="inspector-head"><h2 class="inspector-title">${VisionUtils.esc(this.inspectorTitle(type, item))}</h2><div class="inspector-subtitle">Detalle contextual de la unidad seleccionada.</div></div>
            <div class="inspector-body detail-grid">${this.inspectorDetails(type, item)}</div>
          </aside>`;
      },

      inspectorTitle(type, item) {
        if (type === 'class') return item.sigla || 'Clase';
        if (type === 'incident') return item.id || 'Incidencia';
        if (type === 'telegram') return item.tipo || 'Telegram';
        return 'Detalle';
      },

      inspectorDetails(type, item) {
        return Object.entries(item).map(([k, v]) => this.detailRow(k, typeof v === 'object' ? JSON.stringify(v) : v)).join('');
      },

      detailRow(k, v) {
        return `<div class="detail-row"><div class="detail-key">${VisionUtils.esc(k)}</div><div class="detail-value">${VisionUtils.esc(v || '—')}</div></div>`;
      },

      statusbar() {
        const s = VisionState.normalized.sistema;
        return `
          <footer class="statusbar">
            <div class="statusbar-left">
              <span class="truncate">Fuente viva: ${VisionUtils.esc(s.fuente || 'Sin fuente')}</span>
              <span>Última actualización: ${VisionUtils.esc(s.generadoEn || '—')}</span>
            </div>
            <div class="statusbar-right">
              <span>Tab: ${VisionUtils.esc(VisionState.currentTab)}</span>
              <span>Próximo refresco: <span id="countdownBottom">${VisionState.nextRefreshIn}</span>s</span>
            </div>
          </footer>`;
      }
    };

    /***********************************************************
     * 8. Acciones
     ***********************************************************/
    const VisionActions = {
      setTab(tab) {
        VisionState.currentTab = tab;
        VisionViews.render();
      },

      selectItem(type, id) {
        const sources = {
          class: VisionState.normalized.clases,
          incident: VisionState.normalized.incidencias,
          telegram: VisionState.normalized.telegram
        };
        VisionState.selectedItemType = type;
        VisionState.selectedItem = (sources[type] || []).find(x => x.id === id) || null;
        VisionViews.render();
      },

      setClassFilter(filter) {
        VisionState.ui.classFilter = filter;
        VisionViews.render();
      },

      setIncidentFilter(filter) {
        VisionState.ui.incidentFilter = filter;
        VisionViews.render();
      },

      toggleDensity() {
        VisionState.ui.density = VisionState.ui.density === 'dense' ? 'compact' : 'dense';
        VisionViews.render();
      },

      refreshNow() {
        VisionApp.loadLive();
      },

      openInspector() {
        // En desktop ya está visible. Reservado para versión móvil/modal.
      },

      scrollToPanel(id) {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    };

    /***********************************************************
     * 9. App
     ***********************************************************/
    const VisionApp = {
      async init() {
        this.showLoaderProgress(15, 'Preparando shell de aplicación.');
        VisionViews.render();
        await this.loadLive();
        this.startTimers();
      },

      async loadLive() {
        try {
          VisionState.loading = true;
          VisionState.error = null;
          this.showLoader(false);
          this.showLoaderProgress(28, 'Leyendo EVENTOS_CLASE, INCIDENCIAS y LOG_NOTIFICACIONES.');

          const raw = await VisionAPI.getLiveSnapshot();
          this.showLoaderProgress(68, 'Normalizando clases, incidencias, Telegram y bandeja.');

          VisionState.snapshots.live = raw;
          VisionState.normalized = VisionAdapters.live(raw);
          VisionState.lastRefresh = new Date();
          VisionState.nextRefreshIn = VisionConfig.refreshSeconds;

          this.showLoaderProgress(92, 'Renderizando cabina operativa.');
          VisionViews.render();
          this.showLoaderProgress(100, 'Visión operativo.');
          setTimeout(() => this.hideLoader(), 350);

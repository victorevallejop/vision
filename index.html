<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visión | Frontend vNext</title>

  <style>
    :root {
      --app-bg: #0b1220;
      --app-bg-2: #111f36;
      --app-bg-3: #071426;
      --surface: #ffffff;
      --surface-soft: #f5f8fc;
      --surface-strong: #eaf2fb;
      --ink: #122033;
      --muted: #64748b;
      --line: rgba(120, 150, 180, .28);
      --line-strong: rgba(90, 120, 155, .42);
      --blue: #1d7df2;
      --blue-2: #54b6ff;
      --cyan: #7ee7ff;
      --green: #1f9d63;
      --orange: #f97316;
      --yellow: #b98000;
      --red: #d92d20;
      --purple: #7657d8;
      --shadow: 0 10px 22px rgba(0, 0, 0, .14);
      --shadow-soft: 0 4px 12px rgba(11, 31, 58, .06);
      --radius-xl: 10px;
      --radius-lg: 8px;
      --radius-md: 6px;
      --radius-sm: 4px;
      --topbar-h: 46px;
      --ribbon-h: 98px;
      --statusbar-h: 28px;
      --sidebar-w: 242px;
      --inspector-w: 348px;
      --font: "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(circle at 12% -10%, rgba(84, 182, 255, .30), transparent 32%),
        radial-gradient(circle at 95% 6%, rgba(126, 231, 255, .16), transparent 36%),
        linear-gradient(135deg, var(--app-bg-3) 0%, var(--app-bg-2) 58%, #050b14 100%);
      overflow: hidden;
    }

    button, input, select { font: inherit; }

    button { cursor: pointer; }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: var(--topbar-h) var(--ribbon-h) minmax(0, 1fr) var(--statusbar-h);
      color: var(--ink);
    }

    /* =========================================================
       Topbar
       ========================================================= */
    .topbar {
      height: var(--topbar-h);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      color: #eef7ff;
      border-bottom: 1px solid rgba(148, 184, 220, .18);
      background: rgba(8, 18, 34, .72);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 38% 28%, rgba(126, 231, 255, .95), transparent 28%),
        linear-gradient(135deg, rgba(29, 125, 242, .96), rgba(8, 45, 94, .96));
      box-shadow: 0 10px 22px rgba(0, 0, 0, .28);
      position: relative;
      overflow: hidden;
    }

    .brand-mark::after {
      content: "";
      width: 14px;
      height: 7px;
      border: 2px solid rgba(255,255,255,.9);
      border-top: 0;
      border-radius: 0 0 12px 12px;
      transform: translateY(3px);
    }

    .brand-text { min-width: 0; }

    .brand-title {
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.05;
      font-size: 15px;
    }

    .brand-subtitle {
      margin-top: 1px;
      font-size: 10px;
      color: rgba(234, 246, 255, .74);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-status {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color: rgba(238,247,255,.88);
      font-size: 10.5px;
      font-weight: 850;
      white-space: nowrap;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(31, 157, 99, .58);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(31,157,99,.58); }
      70% { box-shadow: 0 0 0 9px rgba(31,157,99,0); }
      100% { box-shadow: 0 0 0 0 rgba(31,157,99,0); }
    }

    .pill.ok { background: rgba(31,157,99,.18); border-color: rgba(31,157,99,.38); color: #ddfff0; }
    .pill.warn { background: rgba(249,115,22,.18); border-color: rgba(249,115,22,.38); color: #fff3e8; }
    .pill.danger { background: rgba(217,45,32,.18); border-color: rgba(217,45,32,.38); color: #ffe9e6; }
    .pill.info { background: rgba(29,125,242,.18); border-color: rgba(84,182,255,.38); color: #e8f5ff; }

    /* =========================================================
       Ribbon
       ========================================================= */
    .ribbon {
      height: var(--ribbon-h);
      display: grid;
      grid-template-rows: 30px minmax(0, 1fr);
      color: #eef7ff;
      border-bottom: 1px solid rgba(148, 184, 220, .18);
      background: linear-gradient(180deg, rgba(12, 28, 51, .98), rgba(10, 22, 39, .94));
    }

    .ribbon-tabs {
      display: flex;
      gap: 2px;
      align-items: end;
      padding: 0 10px;
      overflow-x: auto;
      overflow-y: hidden;
      border-bottom: 1px solid rgba(255,255,255,.08);
      scrollbar-gutter: stable;
    }

    .ribbon-file-tab,
    .ribbon-tab {
      appearance: none;
      height: 27px;
      padding: 0 11px;
      border: 1px solid transparent;
      border-radius: 9px 9px 0 0;
      font-weight: 850;
      font-size: 11px;
      white-space: nowrap;
    }

    .ribbon-file-tab {
      color: #fff;
      background: linear-gradient(135deg, #0b4fa4, #1d7df2);
      border-color: rgba(126,231,255,.32);
      margin-right: 4px;
      box-shadow: 0 -3px 14px rgba(29,125,242,.20);
    }

    .ribbon-tab {
      color: rgba(238,247,255,.78);
      background: transparent;
    }

    .ribbon-tab.active {
      color: #09203d;
      background: linear-gradient(180deg, #ffffff, #eef6ff);
      border-color: rgba(148,184,220,.28);
      box-shadow: 0 -4px 18px rgba(255,255,255,.08);
    }

    .ribbon-body {
      display: flex;
      align-items: stretch;
      gap: 8px;
      padding: 7px 9px 8px;
      overflow-x: auto;
      overflow-y: hidden;
      overscroll-behavior: contain;
      background:
        linear-gradient(90deg, rgba(84,182,255,.07), transparent 28%, rgba(118,87,216,.06)),
        rgba(255,255,255,.025);
    }

    .ribbon-group {
      min-width: 132px;
      display: grid;
      grid-template-rows: 1fr 16px;
      gap: 3px;
      border: 1px solid rgba(255,255,255,.105);
      border-radius: 8px;
      padding: 6px;
      background: linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.038));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.07);
      position: relative;
    }

    .ribbon-group::after {
      content: "";
      position: absolute;
      right: -5px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: rgba(255,255,255,.12);
    }

    .ribbon-group:last-child::after { display: none; }

    .ribbon-buttons {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }

    .ribbon-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 9px;
      background: rgba(255,255,255,.075);
      color: rgba(238,247,255,.88);
      min-width: 50px;
      padding: 5px 6px;
      display: grid;
      place-items: center;
      gap: 3px;
      font-size: 10.5px;
      font-weight: 850;
      line-height: 1.05;
      white-space: nowrap;
    }

    .ribbon-btn:hover { background: rgba(255,255,255,.14); transform: translateY(-1px); }
    .ribbon-btn.primary { background: linear-gradient(135deg, var(--blue), var(--blue-2)); border-color: rgba(126,231,255,.45); color: #fff; }

    .ribbon-icon { font-size: 15px; line-height: 1; }
    .ribbon-label { text-align: center; color: rgba(238,247,255,.68); font-size: 10px; font-weight: 900; letter-spacing: .02em; }

    .ribbon-tabs::-webkit-scrollbar,
    .ribbon-body::-webkit-scrollbar {
      height: 4px;
    }

    .ribbon-tabs::-webkit-scrollbar-track,
    .ribbon-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .ribbon-tabs::-webkit-scrollbar-thumb,
    .ribbon-body::-webkit-scrollbar-thumb {
      background: rgba(148,184,220,.22);
      border-radius: 999px;
    }

    .backstage-summary {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .backstage-kpi {
      border: 1px solid rgba(29,125,242,.13);
      border-radius: 14px;
      padding: 8px;
      background: rgba(255,255,255,.68);
    }

    .backstage-kpi small {
      display: block;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      font-size: 9px;
      font-weight: 900;
      line-height: 1.15;
    }

    .backstage-kpi strong {
      display: block;
      margin-top: 4px;
      color: #0b1f3a;
      font-size: 20px;
      line-height: 1;
      letter-spacing: -.04em;
      font-weight: 950;
    }


    /* =========================================================
       Workbench layout
       ========================================================= */
    .workbench {
      min-height: 0;
      display: grid;
      grid-template-columns: var(--sidebar-w) minmax(0, 1fr) var(--inspector-w);
      gap: 8px;
      padding: 8px;
      overflow: hidden;
    }

    .sidebar,
    .main,
    .inspector {
      min-height: 0;
      border: 1px solid rgba(148,184,220,.22);
      background: rgba(255,255,255,.94);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(235,245,255,.92));
    }

    .sidebar-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .assistant-tile {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(29,125,242,.12), rgba(126,231,255,.10));
      border: 1px solid rgba(29,125,242,.16);
    }

    .assistant-avatar {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0b4fa4, #54b6ff);
      box-shadow: 0 10px 20px rgba(29,125,242,.20);
      position: relative;
      animation: floatBot 3.2s ease-in-out infinite;
    }

    @keyframes floatBot {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .assistant-avatar::before {
      content: "";
      width: 25px;
      height: 18px;
      border-radius: 9px;
      background: #fff;
      box-shadow: inset 8px 0 0 rgba(126,231,255,.55);
    }

    .assistant-avatar::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 4px;
      border-radius: 999px;
      background: #0b4fa4;
      transform: translateY(7px);
    }

    .assistant-name {
      font-weight: 950;
      color: #0b1f3a;
      letter-spacing: -.02em;
      font-size: 13px;
    }

    .assistant-status {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .nav-list {
      padding: 10px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 5px;
    }

    .nav-item {
      width: 100%;
      appearance: none;
      border: 1px solid transparent;
      background: transparent;
      color: #24364c;
      border-radius: 13px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px 9px;
      text-align: left;
      font-weight: 800;
      font-size: 12px;
    }

    .nav-item:hover { background: rgba(29,125,242,.07); }
    .nav-item.active { background: rgba(29,125,242,.13); border-color: rgba(29,125,242,.18); color: #083c72; }
    .nav-icon { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 10px; background: rgba(29,125,242,.08); }
    .nav-count { min-width: 24px; text-align: center; padding: 4px 7px; border-radius: 999px; background: #edf4fb; color: #0b4fa4; font-size: 10px; font-weight: 950; }

    .sidebar-foot {
      border-top: 1px solid var(--line);
      padding: 10px 12px;
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 10.5px;
    }

    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: rgba(245, 249, 253, .96);
    }

    .view-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(245,250,255,.90));
    }

    .view-title {
      margin: 0;
      font-size: 22px;
      color: #0b1f3a;
      letter-spacing: -.035em;
      line-height: 1.05;
    }

    .view-subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .view-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action-btn {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: #0b3d72;
      padding: 8px 10px;
      font-weight: 900;
      font-size: 11px;
      box-shadow: 0 6px 14px rgba(11,31,58,.06);
    }

    .action-btn.primary { color: #fff; border-color: rgba(29,125,242,.32); background: linear-gradient(135deg, var(--blue), var(--blue-2)); }

    .view-scroll {
      overflow: auto;
      padding: 14px 16px 18px;
    }

    .inspector {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(240,247,255,.94));
    }

    .inspector-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .inspector-title {
      margin: 0;
      color: #0b1f3a;
      font-size: 17px;
      letter-spacing: -.025em;
    }

    .inspector-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .inspector-body {
      overflow: auto;
      padding: 14px;
    }

    /* =========================================================
       Cards / content
       ========================================================= */
    .grid-kpi {
      display: grid;
      grid-template-columns: repeat(6, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .kpi-card {
      min-height: 98px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow-soft);
      padding: 12px;
    }

    .kpi-card::after {
      content: "";
      position: absolute;
      right: -28px;
      top: -28px;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: rgba(29,125,242,.09);
    }

    .kpi-label {
      position: relative;
      z-index: 1;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      font-size: 10px;
      font-weight: 900;
      line-height: 1.2;
    }

    .kpi-value {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      font-size: 28px;
      font-weight: 950;
      color: #0b1f3a;
      letter-spacing: -.04em;
      line-height: 1;
    }

    .kpi-note {
      position: relative;
      z-index: 1;
      margin-top: 5px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.25;
    }

    .section-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr);
      gap: 12px;
      align-items: start;
    }

    .live-command {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(360px, .9fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .assistant-readout,
    .ops-board {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, #fff, #f6fbff);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .assistant-readout {
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr);
      gap: 13px;
      padding: 14px;
      align-items: center;
      position: relative;
    }

    .assistant-readout::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 15%, rgba(84,182,255,.18), transparent 34%),
        linear-gradient(90deg, rgba(29,125,242,.07), transparent 55%);
      pointer-events: none;
    }

    .readout-avatar {
      position: relative;
      z-index: 1;
      width: 62px;
      height: 62px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0b4fa4, #54b6ff);
      box-shadow: 0 14px 28px rgba(29,125,242,.22);
      animation: floatBot 3.2s ease-in-out infinite;
    }

    .readout-avatar::before {
      content: "";
      width: 34px;
      height: 23px;
      border-radius: 13px;
      background: #fff;
      box-shadow: inset 12px 0 0 rgba(126,231,255,.52);
    }

    .readout-avatar::after {
      content: "";
      position: absolute;
      width: 17px;
      height: 5px;
      border-radius: 999px;
      background: #0b4fa4;
      transform: translateY(9px);
    }

    .readout-content {
      position: relative;
      z-index: 1;
      min-width: 0;
    }

    .readout-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(31,157,99,.11);
      color: #11643c;
      font-size: 10px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .07em;
      border: 1px solid rgba(31,157,99,.20);
    }

    .readout-title {
      margin-top: 8px;
      color: #0b1f3a;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -.035em;
      line-height: 1.12;
    }

    .readout-text {
      margin-top: 5px;
      color: #475569;
      font-size: 12px;
      line-height: 1.4;
    }

    .ops-board {
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-content: stretch;
    }

    .ops-chip {
      border: 1px solid rgba(120,150,180,.22);
      border-radius: 16px;
      background: #fff;
      padding: 10px;
      min-height: 70px;
      display: grid;
      align-content: center;
    }

    .ops-chip-label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      font-size: 9px;
      line-height: 1.15;
      font-weight: 950;
    }

    .ops-chip-value {
      margin-top: 5px;
      color: #0b1f3a;
      font-size: 22px;
      line-height: 1;
      letter-spacing: -.04em;
      font-weight: 950;
    }

    .ops-chip-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 10.5px;
      line-height: 1.2;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: #fff;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #f4f8fd);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      color: #0b1f3a;
      letter-spacing: -.015em;
    }

    .panel-subtitle {
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.3;
      color: var(--muted);
    }

    .panel-body { padding: 12px 14px 14px; }

    .class-grid {
      display: grid;
      gap: 10px;
    }

    .class-card {
      --accent: var(--blue);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 108px;
      grid-template-areas:
        "head donut"
        "meta donut"
        "action action"
        "progress progress";
      gap: 10px 14px;
      border: 1px solid var(--line);
      border-left: 8px solid var(--accent);
      border-radius: 20px;
      background: linear-gradient(180deg, #fff, #fbfdff);
      box-shadow: 0 9px 20px rgba(11,31,58,.07);
      padding: 13px;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
      position: relative;
      overflow: hidden;
    }

    .class-card::before {
      content: "";
      position: absolute;
      right: -42px;
      top: -42px;

    /* =========================================================
       Loader
       ========================================================= */
    .loader-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 50% 20%, rgba(84,182,255,.24), transparent 36%),
        linear-gradient(135deg, #071426, #0b1f3a 58%, #050b14);
      transition: opacity .35s ease, visibility .35s ease;
    }

    .loader-screen.hidden { opacity: 0; visibility: hidden; }

    .loader-card {
      width: min(520px, calc(100vw - 36px));
      border: 1px solid rgba(148,184,220,.26);
      border-radius: 28px;
      padding: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(232,245,255,.90));
      box-shadow: 0 26px 70px rgba(0,0,0,.30);
      text-align: center;
      color: #0b1f3a;
    }

    .loader-bot {
      width: 104px;
      height: 104px;
      margin: 0 auto;
      border-radius: 34px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0b4fa4, #54b6ff);
      box-shadow: 0 18px 34px rgba(29,125,242,.24);
      animation: floatBot 3s ease-in-out infinite;
      position: relative;
    }

    .loader-bot::before {
      content: "";
      width: 56px;
      height: 38px;
      border-radius: 18px;
      background: #fff;
      box-shadow: inset 18px 0 0 rgba(126,231,255,.52);
    }

    .loader-bot::after {
      content: "";
      position: absolute;
      width: 26px;
      height: 7px;
      border-radius: 999px;
      background: #0b4fa4;
      transform: translateY(14px);
    }

    .loader-title {
      margin-top: 18px;
      font-size: 25px;
      font-weight: 950;
      letter-spacing: -.04em;
    }

    .loader-subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .loader-bar {
      height: 12px;
      margin-top: 18px;
      border-radius: 999px;
      background: #e6edf6;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--blue-2));
      position: relative;
      transition: width .2s linear;
      overflow: hidden;
    }

    .loader-fill::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-45deg, rgba(255,255,255,.27) 0, rgba(255,255,255,.27) 7px, transparent 7px, transparent 14px);
      animation: stripes 1s linear infinite;
    }

    .loader-foot {
      margin-top: 12px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    /* =========================================================
       Moodle phase-check board
       Visión revisa cada fase como checklist operativo
       ========================================================= */
    .moodle-phase-board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
      margin-top: 12px;
    }

    .moodle-phase-card {
      border: 1px solid rgba(120,150,180,.16);
      border-left: 5px solid var(--blue);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, #fff, #fbfdff);
      box-shadow: var(--shadow-soft);
      padding: 10px;
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .moodle-phase-card.ok { border-left-color: var(--green); }
    .moodle-phase-card.warn { border-left-color: var(--orange); }
    .moodle-phase-card.danger { border-left-color: var(--red); }
    .moodle-phase-card.info { border-left-color: var(--blue); }

    .moodle-phase-head {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .moodle-phase-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      background: rgba(29,125,242,.10);
      color: #0b4fa4;
      font-weight: 700;
      font-size: 13px;
    }

    .moodle-phase-card.ok .moodle-phase-icon { background: rgba(31,157,99,.12); color: #11643c; }
    .moodle-phase-card.warn .moodle-phase-icon { background: rgba(249,115,22,.12); color: #a94700; }
    .moodle-phase-card.danger .moodle-phase-icon { background: rgba(217,45,32,.12); color: #b42318; }

    .moodle-phase-title {
      color: #0b1f3a;
      font-size: 12px;
      line-height: 1.18;
      font-weight: 650;
      letter-spacing: -.01em;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .moodle-phase-subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 10.5px;
      line-height: 1.25;
    }

    .moodle-phase-items {
      display: grid;
      gap: 5px;
    }

    .moodle-phase-item {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      padding: 5px 6px;
      border: 1px solid rgba(120,150,180,.13);
      border-radius: var(--radius-md);
      background: rgba(246,250,255,.70);
      font-size: 10.8px;
      line-height: 1.2;
    }

    .moodle-check {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 700;
      background: rgba(100,116,139,.10);
      color: #64748b;
    }

    .moodle-check.ok { background: rgba(31,157,99,.14); color: #11643c; }
    .moodle-check.warn { background: rgba(249,115,22,.14); color: #a94700; }
    .moodle-check.danger { background: rgba(217,45,32,.14); color: #b42318; }
    .moodle-check.info { background: rgba(29,125,242,.12); color: #0b4fa4; }

    .moodle-phase-label {
      color: #334155;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .moodle-phase-status {
      color: var(--muted);
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: .035em;
      font-weight: 600;
      white-space: nowrap;

      color: #475569;
      font-size: 12px;
      line-height: 1.42;
    }

    .vision-presentation-flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }

    .vision-flow-step {
      border: 1px solid rgba(120,150,180,.16);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, #fff, #f8fbff);
      padding: 11px;
      position: relative;
    }

    .vision-flow-step small {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: rgba(29,125,242,.10);
      color: #0b4fa4;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .vision-flow-step strong {
      display: block;
      color: #0b1f3a;
      font-size: 13px;
      font-weight: 650;
    }

    .vision-flow-step span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.35;
    }

    /* =========================================================
       Sprint 1_s · Robot Visión desde assets
       Sustituye el robot dibujado en CSS por la imagen oficial.
       ========================================================= */
    .assistant-avatar,
    .readout-avatar,
    .loader-bot {
      background-color: #0b4fa4;
      background-image:
        url("assets/vision-bot.png"),
        linear-gradient(135deg, #0b4fa4, #54b6ff);
      background-repeat: no-repeat, no-repeat;
      background-position: center, center;
      background-size: 82% auto, cover;
      overflow: hidden;
    }

    .readout-avatar {
      background-size: 78% auto, cover;
    }

    .loader-bot {
      background-size: 76% auto, cover;
    }

    .assistant-avatar::before,
    .assistant-avatar::after,
    .readout-avatar::before,
    .readout-avatar::after,
    .loader-bot::before,
    .loader-bot::after {
      content: none !important;
      display: none !important;
    }

    /* =========================================================
       Responsive
       ========================================================= */

    @media (max-width: 1280px) {
      .vision-intro-hero { grid-template-columns: 1fr; }
      .vision-intro-robot-card { min-height: 280px; }
      .vision-intro-bot { width: min(210px, 64%); }
      .vision-feature-grid { grid-template-columns: 1fr 1fr; }
      .vision-presentation-flow { grid-template-columns: 1fr 1fr; }
      .vision-intro-metrics { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 1280px) {
      :root { --inspector-w: 320px; --sidebar-w: 230px; }
      .grid-kpi { grid-template-columns: repeat(3, minmax(130px, 1fr)); }
      .section-grid { grid-template-columns: 1fr; }
      .live-command { grid-template-columns: 1fr; }
    }

    @media (max-width: 1020px) {
      body { overflow: auto; }
      .app { min-height: 100vh; height: auto; grid-template-rows: auto auto auto var(--statusbar-h); }
      .topbar { height: auto; grid-template-columns: 1fr; }
      .topbar-status { justify-content: flex-start; }
      .ribbon { height: auto; }
      .ribbon-body { padding-bottom: 8px; }
      .workbench { grid-template-columns: 1fr; overflow: visible; }
      .sidebar, .main, .inspector { min-height: auto; }
      .nav-list { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); max-height: none; }
      .inspector { display: none; }
    }

    @media (max-width: 680px) {
      .grid-kpi { grid-template-columns: 1fr 1fr; }
      .ops-board { grid-template-columns: 1fr; }
      .assistant-readout { grid-template-columns: 1fr; }
      .incident-board { grid-template-columns: 1fr 1fr; }
      .case-flow { grid-template-columns: 1fr 1fr; }
      .comm-board { grid-template-columns: 1fr; }
      .telegram-flow { grid-template-columns: 1fr; }
      .moodle-phase-board { grid-template-columns: 1fr; }
      .class-card { grid-template-columns: 1fr; grid-template-areas: "head" "donut" "meta" "action" "progress"; }
      .donut-box { justify-items: start; }
      .class-meta { grid-template-columns: 1fr; }
      .view-head { grid-template-columns: 1fr; }
      .view-actions { justify-content: flex-start; }
    }
  </style>
</head>

<body>
  <div id="loader" class="loader-screen">
    <div class="loader-card">
      <div class="loader-bot"></div>
      <div class="loader-title">Inicializando Visión</div>
      <div id="loaderSubtitle" class="loader-subtitle">Leyendo fuentes vivas de operación.</div>
      <div class="loader-bar"><div id="loaderFill" class="loader-fill"></div></div>
      <div id="loaderFoot" class="loader-foot">Preparando asistente operativo...</div>
    </div>
  </div>

  <div id="app" class="app"></div>

  <script>
    /***********************************************************
     * 1. Configuración
     ***********************************************************/
    const VisionConfig = {
      // V2.1B0: el backend productivo se resuelve en tiempo de ejecución desde vision.runtime.json.
      // No depende de la pestaña Configuración ni queda escrito en la matriz principal del frontend.
      GAS_WEB_APP_URL: '',
      runtimeConfigUrl: 'vision.runtime.json',
      runtimeConfig: null,
      runtimeLoaded: false,
      runtimeError: '',
      dataSourceMode: 'PENDIENTE_RUNTIME',
      explicitDemoMode: false,

      refreshSeconds: 180,
      useMockWhenNoUrl: false,
      allowRuntimeBackendConfig: true,
      allowLocalBackendOverride: true,
      defaultTab: 'operacion',
      version: 'vNext Sprint 2.1B2 · Ribbon restaurado',

      endpoints: {
        live: 'visionLiveOperationsSnapshot',
        executive: 'visionExecutiveSnapshot',
        analytics: 'visionAnalyticsSnapshotV2',
        go: 'visionGoSatelliteSnapshot',
        implementation: 'visionImplementationHealthSnapshot',
        moodleRun: 'visionRunMoodleImplementationProbe',
        moodleSnapshot: 'visionMoodleImplementationProbeSnapshot'
      }
    };

    /***********************************************************
     * 2. Estado global
     ***********************************************************/
    const VisionState = {
      currentTab: VisionConfig.defaultTab,
      selectedItem: null,
      selectedItemType: null,
      loading: true,
      error: null,
      lastRefresh: null,
      nextRefreshIn: VisionConfig.refreshSeconds,
      refreshTimer: null,
      countdownTimer: null,
      snapshots: {
        live: null,
        executive: null,
        analytics: null,
        implementation: null,
        moodle: null,
        go: null
      },
      normalized: {
        sistema: {},
        estado: {},
        kpis: {},
        clases: [],
        incidencias: [],
        telegram: [],
        bandeja: {},
        timeline: [],
        lecturaOperativa: [],
        endpointHealth: [],
        moodleProbe: null
      },
      ui: {
        density: 'dense',
        classFilter: 'todas',
        incidentFilter: 'abiertas'
      }
    };

    /***********************************************************
     * 3. Utilidades
     ***********************************************************/
    const VisionUtils = {
      esc(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      },

      num(value, fallback = 0) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      },

      pct(value, fallback = 0) {
        const n = this.num(value, fallback);
        if (n <= 1 && n > 0) return Math.round(n * 100);
        return Math.max(0, Math.min(100, Math.round(n)));
      },

      text(value, fallback = '') {
        const t = String(value ?? '').trim();
        return t || fallback;
      },

      fmtTime(dateLike) {
        return this.normalizeTime(dateLike);
      },

      fmtDate(dateLike) {
        return this.normalizeDate(dateLike);
      },

      fmtDateTime(dateLike) {
        if (!dateLike) return '';
        const d = dateLike instanceof Date ? dateLike : new Date(dateLike);
        if (Number.isNaN(d.getTime())) return String(dateLike);
        return d.toLocaleString('es-CL', { dateStyle: 'short', timeStyle: 'medium' });
      },

      normalizeTime(value) {
        if (value === null || value === undefined || value === '') return '';
        if (value instanceof Date && !Number.isNaN(value.getTime())) {
          return value.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
        }

        const raw = String(value).trim();
        if (!raw) return '';

        // Google Sheets suele entregar horas como fecha base 1899-12-30T12:45:00.000Z.
        // Para horarios, se extrae directamente HH:mm del string para evitar desfases por zona horaria.
        let m = raw.match(/T(\d{1,2}:\d{2})(?::\d{2})?/);
        if (m) return m[1].padStart(5, '0');

        m = raw.match(/(?:^|\s)(\d{1,2}):(\d{2})(?::\d{2})?/);
        if (m) return `${String(+m[1]).padStart(2, '0')}:${m[2]}`;

        // Fracción de día de Google Sheets/Excel: 0.5 = 12:00.
        const n = Number(raw.replace(',', '.'));
        if (Number.isFinite(n) && n >= 0 && n < 1) {
          const total = Math.round(n * 24 * 60);
          const hh = Math.floor(total / 60) % 24;
          const mm = total % 60;
          return `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
        }

        return raw;
      },

      normalizeDate(value) {
        if (value === null || value === undefined || value === '') return '';
        if (value instanceof Date && !Number.isNaN(value.getTime())) {
          return value.toLocaleDateString('es-CL');
        }

        const raw = String(value).trim();
        if (!raw) return '';

        // Fecha ISO: se usa la parte YYYY-MM-DD sin reinterpretar zona horaria.
        let m = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (m) return `${m[3]}/${m[2]}/${m[1]}`;

        m = raw.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})/);
        if (m) return `${m[1].padStart(2, '0')}/${m[2].padStart(2, '0')}/${m[3]}`;

        const d = new Date(raw);
        if (!Number.isNaN(d.getTime())) return d.toLocaleDateString('es-CL');
        return raw;
      },

      classSeverityClass(item) {
        const raw = String(item?.severidad || item?.estado || '').toUpperCase();
        if (raw.includes('CRITICA') || raw.includes('NO_INICIADA') || raw.includes('ERROR')) return 'danger';
        if (raw.includes('ALTA') || raw.includes('BAJA') || raw.includes('FINALIZACION')) return 'warn';
        if (raw.includes('INICIADA') || raw.includes('OK') || raw.includes('OPERANDO')) return 'ok';
        return 'info';
      },

      badgeClass(raw) {
        const t = String(raw || '').toUpperCase();
        if (t.includes('CRITICA') || t.includes('ERROR') || t.includes('NO_INICIADA')) return 'danger';
        if (t.includes('ALTA') || t.includes('ALERTA') || t.includes('BAJA') || t.includes('FINALIZACION')) return 'warn';
        if (t.includes('OK') || t.includes('OPERANDO') || t.includes('INICIADA')) return 'ok';
        return 'info';
      },

      short(raw, max = 110) {
        const t = String(raw || '').trim();
        return t.length > max ? t.slice(0, max - 1) + '…' : t;
      },

      parseDateTimeFromClass(c) {
        const fecha = c.fecha || c.fechaClase || '';
        const startText = c.horaInicio || c.inicio || '';
        const endText = c.horaFin || c.fin || '';
        return { fecha, startText, endText };
      },

      estimateProgress(c) {
        const estado = String(c.estado || c.estadoCalculado || c.estado_calculado || '').toUpperCase();
        const now = new Date();
        const fecha = c.fechaRaw || c.fecha || c.fechaClase;
        const start = this.buildDateWithTime(fecha, c.horaInicioRaw || c.horaInicio || c.inicio);
        const end = this.buildDateWithTime(fecha, c.horaFinRaw || c.horaFin || c.fin);

        // La barra representa avance temporal. Si el backend trae 0, pero hay horario,
        // se recalcula para evitar una clase en curso/finalizada con barra muerta.
        if (start && end && end > start) {
          if (now <= start) return 0;
          if (now >= end || estado.includes('FINALIZADA')) return 100;
          return Math.round(((now - start) / (end - start)) * 100);
        }

        if (estado.includes('FINALIZADA')) return 100;
        if (typeof c.avancePct === 'number') return Math.max(0, Math.min(100, c.avancePct));
        return 0;
      },

      buildDateWithTime(fecha, hora) {
        if (!fecha || !hora) return null;
        let yyyy, mm, dd;
        const rawFecha = String(fecha).trim();
        let m = rawFecha.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
        if (m) { yyyy = +m[1]; mm = +m[2] - 1; dd = +m[3]; }
        else {
          m = rawFecha.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
          if (m) { yyyy = +m[3]; mm = +m[2] - 1; dd = +m[1]; }
          else {
            const f = new Date(rawFecha);
            if (Number.isNaN(f.getTime())) return null;
            yyyy = f.getFullYear(); mm = f.getMonth(); dd = f.getDate();
          }
        }
        const normalized = this.normalizeTime(hora);
        const hm = String(normalized).match(/(\d{1,2}):(\d{2})/);
        if (!hm) return null;
        return new Date(yyyy, mm, dd, +hm[1], +hm[2], 0, 0);
      },

      classTimingLabel(c) {
        const estado = String(c.estado || '').toUpperCase();
        if (estado.includes('FINALIZADA') && c.zoomActivo) return 'Horario finalizado · sala activa';
        if (estado.includes('FINALIZADA')) return 'Horario finalizado';
        if (c.zoomActivo) return 'Sala activa detectada';
        return 'Sin sala activa detectada';
      }
    };

    /***********************************************************
     * 4. Configuración runtime del backend productivo
     ***********************************************************/
    const VisionRuntime = {
      async load() {
        const query = new URLSearchParams(window.location.search || '');
        const demoParam = String(query.get('demo') || '').trim();
        const forceDemo = demoParam === '1' || demoParam.toLowerCase() === 'true';

        if (forceDemo) {
          VisionConfig.explicitDemoMode = true;
          VisionConfig.useMockWhenNoUrl = true;
          VisionConfig.dataSourceMode = 'MOCK_EXPLICITO';
          VisionConfig.runtimeLoaded = true;
          VisionConfig.runtimeConfig = { environment: 'demo', mockAllowed: true };
          return;
        }

        const runtimeUrl = String(query.get('runtime') || VisionConfig.runtimeConfigUrl || 'vision.runtime.json').trim();
        const localOverrideRequested = query.get('override') === '1';

        try {
          const separator = runtimeUrl.includes('?') ? '&' : '?';
          const response = await fetch(runtimeUrl + separator + '_ts=' + Date.now(), { cache: 'no-store' });
          if (!response.ok) {
            throw new Error('No se pudo leer configuración runtime HTTP ' + response.status);
          }

          const cfg = await response.json();
          const backendUrl = this.normalizeBackendUrl(
            cfg.backendUrl || cfg.backend_url || cfg.gasWebAppUrl || cfg.GAS_WEB_APP_URL || ''
          );

          if (!backendUrl) {
            throw new Error('vision.runtime.json no contiene backendUrl válido.');
          }

          VisionConfig.GAS_WEB_APP_URL = backendUrl;
          VisionConfig.runtimeConfig = cfg;
          VisionConfig.runtimeLoaded = true;
          VisionConfig.runtimeError = '';
          VisionConfig.dataSourceMode = 'BACKEND_REAL_RUNTIME';
          VisionConfig.useMockWhenNoUrl = false;

          // Override técnico temporal: solo se permite si se solicita explícitamente con ?override=1.
          if (VisionConfig.allowLocalBackendOverride && localOverrideRequested) {
            const local = this.normalizeBackendUrl(localStorage.getItem('VISION_GAS_WEB_APP_URL') || '');
            if (local) {
              VisionConfig.GAS_WEB_APP_URL = local;
              VisionConfig.dataSourceMode = 'BACKEND_REAL_OVERRIDE_LOCAL';
            }
          }
        } catch (err) {
          VisionConfig.runtimeLoaded = false;
          VisionConfig.runtimeError = err.message || String(err);
          VisionConfig.dataSourceMode = 'ERROR_RUNTIME';
          VisionConfig.GAS_WEB_APP_URL = '';
          VisionConfig.useMockWhenNoUrl = false;
        }
      },

      normalizeBackendUrl(value) {
        const url = String(value || '').trim();
        if (!url) return '';
        if (!/^https:\/\/script\.google\.com\/macros\/s\//i.test(url)) return '';
        return url.replace(/\?+$/, '');
      }
    };

    /***********************************************************
     * 5. Cliente API JSONP
     ***********************************************************/
    const VisionAPI = {
      jsonp(action, params = {}) {
        if (!VisionConfig.GAS_WEB_APP_URL) {
          if (VisionConfig.useMockWhenNoUrl) return Promise.resolve(VisionMock.get(action, params));
          const detalle = VisionConfig.runtimeError
            ? ' No se pudo cargar vision.runtime.json: ' + VisionConfig.runtimeError
            : '';
          return Promise.reject(new Error('No hay backend real disponible por configuración runtime.' + detalle));
        }

        const callbackName = 'visionCb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const query = new URLSearchParams({
          action,
          callback: callbackName,
          _ts: Date.now(),
          ...params
        });

        const url = VisionConfig.GAS_WEB_APP_URL + '?' + query.toString();

        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          const timeout = setTimeout(() => {
            cleanup();
            reject(new Error('Timeout consultando endpoint: ' + action));
          }, 25000);

          function cleanup() {
            clearTimeout(timeout);
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
          }

          window[callbackName] = data => {
            cleanup();
            resolve(data);
          };

          script.onerror = () => {
            cleanup();
            reject(new Error('Error cargando JSONP: ' + action));
          };

          script.src = url;
          document.head.appendChild(script);
        });
      },

      getLiveSnapshot() {
        return this.jsonp(VisionConfig.endpoints.live);
      },

      getExecutiveSnapshot() {
        return this.jsonp(VisionConfig.endpoints.executive);
      },

      getAnalyticsSnapshot() {
        return this.jsonp(VisionConfig.endpoints.analytics);
      },

      getImplementationHealth() {
        return this.jsonp(VisionConfig.endpoints.implementation);
      },

      runMoodleProbe(sigla) {
        return this.jsonp(VisionConfig.endpoints.moodleRun, { sigla });
      },

      getMoodleSnapshot() {
        return this.jsonp(VisionConfig.endpoints.moodleSnapshot);
      },

      testEndpoint(action) {
        const started = performance.now();
        return this.jsonp(action)
          .then(raw => ({
            action,
            ok: raw && raw.ok !== false,
            status: raw && raw.ok === false ? 'BACKEND_OK_FALSE' : 'OK',
            modulo: raw?.sistema?.modulo || raw?.sistema?.titulo || raw?.sistema?.nombre || '',
            generatedAt: raw?.sistema?.generadoEn || '',
            latencyMs: Math.round(performance.now() - started),
            error: raw?.error || ''
          }))
          .catch(err => ({
            action,
            ok: false,
            status: 'ERROR',
            modulo: '',
            generatedAt: '',
            latencyMs: Math.round(performance.now() - started),
            error: err.message || String(err)
          }));
      }
    };

    /***********************************************************
     * 5. Adaptadores de datos
     ***********************************************************/
    const VisionAdapters = {
      live(raw) {
        const v = VisionUtils;
        const kpis = raw?.kpis || {};
        const live = raw?.visionEnVivo || raw?.motor || {};
        const inc = raw?.incidencias || {};
        const notif = raw?.notificaciones || {};
        const bandeja = raw?.bandeja || {};

        const clasesSource = live.clases || live.detalleClases || live.items || raw?.clases || raw?.motor?.clases || [];
        const incidenciasSource = inc.items || inc.detalleIncidencias || inc.ultimas || inc.abiertasItems || raw?.bandeja?.items || raw?.incidencias?.items || [];
        const telegramSource = notif.items || notif.detalleNotificaciones || notif.ultimas || raw?.notificaciones?.items || [];

        const clases = Array.isArray(clasesSource)
          ? clasesSource.map((c, index) => this.classItem(c, index))
          : [];

        const incidencias = Array.isArray(incidenciasSource)
          ? incidenciasSource.map((i, index) => this.incidentItem(i, index))
          : [];

        const telegram = Array.isArray(telegramSource)
          ? telegramSource.map((t, index) => this.telegramItem(t, index))
          : [];

        const timeline = this.timeline(raw, clases, incidencias, telegram);

        return {
          sistema: {
            nombre: v.text(raw?.sistema?.nombre, 'Visión'),
            modulo: v.text(raw?.sistema?.modulo, 'Centro Operativo Inteligente'),
            version: v.text(raw?.sistema?.version, VisionConfig.version),
            generadoEn: v.text(raw?.sistema?.generadoEn, v.fmtDateTime(new Date())),
            generadoEnMs: v.num(raw?.sistema?.generadoEnMs, Date.now()),
            fuente: v.text(raw?.sistema?.fuente, 'Snapshot vivo')
          },
          estado: {
            operativo: v.text(raw?.estado?.operativo, 'OPERANDO'),
            detalle: v.text(raw?.estado?.detalle, 'Visión se encuentra operativo.'),
            modoProduccion: raw?.estado?.modoProduccion,
            telegramActivo: raw?.estado?.telegramActivo,
            horaSimulada: raw?.estado?.horaSimulada
          },
          kpis: {
            clasesMonitoreadasHoy: v.num(kpis.clasesMonitoreadasHoy),
            clasesIniciadasHoy: v.num(kpis.clasesIniciadasHoy),
            clasesConZoomActivoHoy: v.num(kpis.clasesConZoomActivoHoy),
            eventosRegistradosHoy: v.num(kpis.eventosRegistradosHoy),
            incidenciasDetectadasHoy: v.num(kpis.incidenciasDetectadasHoy),
            incidenciasCerradasHoy: v.num(kpis.incidenciasCerradasHoy),
            incidenciasAbiertas: v.num(kpis.incidenciasAbiertas),
            criticasOperativasAbiertas: v.num(kpis.criticasOperativasAbiertas),
            recordatoriosEnviadosHoy: v.num(kpis.recordatoriosEnviadosHoy),
            alertasIncidenciaHoy: v.num(kpis.alertasIncidenciaHoy),
            erroresNotificacionHoy: v.num(kpis.erroresNotificacionHoy),
            participantesTotalHoy: v.num(kpis.participantesTotalHoy),
            agendadosTotalHoy: v.num(kpis.agendadosTotalHoy),
            asistenciaObservadaPctHoy: v.pct(kpis.asistenciaObservadaPctHoy),
            pendientesBandeja: v.num(kpis.pendientesBandeja)
          },
          clases,
          incidencias,
          telegram,
          bandeja: {
            total: v.num(bandeja.total || bandeja.totalBandeja || kpis.pendientesBandeja),
            pendientesRevision: v.num(bandeja.pendientesRevision || kpis.pendientesBandeja),
            abiertasEnBandeja: v.num(bandeja.abiertasEnBandeja),
            resumen: bandeja.resumen || {}
          },
          timeline,
          lecturaOperativa: Array.isArray(raw?.lecturaOperativa)
            ? raw.lecturaOperativa
            : [v.text(raw?.estado?.detalle, 'Visión mantiene lectura operativa activa.')],
          saludImplementacion: VisionState.normalized.saludImplementacion || null
        };
      },

      implementation(raw) {
        const v = VisionUtils;
        const items = Array.isArray(raw?.items) ? raw.items : [];
        return {
          sistema: raw?.sistema || {},
          resumen: raw?.resumen || {},
          criticos: Array.isArray(raw?.criticos) ? raw.criticos.map((x, i) => this.implementationItem(x, i)) : [],
          enRiesgo: Array.isArray(raw?.enRiesgo) ? raw.enRiesgo.map((x, i) => this.implementationItem(x, i)) : [],
          observar: Array.isArray(raw?.observar) ? raw.observar.map((x, i) => this.implementationItem(x, i)) : [],
          items: items.map((x, i) => this.implementationItem(x, i))
        };
      },

      implementationItem(r, index) {
        const v = VisionUtils;
        const n = r.nodos || {};
        const countNode = estado => Object.values(n).filter(x => String(x || '').toUpperCase() === estado).length;
        return {
          id: v.text(r.sigla_curso || r.siglaCurso || r.sigla || 'impl-' + index),
          sigla: v.text(r.sigla_curso || r.siglaCurso || r.sigla, 'Sin sigla'),
          programa: v.text(r.programa, ''),
          asignatura: v.text(r.asignatura, ''),
          profesor: v.text(r.profesor, ''),
          fecha: v.text(r.fecha_clase || r.fechaClase, ''),
          horario: [v.text(r.hora_inicio || r.horaInicio, ''), v.text(r.hora_fin || r.horaFin, '')].filter(Boolean).join(' - '),
          estado: v.text(r.estado_implementacion || r.estadoImplementacion, 'SIN_ESTADO'),
          puntaje: v.num(r.puntaje_implementacion ?? r.puntajeImplementacion, 0),
          confianza: v.text(r.nivel_confianza || r.nivelConfianza, ''),
          prioridad: v.text(r.prioridad_revision || r.prioridadRevision, ''),
          nodosOk: v.num(r.nodos_ok, countNode('OK')),
          nodosObservar: v.num(r.nodos_observar, countNode('OBSERVAR')),
          nodosError: v.num(r.nodos_error, countNode('ERROR')),
          nodosPendiente: v.num(r.nodos_pendiente_validar, countNode('FALTA_VALIDAR')),
          nodosNoAplica: v.num(r.nodos_no_aplica, countNode('NO_APLICA')),
          estadoCurso: v.text(r.estado_curso || r.estadoCurso, ''),
          agendados: v.num(r.agendados, 0),
          meetingId: v.text(r.meeting_id || r.meetingId, ''),
          evidenciaZoom: v.text(r.evidencia_zoom || r.evidenciaZoom, ''),
          estadoZoomAuditado: v.text(r.estado_zoom_auditado || r.estadoZoomAuditado, ''),
          estadoModeloGo: v.text(r.estado_modelo_go || r.estadoModeloGo, ''),
          observacion: v.text(r.observacion, ''),
          accion: v.text(r.accion_recomendada || r.accionRecomendada, ''),
          nodos: n,
          raw: r
        };
      },

      moodleProbe(raw, siglaFallback = '') {
        if (!raw) return null;
        const source = raw.ultimoDiagnostico || raw.diagnostico || (Array.isArray(raw.items) && raw.items.length ? raw.items[0] : null) || (Array.isArray(raw.rows) && raw.rows.length ? raw.rows[0] : null) || raw;
        if (source.sigla_curso || source.siglaCurso || source.estado_general || source.estadoGeneral || source.puntaje || source.prioridad || source.nodos) {
          return this.normalizeMoodleProbe(source, siglaFallback);
        }
        return {
          sigla_curso: siglaFallback || 'Sin sigla',
          estado_general: raw.ok === false ? 'ERROR' : 'SIN_DETALLE',
          prioridad: raw.ok === false ? 'ALTA' : 'INFO',
          puntaje: '',
          observacion: raw.error || 'El backend respondió, pero no entregó una estructura de diagnóstico Moodle reconocible.',
          accion_recomendada: 'Revisar contrato de respuesta del endpoint Moodle.'
        };
      },

      normalizeMoodleProbe(source, siglaFallback = '') {
        const s = source || {};
        const n = s.nodos || {};
        return {
          ...s,
          sigla_curso: VisionUtils.text(s.sigla_curso || s.siglaCurso, siglaFallback || 'Sin sigla'),
          fecha_clase: VisionUtils.text(s.fecha_clase || s.fechaClase, ''),
          shortname_moodle_esperado: VisionUtils.text(s.shortname_moodle_esperado || s.shortnameMoodleEsperado, ''),
          course_id: VisionUtils.text(s.course_id || s.courseId, ''),
          course_fullname: VisionUtils.text(s.course_fullname || s.courseFullname, ''),
          profile_field_esperado: VisionUtils.text(s.profile_field_esperado || s.profileFieldEsperado, ''),
          estado_general: VisionUtils.text(s.estado_general || s.estadoGeneral, 'SIN_ESTADO'),
          puntaje: VisionUtils.num(s.puntaje, 0),
          prioridad: VisionUtils.text(s.prioridad, ''),
          resumen_evidencia: VisionUtils.text(s.resumen_evidencia || s.resumenEvidencia, ''),
          resumen_comparacion: VisionUtils.text(s.resumen_comparacion || s.resumenComparacion, ''),
          observacion: VisionUtils.text(s.observacion, ''),
          accion_recomendada: VisionUtils.text(s.accion_recomendada || s.accionRecomendada, ''),
          verificaciones_confirmadas: s.verificaciones_confirmadas || s.verificacionesConfirmadas || [],
          validaciones_pendientes: s.validaciones_pendientes || s.validacionesPendientes || [],
          brechas_detectadas: s.brechas_detectadas || s.brechasDetectadas || [],
          matriz_comparacion: s.matriz_comparacion || s.matrizComparacion || [],
          datos_cursos: s.datos_cursos || s.datosCursos || {},
          datos_moodle: s.datos_moodle || s.datosMoodle || {},
          nodo_cursos: s.nodo_cursos || n.cursos || '',
          nodo_moodle_curso: s.nodo_moodle_curso || n.moodleCurso || '',
          nodo_cohorte: s.nodo_cohorte || n.cohorte || '',
          nodo_grupo: s.nodo_grupo || n.grupo || '',
          nodo_recurso_asistencia: s.nodo_recurso_asistencia || n.recursoAsistencia || '',
          nodo_restricciones_asistencia: s.nodo_restricciones_asistencia || n.restriccionesAsistencia || '',
          nodo_recurso_zoom: s.nodo_recurso_zoom || n.recursoZoom || '',
          nodo_html_zoom: s.nodo_html_zoom || n.htmlZoom || '',
          nodo_restricciones_zoom: s.nodo_restricciones_zoom || n.restriccionesZoom || '',
          nodo_profesor_matriculado: s.nodo_profesor_matriculado || n.profesorMatriculado || '',
          nodo_profesor_grupo: s.nodo_profesor_grupo || n.profesorGrupo || '',
          nodo_regla_perfil_cohorte: s.nodo_regla_perfil_cohorte || n.reglaPerfilCohorte || ''
        };
      },

      classItem(c, index) {
        const v = VisionUtils;
        const asistenciaRaw = c.asistenciaPct ?? c.asistenciaObservadaPct ?? c.porcentajeAsistencia ?? c.asistencia_observada_pct;
        const participantes = v.num(c.participantes ?? c.maxParticipantes ?? c.max_participantes ?? c.participantesTotal, 0);
        const agendados = v.num(c.agendados ?? c.maxAgendados ?? c.max_agendados ?? c.agendadosTotal, 0);
        const asistenciaPct = asistenciaRaw !== undefined && asistenciaRaw !== ''
          ? v.pct(asistenciaRaw)
          : agendados > 0 ? Math.round((participantes / agendados) * 100) : 0;

        const estadoDerivado = c.estado || c.estadoCalculado || c.estado_calculado ||
          (c.noIniciada || c.no_iniciada ? 'NO_INICIADA' :
            c.bajaAsistencia || c.baja_asistencia ? 'BAJA_ASISTENCIA' :
              c.iniciadaNormal || c.iniciada_normal ? 'INICIADA_NORMAL' :
                c.finalizada ? 'FINALIZADA' :
                  c.zoomActivo || c.zoom_activo ? 'INICIADA' : 'SIN_ESTADO');

        const severidadDerivada = c.severidad ||
          (/NO_INICIADA/i.test(estadoDerivado) ? 'CRITICA' :
            /BAJA_ASISTENCIA/i.test(estadoDerivado) ? 'ALTA' : 'INFO');

        const fechaRaw = c.fecha || c.fecha_clase || c.fechaClase || '';
        const horaInicioRaw = c.horaInicio || c.inicio || c.hora_programada || c.hora_inicio || '';
        const horaFinRaw = c.horaFin || c.fin || c.hora_fin || '';
        const zoomActivo = Boolean(c.zoomActivo ?? c.zoom_activo ?? c.live);
        const avancePct = v.estimateProgress({
          ...c,
          estado: estadoDerivado,
          fechaRaw,
          horaInicioRaw,
          horaFinRaw,
          zoomActivo
        });

        const out = {
          id: v.text(c.id || c.sigla || c.sigla_curso, 'clase-' + index),
          sigla: v.text(c.sigla || c.sigla_curso || c.curso, 'Sin sigla'),
          programa: v.text(c.programa, ''),
          asignatura: v.text(c.asignatura || c.nombre_asignatura, 'Clase monitoreada desde EVENTOS_CLASE'),
          profesor: v.text(c.profesor || c.docente || c.profesor_rankeado, 'Profesor/a no informado'),
          fecha: v.normalizeDate(fechaRaw),
          fechaRaw,
          horaInicio: v.normalizeTime(horaInicioRaw),
          horaFin: v.normalizeTime(horaFinRaw),
          horaInicioRaw,
          horaFinRaw,
          estado: v.text(estadoDerivado, 'SIN_ESTADO'),
          severidad: v.text(severidadDerivada, ''),
          zoomActivo,
          participantes,
          agendados,
          asistenciaPct,
          avancePct,
          estadoZoomTexto: v.classTimingLabel({ estado: estadoDerivado, zoomActivo }),
          accionSugerida: v.text(c.accionSugerida || c.accion_sugerida || c.accion, ''),
          observacion: v.text(c.observacion || c.detalle || c.evaluacion || (c.eventos ? 'Clase agregada desde ' + c.eventos + ' eventos de EVENTOS_CLASE.' : ''), ''),
          meetingId: v.text(c.meetingId || c.meeting_id, ''),
          linkZoom: v.text(c.linkZoom || c.link_zoom, '')
        };
        return out;
      },

      incidentItem(i, index) {
        const v = VisionUtils;
        return {
          id: v.text(i.id || i.id_incidencia, 'inc-' + index),
          fechaClase: v.text(i.fechaClase || i.fecha_clase, ''),
          timestamp: v.text(i.timestamp || i.timestamp_detectado, ''),
          sigla: v.text(i.sigla || i.sigla_curso, 'Sin sigla'),
          programa: v.text(i.programa, ''),
          asignatura: v.text(i.asignatura, ''),
          profesor: v.text(i.profesor, ''),
          estadoDetectado: v.text(i.estadoDetectado || i.estado_detectado, 'SIN_ESTADO'),
          severidad: v.text(i.severidad || i.prioridad_revision, ''),
          estadoIncidencia: v.text(i.estadoIncidencia || i.estado_incidencia, ''),
          estadoRevision: v.text(i.estadoRevision || i.estado_revision, ''),
          responsable: v.text(i.responsableRevision || i.responsable_revision || i.responsable_alertado, ''),
          accion: v.text(i.accionAutomatica || i.accion_automatica || i.accion_tomada || i.accion, ''),
          observacion: v.text(i.observacionRevision || i.observacion_revision || i.observacion, '')
        };
      },

      telegramItem(t, index) {
        const v = VisionUtils;
        return {
          id: v.text(t.id || t.clave || t.id_notificacion, 'tg-' + index),
          fecha: v.text(t.fecha || t.fecha_clase || t.timestamp_envio || t.timestamp, ''),
          hora: v.text(t.hora || '', ''),
          tipo: v.text(t.tipo || t.tipo_notificacion || t.evento, 'NOTIFICACION'),
          resultado: v.text(t.resultado || t.resultado_envio || t.estado || 'ENVIADO', ''),
          destinatario: v.text(t.destinatario || t.nombre || t.chat_id || t.chat_destino, ''),
          sigla: v.text(t.sigla || t.sigla_curso, ''),
          mensaje: v.text(t.mensaje || t.texto || t.respuesta || t.detalle, '')
        };
      },

      timeline(raw, clases, incidencias, telegram) {
        const out = [];

        telegram.slice(0, 8).forEach(t => out.push({
          type: 'telegram',
          icon: '✉',
          title: t.tipo + (t.sigla ? ' · ' + t.sigla : ''),
          text: (t.resultado ? t.resultado + '. ' : '') + (t.mensaje || 'Notificación registrada en LOG_NOTIFICACIONES.'),
          time: t.fecha || t.hora || '',
          voice: 'Visión informó por Telegram'
        }));

        incidencias.slice(0, 8).forEach(i => out.push({
          type: 'incidencia',
          icon: '!',
          title: i.estadoDetectado + ' · ' + i.sigla,
          text: (i.responsable ? 'Responsable: ' + i.responsable + '. ' : '') + (i.observacion || i.accion || 'Incidencia operativa registrada.'),
          time: i.timestamp || i.fechaClase || '',
          voice: 'Visión abrió caso operativo'
        }));

        clases.slice(0, 8).forEach(c => out.push({
          type: 'clase',
          icon: '▶',
          title: c.estado + ' · ' + c.sigla,
          text: c.asignatura + ' · ' + c.profesor + ' · ' + (c.zoomActivo ? 'Zoom activo' : 'Zoom no activo') + '. Asistencia observada: ' + c.asistenciaPct + '%.',
          time: c.horaInicio || '',
          voice: c.zoomActivo ? 'Visión confirmó actividad' : 'Visión mantiene vigilancia'
        }));

        if (!out.length) {
          out.push({
            type: 'sistema',
            icon: '◆',
            title: 'Visión procesó el snapshot',
            text: 'No se encontraron eventos recientes para clases, incidencias o Telegram en la respuesta actual.',
            time: 'snapshot',
            voice: 'Visión procesó fuentes vivas'
          });
        }

        return out.slice(0, 16);
      }
    };

    /***********************************************************
     * 6. Componentes
     ***********************************************************/
    const VisionComponents = {
      kpi(label, value, note = '') {
        return `
          <div class="kpi-card">
            <div class="kpi-label">${VisionUtils.esc(label)}</div>

            <div class="kpi-note">${VisionUtils.esc(note)}</div>
          </div>`;

      badge(label, tone) {
        return `<span class="badge ${tone || VisionUtils.badgeClass(label)}">${VisionUtils.esc(label)}</span>`;

      classCard(c) {
        const tone = VisionUtils.classSeverityClass(c);
        const active = VisionState.selectedItemType === 'class' && VisionState.selectedItem?.id === c.id ? 'active' : '';

        const avance = Math.max(0, Math.min(100, VisionUtils.num(c.avancePct)));
        const zoomBadge = c.zoomActivo ? this.badge('ZOOM ACTIVO', 'ok') : this.badge('ZOOM NO ACTIVO', 'neutral');
        const estadoBadge = this.badge(c.estado, VisionUtils.badgeClass(c.estado));
        const sevBadge = c.severidad ? this.badge(c.severidad, VisionUtils.badgeClass(c.severidad)) : '';

        const accion = c.accionSugerida || c.observacion || 'Sin acción sugerida registrada para este snapshot.';
        return `
          <article class="class-card ${tone} ${active}" role="button" tabindex="0" onclick="VisionActions.selectItem('class','${VisionUtils.esc(c.id)}')">

                <div>
                  <h3 class="class-title">${VisionUtils.esc(c.sigla)}</h3>

                </div>

              <div class="class-meta-card"><small>Estado Zoom</small><strong>${VisionUtils.esc(c.estadoZoomTexto || (c.zoomActivo ? 'Sala activa detectada' : 'Sin sala activa detectada'))}</strong></div>
              <div class="class-meta-card"><small>Meeting ID</small><strong>${VisionUtils.esc(c.meetingId || 'No informado')}</strong></div>

      timelineItem(item) {
        const type = VisionUtils.text(item.type, 'sistema');
        const voice = item.voice || this.timelineVoice(type);
        return `
          <div class="timeline-item ${VisionUtils.esc(type)}">
            <div class="timeline-icon">${VisionUtils.esc(item.icon || '•')}</div>
            <div>
              <div class="timeline-head">
                <div class="timeline-title">${VisionUtils.esc(item.title)}</div>
                <div class="timeline-time">${VisionUtils.esc(item.time || 'ahora')}</div>
              </div>

              <div class="timeline-voice">${VisionUtils.esc(voice)}</div>
            </div>
          </div>`;
      },

      timelineVoice(type) {
        if (type === 'telegram') return 'Visión informó';
        if (type === 'incidencia') return 'Visión detectó';
        if (type === 'clase') return 'Visión observó';

      },

      incidentCard(i) {
        const tone = VisionUtils.badgeClass(i.severidad || i.estadoDetectado || i.estadoRevision);
        const actionText = i.observacion || i.accion || 'Incidencia registrada para revisión operativa.';

          <article class="case-card ${tone}" onclick="VisionActions.selectItem('incident','${VisionUtils.esc(i.id)}')">
            <div class="case-head">
              <div>
                <h3 class="case-title">${VisionUtils.esc(i.sigla)} · ${VisionUtils.esc(i.estadoDetectado)}</h3>

            <div class="telegram-message">

      implementationCard(x) {

      empty(text) {

      },

      topbar() {
        const s = VisionState.normalized.sistema;
        const e = VisionState.normalized.estado;
        const operativo = e.operativo || 'OPERANDO';
        const tone = operativo === 'ALERTA' ? 'danger' : 'ok';
        return `

<!DOCTYPE html>

<head>

<title>Visión | Centro Operativo Inteligente</title>
<style>
:root{--bg:#071426;--bg2:#0b1f3a;--panel:#f7fbff;--line:rgba(148,184,220,.25);--text:#102033;--muted:#64748b;--blue:#1d7df2;--blue2:#54b6ff;--green:#1f9d63;--red:#d92d20;--orange:#f97316;--shadow:0 22px 60px rgba(0,0,0,.22);--radius:22px}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Segoe UI",Arial,sans-serif;color:#fff;background:radial-gradient(circle at 10% 0%,rgba(84,182,255,.26),transparent 32%),radial-gradient(circle at 90% 10%,rgba(126,231,255,.16),transparent 35%),linear-gradient(135deg,var(--bg) 0%,var(--bg2) 55%,#06111f 100%);overflow-x:hidden}.shell{width:min(1480px,calc(100% - 32px));margin:0 auto;padding:18px 0 34px}.panel,.hero-main,.hero-bot{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(237,247,255,.90));color:var(--text);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.panel{margin-bottom:18px}.panel-header{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;padding:18px 20px;border-bottom:1px solid rgba(120,150,180,.18);background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(246,251,255,.92))}.panel-title{margin:0;font-size:19px;color:#0b1f3a;letter-spacing:-.02em}.panel-subtitle{margin-top:5px;color:var(--muted);font-size:12px}.panel-body{padding:18px 20px 20px}
.app-topbar{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;margin-bottom:14px;border:1px solid rgba(148,184,220,.22);border-radius:22px;padding:12px 14px;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);box-shadow:0 12px 28px rgba(0,0,0,.16)}.brand{display:flex;align-items:center;gap:12px;min-width:0}.brand img{width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 8px 16px rgba(0,0,0,.28))}.brand-title{font-size:18px;font-weight:950;letter-spacing:-.03em;color:#f3fbff;line-height:1.1}.brand-subtitle{font-size:12px;color:rgba(234,246,255,.76);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:700px}.topbar-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.ribbon{display:flex;gap:8px;align-items:center;overflow-x:auto;padding:8px;margin-bottom:18px;border:1px solid rgba(148,184,220,.22);border-radius:20px;background:rgba(255,255,255,.10);backdrop-filter:blur(10px);box-shadow:0 12px 28px rgba(0,0,0,.14)}.ribbon button{appearance:none;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(255,255,255,.10);color:rgba(255,255,255,.82);padding:10px 14px;font-weight:850;font-size:12px;white-space:nowrap;cursor:pointer;font-family:inherit}.ribbon button.active{background:linear-gradient(135deg,#eaf6ff,#fff);color:#0b1f3a;border-color:rgba(126,231,255,.55);box-shadow:0 10px 22px rgba(0,0,0,.18)}
.badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:900;white-space:nowrap;border:1px solid transparent}.badge.ok,.badge.baja,.badge.operando{background:rgba(31,157,99,.12);color:#11643c;border-color:rgba(31,157,99,.22)}.badge.alta,.badge.alerta{background:rgba(249,115,22,.13);color:#a94700;border-color:rgba(249,115,22,.24)}.badge.critica{background:rgba(217,45,32,.12);color:#b42318;border-color:rgba(217,45,32,.25)}.badge.media,.badge.go{background:rgba(29,125,242,.12);color:#0b4fa4;border-color:rgba(29,125,242,.24)}
.hero{display:grid;grid-template-columns:minmax(0,1.3fr) 360px;gap:22px;align-items:stretch;min-height:270px;margin-bottom:20px}.hero-main{padding:28px;position:relative}.hero-main:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(29,125,242,.10),transparent 52%),radial-gradient(circle at 86% 15%,rgba(84,182,255,.20),transparent 28%);pointer-events:none}.hero-content{position:relative;z-index:1}.eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(29,125,242,.12);color:#0b4fa4;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}.pulse{width:9px;height:9px;border-radius:999px;background:var(--green);box-shadow:0 0 0 0 rgba(31,157,99,.55);animation:pulse 1.4s infinite}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(31,157,99,.55)}70%{box-shadow:0 0 0 10px rgba(31,157,99,0)}100%{box-shadow:0 0 0 0 rgba(31,157,99,0)}}h1{margin:0;font-size:clamp(34px,5vw,62px);line-height:.96;letter-spacing:-.055em;color:#0b1f3a}.subtitle{margin-top:14px;max-width:860px;font-size:17px;line-height:1.5;color:#425466}.hero-strip{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}.chip{display:inline-flex;align-items:center;gap:7px;padding:9px 12px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid rgba(110,148,190,.28);color:#28425e;font-weight:700;font-size:12px}.hero-bot{display:flex;flex-direction:column;justify-content:space-between;min-height:270px;padding:18px;background:radial-gradient(circle at 50% 22%,rgba(84,182,255,.28),transparent 36%),linear-gradient(180deg,rgba(255,255,255,.95),rgba(230,245,255,.88))}.bot-wrap{flex:1;display:grid;place-items:center;min-height:185px}.bot-wrap img{width:min(230px,85%);filter:drop-shadow(0 18px 28px rgba(11,31,58,.25));animation:floatBot 3.4s ease-in-out infinite}@keyframes floatBot{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}.bot-caption{padding:13px 14px;border-radius:16px;background:rgba(11,31,58,.88);color:#eaf6ff;font-size:13px;line-height:1.4}
.status-row{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:14px;margin-bottom:18px}.status-card,.kpi-card{border:1px solid var(--line);background:rgba(255,255,255,.94);color:var(--text);border-radius:18px;box-shadow:0 14px 36px rgba(0,0,0,.14);padding:16px}.status-label,.kpi-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.status-value{margin-top:8px;font-size:18px;font-weight:900;color:#0b1f3a}.status-detail{margin-top:6px;font-size:12px;color:#64748b}.kpi-grid{display:grid;grid-template-columns:repeat(8,minmax(130px,1fr));gap:14px;margin-bottom:18px}.kpi-card{min-height:118px;position:relative;overflow:hidden}.kpi-card:after{content:"";position:absolute;right:-32px;top:-32px;width:92px;height:92px;border-radius:50%;background:rgba(29,125,242,.10)}.kpi-value{margin-top:12px;font-size:34px;font-weight:900;letter-spacing:-.04em;color:#0b1f3a;position:relative;z-index:1}.kpi-note{margin-top:4px;color:var(--muted);font-size:12px;position:relative;z-index:1}.grid-main{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;margin-bottom:18px}.inc-list{display:grid;gap:12px}.inc-card{border:1px solid rgba(120,150,180,.22);border-left:6px solid var(--blue);border-radius:16px;padding:13px 14px;background:rgba(255,255,255,.86)}.inc-card.alta{border-left-color:var(--orange)}.inc-card.baja{border-left-color:var(--green)}.inc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.inc-title{font-size:14px;font-weight:900;color:#0b1f3a;line-height:1.25}.inc-meta{margin-top:7px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px 12px;color:#475569;font-size:12px}.inc-meta b{color:#1e344d}.inc-note{margin-top:9px;color:#64748b;font-size:12px;line-height:1.4}.empty{border:1px dashed rgba(120,150,180,.38);border-radius:16px;padding:18px;color:#64748b;background:rgba(255,255,255,.58);text-align:center;font-size:13px;line-height:1.5}.footer{margin-top:18px;color:rgba(255,255,255,.72);font-size:12px;text-align:center}.error-box{padding:18px;border-radius:18px;background:rgba(217,45,32,.14);border:1px solid rgba(217,45,32,.30);color:#fff}
.function-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.function-card,.module-card{border:1px solid rgba(120,150,180,.22);border-radius:18px;background:rgba(255,255,255,.86);padding:16px}.function-card h3,.module-card h3{margin:0 0 12px;color:#0b1f3a;font-size:16px}.check-list{display:grid;gap:9px}.check-item{display:flex;gap:9px;align-items:flex-start;color:#334155;font-size:13px;line-height:1.35}.check{width:19px;height:19px;flex:0 0 auto;border-radius:999px;display:grid;place-items:center;font-size:12px;font-weight:900;background:rgba(31,157,99,.14);color:#11643c}.next .check{background:rgba(29,125,242,.12);color:#0b4fa4}.module-grid{display:grid;grid-template-columns:repeat(3,minmax(220px,1fr));gap:14px}.module-card{min-height:135px}.module-card p{margin:0;color:#64748b;font-size:13px;line-height:1.45}.module-card .big{margin-top:10px;font-size:28px;color:#0b1f3a;font-weight:950;letter-spacing:-.04em}
.loading{display:grid;place-items:center;min-height:220px;color:rgba(255,255,255,.82);font-weight:700}.loading-vision{display:grid;place-items:center;min-height:520px}.loading-vision-card{width:min(520px,calc(100vw - 42px));border:1px solid rgba(148,184,220,.26);border-radius:28px;padding:34px 30px 28px;background:radial-gradient(circle at 50% 12%,rgba(84,182,255,.22),transparent 44%),linear-gradient(180deg,rgba(255,255,255,.96),rgba(230,245,255,.88));box-shadow:0 26px 70px rgba(0,0,0,.28);color:#0b1f3a;text-align:center}.loading-vision-bot-stage{position:relative;width:190px;max-width:68%;margin:0 auto;display:grid;place-items:center;filter:drop-shadow(0 18px 28px rgba(11,31,58,.22))}.loading-vision-bot-base,.loading-vision-bot-fill{width:100%;display:block;user-select:none;pointer-events:none}.loading-vision-bot-base{opacity:.18;filter:grayscale(.18) saturate(.55);transform:scale(.96)}.loading-vision-bot-fill-wrap{position:absolute;inset:0;overflow:hidden;clip-path:inset(100% 0 0 0);transition:clip-path .18s linear}.loading-vision-bot-fill{opacity:1;filter:saturate(1.15);transform:scale(.96)}.loading-vision-bot-glow{position:absolute;left:50%;bottom:0;width:82%;height:18px;transform:translateX(-50%);border-radius:999px;background:radial-gradient(circle,rgba(84,182,255,.55),rgba(84,182,255,0) 70%);opacity:.25;transition:opacity .18s linear,bottom .18s linear;pointer-events:none}.loading-vision-title{margin-top:18px;font-size:28px;font-weight:950;letter-spacing:-.04em}.loading-vision-subtitle{margin-top:6px;color:#607186;font-size:14px;line-height:1.4}.loading-percent{margin-top:18px;font-size:42px;font-weight:950;letter-spacing:-.05em;color:#0b1f3a}.loading-bar{width:100%;height:13px;margin-top:14px;border-radius:999px;background:#e6edf6;overflow:hidden;position:relative}.loading-bar-fill{width:0%;height:100%;border-radius:999px;background:linear-gradient(90deg,#1d7df2,#54b6ff);position:relative;transition:width .18s linear;overflow:hidden}.loading-bar-fill:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(-45deg,rgba(255,255,255,.25) 0px,rgba(255,255,255,.25) 7px,rgba(255,255,255,0) 7px,rgba(255,255,255,0) 14px);animation:stripesMoveVision 1.1s linear infinite}.loading-vision-foot{margin-top:14px;color:#64748b;font-size:12px}
.vision-class-card{--accent:var(--blue);border:1px solid rgba(120,150,180,.22);border-left:8px solid var(--accent);border-radius:20px;padding:18px;background:rgba(255,255,255,.88);box-shadow:0 12px 28px rgba(11,31,58,.08)}.vision-class-card.alta{--accent:var(--orange)}.vision-class-card.baja{--accent:var(--green)}.vision-class-card.ok{--accent:var(--blue)}.vision-class-layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(230px,.85fr) 140px;grid-template-areas:"title title status" "subtitle subtitle donut" "leftmeta rightmeta donut" "progress progress progress" "note note note";gap:12px 18px;align-items:start}.vision-class-title{grid-area:title;font-size:24px;font-weight:950;color:#061a32;line-height:1.15;letter-spacing:-.03em}.vision-class-subtitle{grid-area:subtitle;font-size:17px;color:#607186;line-height:1.35}.vision-class-status{grid-area:status;display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}.vision-class-donut{grid-area:donut;display:grid;justify-items:center;align-content:start;padding-top:4px}.vision-class-meta-left{grid-area:leftmeta;display:grid;gap:12px}.vision-class-meta-right{grid-area:rightmeta;display:grid;gap:12px}.vision-class-meta-item{font-size:16px;color:#334155;line-height:1.35}.vision-class-meta-item b{color:#061a32;font-weight:900}.vision-class-progress{grid-area:progress}.vision-class-time{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:16px;color:#334155;padding-top:4px;margin-bottom:12px}.vision-class-time b{color:#061a32;font-weight:900}.vision-class-note{grid-area:note;border-top:1px solid rgba(120,150,180,.22);padding-top:14px;color:#607186;font-size:15px;line-height:1.45}.vision-progress-label{display:flex;justify-content:space-between;font-size:14px;color:#64748b;margin-bottom:7px}.vision-progress-label b{color:#334155}.vision-progress-track{height:14px;border-radius:999px;background:#e6edf6;overflow:visible;position:relative}.vision-progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#b77900,#f4b63f);position:relative;overflow:hidden;transition:width .35s linear}.vision-progress-fill:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(-45deg,rgba(255,255,255,.22) 0px,rgba(255,255,255,.22) 7px,rgba(255,255,255,0) 7px,rgba(255,255,255,0) 14px);animation:stripesMoveVision 1.2s linear infinite}.vision-progress-dot{position:absolute;top:50%;width:17px;height:17px;transform:translateY(-50%);border-radius:50%;background:#b77900;border:3px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.16);transition:left .35s linear}.vision-donut-box{display:grid;place-items:center;gap:7px}.vision-donut{width:96px;height:96px;border-radius:50%;display:grid;place-items:center}.vision-donut-inner{width:68px;height:68px;border-radius:50%;background:#fff;display:grid;place-items:center;color:#061a32;font-weight:950;font-size:20px}.vision-donut-caption{font-size:13px;color:#64748b;text-align:center;line-height:1.18}
.timeline{display:grid;gap:12px}.timeline-item{display:grid;grid-template-columns:38px 1fr;gap:10px;align-items:start;border:1px solid rgba(120,150,180,.22);border-radius:16px;background:rgba(255,255,255,.82);padding:13px}.timeline-icon{width:34px;height:34px;border-radius:999px;display:grid;place-items:center;background:rgba(29,125,242,.12);color:#0b4fa4;font-weight:950}.timeline-title{font-weight:900;color:#0b1f3a;font-size:14px}.timeline-text{margin-top:4px;color:#64748b;font-size:12px;line-height:1.4}@keyframes stripesMoveVision{from{background-position:0 0}to{background-position:24px 0}}

/* ===== Visión · Salud de Implementación Moodle ===== */
.impl-health-intro{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-bottom:16px}
.impl-health-card{border:1px solid rgba(120,150,180,.22);border-radius:18px;background:rgba(255,255,255,.88);padding:16px}
.impl-health-card h3{margin:0 0 8px;color:#0b1f3a;font-size:16px}
.impl-health-card p{margin:0;color:#64748b;font-size:13px;line-height:1.45}
.impl-search{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
.impl-search input{flex:1 1 250px;min-width:220px;border:1px solid #cdd9e8;border-radius:14px;padding:11px 13px;font-weight:900;font-family:inherit;color:#0b1f3a;background:#fff}
.impl-search button{appearance:none;border:0;border-radius:14px;padding:11px 15px;background:linear-gradient(135deg,#1d7df2,#54b6ff);color:#fff;font-weight:950;font-family:inherit;cursor:pointer;box-shadow:0 10px 22px rgba(29,125,242,.24)}
.impl-search button:disabled{opacity:.58;cursor:not-allowed}
.impl-status{margin-top:12px;border:1px dashed rgba(120,150,180,.38);border-radius:16px;padding:12px;background:rgba(255,255,255,.62);color:#475569;font-size:13px;line-height:1.45}
.impl-route{padding:22px 10px 10px}
.impl-line-wrap{position:relative;padding:46px 18px 18px}
.impl-line{position:relative;height:12px;border-radius:999px;background:#dce8f4;overflow:visible}
.impl-line-fill{position:absolute;inset:0 auto 0 0;width:0%;border-radius:999px;background:linear-gradient(90deg,#1d7df2,#23c7b9);transition:width .7s ease;overflow:hidden}
.impl-line-fill:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(-45deg,rgba(255,255,255,.28) 0px,rgba(255,255,255,.28) 7px,rgba(255,255,255,0) 7px,rgba(255,255,255,0) 14px);animation:stripesMoveVision 1.2s linear infinite}
.impl-robot{position:absolute;top:-44px;left:0%;width:58px;height:58px;object-fit:contain;transform:translateX(-50%);transition:left .7s ease,opacity .25s ease;filter:drop-shadow(0 10px 16px rgba(11,31,58,.22))}
.impl-nodes{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:12px;margin-top:24px}
.impl-node{text-align:center;font-size:11px;font-weight:900;color:#51657c;line-height:1.18}
.impl-dot{width:38px;height:38px;margin:0 auto 7px;border-radius:50%;display:grid;place-items:center;border:4px solid rgba(255,255,255,.86);box-shadow:0 8px 18px rgba(11,31,58,.16);background:#aab7c5;color:#fff;font-size:17px;font-weight:950}
.impl-dot.ok{background:#1fc18b}.impl-dot.pending{background:#98a6b5}.impl-dot.warn{background:#f5b544}.impl-dot.error{background:#e94242}
.impl-summary-grid{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:12px;margin:16px 0}
.impl-summary-box{background:#fff;border:1px solid #dce8f4;border-radius:18px;padding:14px;text-align:center}
.impl-summary-box .big{display:block;font-size:28px;font-weight:950;color:#083c72;letter-spacing:-.04em}
.impl-summary-box small{display:block;margin-top:3px;color:#64748b;font-weight:800}
.impl-evidence{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:14px 0}
.impl-evidence-card{border:1px solid rgba(120,150,180,.22);border-radius:18px;background:rgba(255,255,255,.88);padding:14px}
.impl-evidence-card h3{margin:0 0 10px;font-size:15px;color:#0b1f3a}
.impl-pill-list{display:flex;gap:7px;flex-wrap:wrap}
.impl-pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:900;border:1px solid rgba(120,150,180,.22);background:#fff;color:#475569}
.impl-pill.ok{background:rgba(31,193,139,.12);color:#11643c}.impl-pill.pending{background:rgba(100,116,139,.10);color:#475569}.impl-pill.warn{background:rgba(245,181,68,.14);color:#8a4f00}.impl-pill.error{background:rgba(233,66,66,.12);color:#b42318}
.impl-table-wrap{overflow-x:auto;border:1px solid rgba(120,150,180,.22);border-radius:18px;background:#fff}
.impl-table{width:100%;border-collapse:collapse;min-width:920px}
.impl-table th,.impl-table td{padding:11px 12px;border-bottom:1px solid #e5edf5;text-align:left;vertical-align:top;font-size:12px;line-height:1.35}
.impl-table th{background:#eef6ff;color:#083c72;font-weight:950}
.impl-table tr:last-child td{border-bottom:0}
.impl-table .node-name{font-weight:950;color:#0b1f3a}.impl-table .criterion{display:block;margin-top:4px;color:#64748b;font-size:11px}
.impl-state{display:inline-flex;border-radius:999px;padding:6px 9px;font-weight:950;font-size:11px}.impl-state.ok{background:rgba(31,193,139,.12);color:#11643c}.impl-state.pending{background:rgba(100,116,139,.10);color:#475569}.impl-state.warn{background:rgba(245,181,68,.14);color:#8a4f00}.impl-state.error{background:rgba(233,66,66,.12);color:#b42318}
.impl-json-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.impl-json-box{background:#071426;color:#dbeafe;border-radius:16px;padding:12px;overflow:auto;max-height:280px;font-family:Consolas,monospace;font-size:11px;line-height:1.45}
.impl-json-box b{display:block;color:#7dd3fc;margin-bottom:7px;font-family:"Segoe UI",Arial,sans-serif;font-size:12px}

<body>
<div class="shell">
  <div id="app" class="loading">Cargando Visión...</div>
  <div class="footer">Visión | Centro Operativo Inteligente · Campus Virtual · Actualización automática</div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwkrOVT4hZ-vKM7avoJKaZYyJpygSr-QV7oRILybqKa5moZhp7pI8h_MQM_YV9tfwcd/exec';
const BOT_IMG='assets/vision-bot.png';
const REFRESH_SECONDS=180;
let refreshLeft=REFRESH_SECONDS,refreshTimer=null,classClockTimer=null,loadingTimer=null,loadingProgress=0,visionData=null,currentView='inicio';
const VIEWS=[['inicio','Inicio'],['monitoreo','Monitoreo en Vivo'],['bandeja','Bandeja Ejecutiva'],['recordatorios','Recordatorios'],['salud','Salud de Cursos'],['timeline','Timeline'],['reportes','Reportes']];

function jsonp(url){return new Promise((resolve,reject)=>{const cb='__visionCallback_'+Date.now()+'_'+Math.floor(Math.random()*100000);window[cb]=data=>{try{resolve(data)}finally{delete window[cb];script.remove()}};const script=document.createElement('script');script.src=url+(url.includes('?')?'&':'?')+'action=visionLiveOperationsSnapshot&callback='+encodeURIComponent(cb)+'&_='+Date.now();script.onerror=()=>{delete window[cb];script.remove();reject(new Error('No fue posible conectar con el endpoint de Visión.'))};document.body.appendChild(script)})}
function gasJsonpAction(action,params={}){return new Promise((resolve,reject)=>{const cb='__visionActionCallback_'+Date.now()+'_'+Math.floor(Math.random()*100000);window[cb]=data=>{try{resolve(data)}finally{delete window[cb];script.remove()}};const qs=new URLSearchParams(Object.assign({},params,{action,callback:cb,_:Date.now()}));const script=document.createElement('script');script.src=GAS_URL+'?'+qs.toString();script.onerror=()=>{delete window[cb];script.remove();reject(new Error('No fue posible conectar con el endpoint de Visión.'))};document.body.appendChild(script)})}



function normalizarSnapshotVision_(data){
  if(!data||!data.ok)return data;

  const esLive=(data.estado&&data.estado.esSnapshotVivo)||((data.sistema||{}).modulo==='Snapshot Vivo Operacional');
  if(!esLive)return data;

  const k=data.kpis||{};
  const vivo=data.visionEnVivo||{};
  const bandeja=data.bandeja||{};
  const incidencias=data.incidencias||{};
  const notificaciones=data.notificaciones||{};
  const clases=(vivo.detalleClases||[]).map(adaptarClaseViva_);

  const pendientesPrioridad=bandeja.pendientesPorPrioridad||{};
  const pendientesEstado=bandeja.pendientesPorEstadoRevision||{};

  return Object.assign({},data,{
    sistema:Object.assign({
      titulo:'Visión | Centro Operativo Inteligente',
      subtitulo:'Monitoreo vivo, trazabilidad e incidencias operativas de Campus Virtual'
    },data.sistema||{}),
    estado:Object.assign({},data.estado||{},{
      modoProduccion:true,
      telegramActivo:true,
      horaSimulada:false,
      actualizacionCursosAntesMonitoreo:'',
      triggersActivos:'',
      detalle:(data.estado&&data.estado.detalle)||'Snapshot vivo calculado desde EVENTOS_CLASE, INCIDENCIAS, LOG_NOTIFICACIONES y BANDEJA_INCIDENCIAS.'
    }),
    kpis:Object.assign({},k,{
      pendientesBandeja:k.pendientesBandeja||bandeja.pendientesRevision||0,
      incidenciasAbiertas:k.incidenciasAbiertas||incidencias.abiertas||0,
      criticasOperativasAbiertas:k.criticasOperativasAbiertas||incidencias.criticasOperativasAbiertas||0
    }),
    motor:{
      timestamp:(data.sistema||{}).generadoEn||'',
      clasesEvaluadasUltimoCiclo:vivo.clasesMonitoreadas||k.clasesMonitoreadasHoy||0,
      reunionesLiveZoomUltimoCiclo:vivo.clasesConZoomActivo||k.clasesConZoomActivoHoy||0,
      clases:clases
    },
    bandeja:{
      total:bandeja.pendientesRevision||k.pendientesBandeja||0,
      fuente:bandeja.fuente||'BANDEJA_INCIDENCIAS',
      abiertasEnBandeja:bandeja.abiertasEnBandeja||0,
      incidenciasEnBandeja:bandeja.totalBandeja||k.incidenciasEnBandeja||0,
      resumen:{
        alta:Number(pendientesPrioridad.ALTA||pendientesPrioridad.Alta||pendientesPrioridad.alta||0),
        critica:Number(pendientesPrioridad.CRITICA||pendientesPrioridad.Critica||pendientesPrioridad.critica||0),
        media:Number(pendientesPrioridad.MEDIA||pendientesPrioridad.Media||pendientesPrioridad.media||0),
        baja:Number(pendientesPrioridad.BAJA||pendientesPrioridad.Baja||pendientesPrioridad.baja||0),
        enObservacion:Number(pendientesEstado.EN_OBSERVACION||pendientesEstado.en_observacion||0)
      },
      items:[],

      // Datos explicativos para la nueva tarjeta de resumen cuando no hay listado detallado.
      liveResumen:{
        totalBandeja:bandeja.totalBandeja||0,
        pendientesRevision:bandeja.pendientesRevision||0,
        abiertasEnBandeja:bandeja.abiertasEnBandeja||0,
        pendientesPorPrioridad:pendientesPrioridad,
        pendientesPorEstadoRevision:pendientesEstado
      }
    },
    recordatorios:{
      enviadosHoy:k.recordatoriosEnviadosHoy||notificaciones.recordatoriosEnviados||0,
      alertasHoy:k.alertasIncidenciaHoy||notificaciones.alertasIncidenciaEnviadas||0,
      erroresHoy:k.erroresNotificacionHoy||notificaciones.errores||0
    },
    impacto:{
      funcionesAbsorbidas:[
        'Monitoreo automático de clases en ventana operativa.',
        'Detección automática de clases no iniciadas, baja asistencia y finalización anticipada.',
        'Registro de incidencias con trazabilidad.',
        'Alertas por Telegram con antiduplicado operativo.'
      ],
      proximasAutomatizaciones:[
        'Snapshot ejecutivo vivo separado del reporte diario.',
        'Auditoría Zoom de cierre operativo.',
        'Salud de implementación Moodle bajo demanda.'
      ],
      conclusion:'El snapshot vivo permite que la vitrina ejecutiva refleje la operación real del día sin depender del reporte diario ni del cierre analítico.'
    }
  });
}

function adaptarClaseViva_(c){
  const estado=estadoPrincipalClaseViva_(c.estados||{});
  return {
    sigla:c.sigla||'',
    estado:estado,
    asignatura:'',
    profesor:'',
    inicio:'',
    fin:'',
    participantes:c.maxParticipantes||0,
    agendados:c.maxAgendados||0,
    zoomActivo:!!c.zoomActivo,
    observacion:'Eventos registrados: '+num(c.eventos||0)+' · Estados: '+resumirEstadosClase_(c.estados||{})
  };
}

function estadoPrincipalClaseViva_(estados){
  const prioridad=['NO_INICIADA_T5','NO_INICIADA_T2','FINALIZACION_ANTICIPADA','BAJA_ASISTENCIA','PROFESOR_SOLO','SIN_ESTUDIANTES','INICIADA_NORMAL','PROXIMA_A_INICIAR','ESPERANDO_INICIO','EN_VENTANA_PREVIA','FINALIZADA'];
  for(const p of prioridad){if(Number(estados[p]||0)>0)return p}
  const keys=Object.keys(estados||{});
  return keys.length?keys[0]:'SIN_ESTADO';
}

function resumirEstadosClase_(estados){
  const keys=Object.keys(estados||{});
  if(!keys.length)return 'sin estados';
  return keys.map(k=>k+'('+estados[k]+')').join(', ');
}

async function cargarVision(){const app=document.getElementById('app');const first=app.dataset.loaded!=='1';try{if(first)mostrarCargaVision_();const data=await jsonp(GAS_URL);if(!data||!data.ok)throw new Error((data&&data.error)||'Respuesta inválida del backend.');visionData=normalizarSnapshotVision_(data);if(first){completarCargaVision_(()=>{app.dataset.loaded='1';renderShell()})}else renderShell();refreshLeft=REFRESH_SECONDS}catch(err){detenerCargaVision_();app.className='';app.innerHTML=`<div class="error-box"><strong>No fue posible cargar Visión.</strong><br><br>${escapeHtml(err.message)}</div>`}}

function mostrarCargaVision_(){const app=document.getElementById('app');loadingProgress=0;app.className='loading-vision';app.innerHTML=`<div class="loading-vision-card"><div class="loading-vision-bot-stage"><img class="loading-vision-bot-base" src="${BOT_IMG}" alt="Visión base"><div id="loadingVisionBotFillWrap" class="loading-vision-bot-fill-wrap"><img class="loading-vision-bot-fill" src="${BOT_IMG}" alt="Visión cargando"></div><div id="loadingVisionBotGlow" class="loading-vision-bot-glow"></div></div><div class="loading-vision-title">Cargando Visión</div><div class="loading-vision-subtitle">Inicializando centro operativo, métricas, alertas y bandeja ejecutiva.</div><div id="loadingVisionPct" class="loading-percent">0%</div><div class="loading-bar"><div id="loadingVisionFill" class="loading-bar-fill"></div></div><div class="loading-vision-foot">Preparando snapshot ejecutivo en tiempo real...</div></div>`;detenerCargaVision_();loadingTimer=setInterval(()=>{if(loadingProgress<92){loadingProgress=Math.min(92,loadingProgress+Math.floor(Math.random()*5)+2);actualizarCargaVision_(loadingProgress)}},140)}
function completarCargaVision_(callback){detenerCargaVision_();const ini=loadingProgress,dur=420,t0=performance.now();function anim(t){const a=Math.min(1,(t-t0)/dur),p=Math.round(ini+(100-ini)*a);actualizarCargaVision_(p);if(a<1)requestAnimationFrame(anim);else setTimeout(callback,160)}requestAnimationFrame(anim)}
function detenerCargaVision_(){if(loadingTimer){clearInterval(loadingTimer);loadingTimer=null}}
function actualizarCargaVision_(pct){const p=Math.max(0,Math.min(100,Number(pct||0)));const pctEl=document.getElementById('loadingVisionPct'),fillEl=document.getElementById('loadingVisionFill'),wrap=document.getElementById('loadingVisionBotFillWrap'),glow=document.getElementById('loadingVisionBotGlow');if(pctEl)pctEl.textContent=p+'%';if(fillEl)fillEl.style.width=p+'%';if(wrap)wrap.style.clipPath=`inset(${100-p}% 0 0 0)`;if(glow){glow.style.opacity=String(.25+(p/100)*.65);glow.style.bottom=`${Math.max(0,p*.72)}%`}}

function startRefreshClock(){if(refreshTimer)clearInterval(refreshTimer);refreshTimer=setInterval(()=>{refreshLeft--;const el=document.getElementById('refreshCounter');if(el)el.textContent=refreshLeft+' s';if(refreshLeft<=0){cargarVision();refreshLeft=REFRESH_SECONDS}},1000)}
function setView(id){currentView=id;renderShell()}
function renderShell(){const d=visionData||{},estado=d.estado||{},sistema=d.sistema||{};document.getElementById('app').className='';document.getElementById('app').innerHTML=`${renderTopbar(sistema,estado)}${renderRibbon()}${renderCurrentView()}`;startRefreshClock();startClassClock();actualizarRelojesClase_()}

function renderRibbon(){return `<nav class="ribbon">${VIEWS.map(v=>`<button type="button" class="${currentView===v[0]?'active':''}" onclick="setView('${v[0]}')">${escapeHtml(v[1])}</button>`).join('')}</nav>`}

function renderVistaBandeja(d){return `<div class="grid-main">${renderBandeja(d.bandeja||{})}<section class="panel"><div class="panel-header"><div><h2 class="panel-title">Criterio de gestión</h2><div class="panel-subtitle">Priorización ejecutiva para resolver o escalar.</div></div><span class="badge media">Gestión</span></div><div class="panel-body"><div class="check-list"><div class="check-item"><span class="check">1</span><span>Revisar primero incidencias de prioridad alta.</span></div><div class="check-item"><span class="check">2</span><span>Registrar acción tomada antes de cerrar una incidencia.</span></div><div class="check-item"><span class="check">3</span><span>Escalar solo cuando existe impacto de servicio o recurrencia.</span></div><div class="check-item"><span class="check">4</span><span>Dejar trazabilidad para reporte diario y revisión semanal.</span></div></div></div></section></div>`}
function renderVistaRecordatorios(d){const k=d.kpis||{};return `<section class="panel"><div class="panel-header"><div><h2 class="panel-title">Recordatorios inteligentes</h2><div class="panel-subtitle">Mirror operativo de comunicaciones preventivas y potencialidades de automatización.</div></div><span class="badge ok">Telegram operativo</span></div><div class="panel-body"><div class="report-hero-grid"><div class="telegram-mirror"><h3 style="margin:0 0 8px;color:#eaf6ff;">Mirror Telegram interno</h3><div class="telegram-msg">🔔 Visión recuerda una clase próxima a iniciar\nClase: 2026 EET CR LEN01\nHorario: 10:45 - 12:15\nAcción sugerida: iniciar o verificar sala Zoom a tiempo.</div><div class="telegram-msg alert">🟠 Visión detectó una incidencia\nEstado: NO_INICIADA_T2\nAcción sugerida: AVISAR_PROFESOR\nSe deja trazabilidad sin mostrar Telegram personal.</div><div class="telegram-msg critica">🔴 Incidencia crítica\nEstado: NO_INICIADA_T5\nResponsable sugerido: Ingrid / Campus Virtual\nRequiere revisión operativa.</div></div><div class="report-story"><h3>Por qué esto importa</h3><p>El mirror permite mostrar al gerente la trazabilidad de Visión sin abrir Telegram personal ni exponer conversaciones privadas. La plataforma se transforma en vitrina operativa y evidencia de servicio.</p><div class="service-gauge-grid"><div class="service-gauge"><div class="score">${num(k.recordatoriosEnviadosHoy)}</div><small>recordatorios enviados hoy</small></div><div class="service-gauge"><div class="score">${num(k.alertasIncidenciaHoy||k.incidenciasDetectadasHoy)}</div><small>alertas o incidencias del día</small></div></div></div></div><div class="potential-grid"><div class="potential-card"><h3>Mailing a profesores</h3><span class="badge media">Potencial</span><p>Recordatorio automático con horario, curso y link operativo.</p><div class="example-box"><b>Ejemplo:</b> “Profesor/a, hoy tiene clase 2026 EET CR MAT01 a las 09:00. Verifique sala Zoom antes del inicio.”</div></div><div class="potential-card"><h3>Mailing a estudiantes</h3><span class="badge media">Potencial</span><p>Comunicación previa a estudiantes agendados, útil si la clase cambia de sala o requiere recuperación.</p><div class="example-box"><b>Ejemplo:</b> “Tu clase inicia pronto. Marca asistencia en Moodle y luego ingresa al recurso Zoom habilitado.”</div></div><div class="potential-card"><h3>WhatsApp profesores</h3><span class="badge alta">Uso acotado</span><p>Canal reservado para incidencias críticas, evitando gasto masivo.</p><div class="example-box"><b>Ejemplo:</b> “Visión no detecta inicio de sala. Favor confirmar estado de la clase.”</div></div><div class="potential-card"><h3>Trazabilidad</h3><span class="badge ok">Clave gerencial</span><p>Cada comunicación queda como evento operacional: enviado, omitido por antiduplicado, error o gestionado.</p></div></div></div></section>`}
function renderVistaSalud(){return `${renderSaludImplementacionMoodle()}<section class="panel"><div class="panel-header"><div><h2 class="panel-title">Salud preventiva de cursos</h2><div class="panel-subtitle">Diseño funcional posterior: controles masivos para anticipar brechas antes de que sean incidencias.</div></div><span class="badge media">Diseño funcional</span></div><div class="panel-body"><div class="module-grid"><div class="module-card"><h3>Cursos sin link Zoom</h3><p>Detección de cursos en funcionamiento con campo de acceso incompleto.</p></div><div class="module-card"><h3>Cursos sin profesor</h3><p>Validación de programación académica incompleta.</p></div><div class="module-card"><h3>Cursos sin agendados</h3><p>Diferenciar cursos sin demanda, cursos GO y errores de fuente.</p></div><div class="module-card"><h3>Modelo GO</h3><p>Tratamiento separado para cursos satélite con participación observada.</p></div><div class="module-card"><h3>Horarios inconsistentes</h3><p>Revisión de inicio, término, ventanas y cruces de día.</p></div><div class="module-card"><h3>Fórmulas / fuentes</h3><p>Control de agendados, LOG_ZOOM, CURSOS y observaciones.</p></div></div></div></section>`}
function renderSaludImplementacionMoodle(){return `<section class="panel" id="implHealthPanel"><div class="panel-header"><div><h2 class="panel-title">Salud de Implementación Moodle</h2><div class="panel-subtitle">Consulta puntual por sigla. Visión compara CURSOS contra Moodle/API y entrega evidencia por nodo.</div></div><span class="badge media">Diagnóstico bajo demanda</span></div><div class="panel-body"><div class="impl-health-intro"><div class="impl-health-card"><h3>Consulta de salud</h3><p>Ingrese una sigla de curso para verificar curso Moodle, grupo, cohorte, asistencia, restricciones, Zoom y profesor.</p><div class="impl-search"><input id="implSiglaInput" value="2026 EET CR LEN01" placeholder="Ej: 2026 EET CR LEN01"><button id="implRunBtn" type="button" onclick="runImplementationHealthCheck()">Verificar</button></div><div id="implStatus" class="impl-status">Listo para verificar. La consulta se ejecuta contra Apps Script y Moodle/API.</div></div><div class="impl-health-card"><h3>Lectura esperada</h3><p>El robot Visión avanza paso a paso por cada nodo de verificación. Al finalizar, cada nodo queda con check verde, cruz roja u observación según la matriz: <b>esperado desde CURSOS</b> versus <b>capturado desde Moodle/API</b>.</p></div></div><div class="impl-route"><div class="impl-line-wrap"><div class="impl-line"><div id="implProgressFill" class="impl-line-fill"></div><img id="implRobot" class="impl-robot" src="${BOT_IMG}" alt="Visión"></div><div id="implNodes" class="impl-nodes">${renderImplementationPlaceholderNodes()}</div></div></div><div class="impl-summary-grid"><div class="impl-summary-box"><span id="implPercent" class="big">0%</span><small>verificación</small></div><div class="impl-summary-box"><span id="implOk" class="big">0</span><small>OK</small></div><div class="impl-summary-box"><span id="implBrechas" class="big">0</span><small>brechas</small></div><div class="impl-summary-box"><span id="implPendientes" class="big">0</span><small>pendientes</small></div></div><div id="implEvidence" class="impl-evidence"></div><div id="implTable" class="impl-table-wrap"></div><div id="implJsonGrid" class="impl-json-grid"></div></div></section>`}
function renderImplementationPlaceholderNodes(){const nodes=implNodeCatalog_();return nodes.map(n=>`<div class="impl-node"><div class="impl-dot icon pending">${n.icon}</div><div>${escapeHtml(n.short)}</div></div>`).join('')}
function renderVistaTimeline(d){const k=d.kpis||{},items=((d.bandeja||{}).items||[]);const base=[{icon:'🤖',title:'Snapshot vivo actualizado',text:'Visión consolidó operación viva desde eventos, incidencias, recordatorios y bandeja.',meta:['fuente viva','no depende del cierre diario']},{icon:'🔔',title:'Recordatorios procesados',text:`Recordatorios internos enviados hoy: ${num(k.recordatoriosEnviadosHoy)}.`,meta:['Telegram','antiduplicado']},{icon:'⚠️',title:'Incidencias detectadas',text:`Incidencias detectadas hoy: ${num(k.incidenciasDetectadasHoy)}. Pendientes actuales: ${num(k.pendientesBandeja)}.`,meta:['priorización','trazabilidad']},{icon:'✅',title:'Cierres normalizados',text:`Incidencias cerradas o normalizadas hoy: ${num(k.incidenciasCerradasHoy)}.`,meta:['seguimiento','auditoría']}];const demo=[{icon:'🟠',title:'Ejemplo · NO_INICIADA_T2',text:'Visión detecta que una sala no inició a tiempo y sugiere avisar al profesor.',meta:['demo','operación preventiva']},{icon:'🔴',title:'Ejemplo · NO_INICIADA_T5',text:'Visión escala a crítica cuando pasan más minutos sin evidencia de inicio.',meta:['demo','escalamiento']},{icon:'📊',title:'Ejemplo · Reporte gerencial',text:'Los eventos alimentan reportes de salud del servicio, suspensiones, retrasos y recurrencias.',meta:['demo','gerencia']}];const extra=items.slice(0,4).map(x=>({icon:'!',title:`${x.sigla||'-'} · ${x.estadoDetectado||''}`,text:x.observacion||'',meta:[x.prioridad||'',x.responsable||''].filter(Boolean)}));const all=[...base,...extra,...demo];return `<section class="panel"><div class="panel-header"><div><h2 class="panel-title">Timeline operativo</h2><div class="panel-subtitle">Bitácora conversacional: lo que Visión observa, notifica, escala y deja como evidencia.</div></div><span class="badge media">Demo ejecutiva</span></div><div class="panel-body"><div class="timeline-grid">${all.map(x=>`<div class="timeline-item rich"><div class="timeline-icon">${x.icon}</div><div><div class="timeline-title">${escapeHtml(x.title)}</div><div class="timeline-text">${escapeHtml(x.text)}</div><div class="timeline-meta">${(x.meta||[]).map(m=>`<span class="timeline-chip">${escapeHtml(m)}</span>`).join('')}</div></div></div>`).join('')}</div></div></section>`}
function renderVistaReportes(d){const k=d.kpis||{},s=d.sistema||{};const mon=Number(k.clasesMonitoreadasHoy||0),zoom=Number(k.clasesConZoomActivoHoy||0),inc=Number(k.incidenciasDetectadasHoy||0),cerr=Number(k.incidenciasCerradasHoy||0),ev=Number(k.eventosRegistradosHoy||0);const pctZoom=mon?Math.round(zoom/mon*100):0;const pctCierre=inc?Math.round(cerr/inc*100):0;const salud=Math.max(0,Math.min(100,Math.round(100-(inc/Math.max(mon,1))*35)));return `<section class="panel"><div class="panel-header"><div><h2 class="panel-title">Reportes ejecutivos</h2><div class="panel-subtitle">Lectura gerencial de salud del servicio, continuidad de clases y trazabilidad operacional.</div></div><span class="badge ok">Disponible</span></div><div class="panel-body"><div class="report-hero-grid"><div class="report-story"><h3>Historia que Visión ya puede contar</h3><p>Visión permite mostrar si las clases se están realizando, cuántas incidencias aparecen, cuánto se cierra automáticamente y dónde conviene pedir explicaciones operativas. Esta vista debe defender al área con datos, no con percepciones.</p><div class="service-gauge-grid"><div class="service-gauge"><div class="score">${num(salud)}%</div><small>índice visual de salud diaria</small></div><div class="service-gauge"><div class="score">${num(pctZoom)}%</div><small>cobertura Zoom observada</small></div><div class="service-gauge"><div class="score">${num(pctCierre)}%</div><small>cierre / normalización</small></div></div></div><div class="report-chart"><h3 style="margin:0 0 8px;">Indicadores del día</h3>${barRow_('Clases monitoreadas',mon,Math.max(mon,1))}${barRow_('Zoom activo',zoom,Math.max(mon,zoom,1))}${barRow_('Eventos registrados',ev,Math.max(ev,1))}${barRow_('Incidencias detectadas',inc,Math.max(mon,inc,1))}${barRow_('Incidencias cerradas',cerr,Math.max(inc,cerr,1))}</div></div><div class="module-grid"><div class="module-card"><h3>Reporte diario</h3><span class="badge ok">Operativo</span><p>Último snapshot: ${escapeHtml(s.generadoEn||'-')}</p></div><div class="module-card"><h3>Reporte de suspensiones / no inicio</h3><span class="badge media">Gerencial</span><p>Permite responder con evidencia cuando se critique continuidad o cumplimiento de clases.</p></div><div class="module-card"><h3>Reporte por profesor / asignatura</h3><span class="badge media">Próxima iteración</span><p>Tendencias por recurrencia, horario, asignatura, profesor y tipo de incidencia.</p></div><div class="module-card"><h3>Impacto organizacional</h3><span class="badge media">Estrategia</span><p>Horas humanas absorbidas, consultas evitadas y costo operativo reducido.</p></div></div></div></section>`}

function barRow_(label,value,max){
  const pct=Math.max(4,Math.min(100,Math.round((Number(value||0)/Math.max(Number(max||1),1))*100)));
  return `<div class="chart-row"><div class="chart-label">${escapeHtml(label)}</div><div class="chart-track"><div class="chart-fill" style="width:${pct}%"></div></div><div class="chart-value">${num(value)}</div></div>`;
}

function renderHero(s,e){return `<section class="hero"><div class="hero-main"><div class="hero-content"><div class="eyebrow"><span class="pulse"></span>Sistema en producción</div><h1>Visión</h1><div class="subtitle">${escapeHtml(s.subtitulo||'Centro Operativo Inteligente de Campus Virtual')}</div><div class="hero-strip"><span class="chip">Estado: <b>${escapeHtml(e.operativo||'-')}</b></span><span class="chip">Telegram: <b>${e.telegramActivo?'Activo':'Inactivo'}</b></span><span class="chip">Producción: <b>${e.modoProduccion?'Activa':'No activa'}</b></span><span class="chip">Triggers: <b>${e.triggersActivos||0}</b></span><span class="chip">Próxima actualización: <b id="refreshCounter">${REFRESH_SECONDS} s</b></span></div></div></div><div class="hero-bot"><div class="bot-wrap"><img src="${BOT_IMG}" alt="Visión"></div><div class="bot-caption"><b>Visión está operando.</b><br>Monitorea clases, detecta incidencias, envía alertas, mantiene bandeja y genera reporte diario.</div></div></section>`}
function renderStatusRow(s,e){return `<section class="status-row"><div class="status-card"><div class="status-label">Estado operativo</div><div class="status-value">${escapeHtml(e.operativo||'-')}</div><div class="status-detail">${escapeHtml(e.detalle||'')}</div></div><div class="status-card"><div class="status-label">Última actualización</div><div class="status-value">${escapeHtml(s.generadoEn||'-')}</div><div class="status-detail">Snapshot vivo desde Apps Script.</div></div><div class="status-card"><div class="status-label">Modo producción</div><div class="status-value">${e.modoProduccion?'ACTIVO':'INACTIVO'}</div><div class="status-detail">Alertas y reportes operativos habilitados.</div></div><div class="status-card"><div class="status-label">Capa automática</div><div class="status-value">${e.triggersActivos||0} triggers</div><div class="status-detail">Monitoreo, panel, actualización horaria y reporte.</div></div></section>`}
function renderKpis(k){const cards=[['Clases monitoreadas',k.clasesMonitoreadasHoy,'Cobertura diaria del motor'],['Zoom activo',k.clasesConZoomActivoHoy,'Clases activas al menos una vez'],['Eventos registrados',k.eventosRegistradosHoy,'Trazabilidad operativa'],['Incidencias detectadas',k.incidenciasDetectadasHoy,'Casos creados por Visión'],['Incidencias cerradas',k.incidenciasCerradasHoy,'Normalizadas o resueltas'],['Pendientes bandeja',k.pendientesBandeja,'Carga real de gestión'],['Críticas operativas',k.criticasOperativasAbiertas,'Riesgo actual'],['Errores notificación',k.erroresNotificacionHoy,'Telegram / reporte']];return `<section class="kpi-grid">${cards.map(c=>`<div class="kpi-card"><div class="kpi-label">${escapeHtml(c[0])}</div><div class="kpi-value">${num(c[1])}</div><div class="kpi-note">${escapeHtml(c[2])}</div></div>`).join('')}</section>`}
function renderMotor(m){const clases=m.clases||[],k=window.__visionKpis||{},live=clases.length>0,show=live?clases:obtenerClaseDemoMotor_();return `<section class="panel"><div class="panel-header"><div><h2 class="panel-title">Motor de monitoreo</h2><div class="panel-subtitle">Último ciclo: ${escapeHtml(m.timestamp||'-')} · Clases evaluadas: ${num(m.clasesEvaluadasUltimoCiclo)} · Zoom live: ${num(m.reunionesLiveZoomUltimoCiclo)}</div></div><span class="badge ${live?'ok':'media'}">${live?'Automatizado':'Módulo demostrativo'}</span></div><div class="panel-body">${!live?`<div class="empty" style="text-align:left;margin-bottom:14px;"><b>Módulo demostrativo:</b><br>En este momento no hay clases activas en vivo. Se muestra una simulación visual para evidenciar cómo Visión representa una clase cuando el motor detecta actividad real en Zoom.</div>`:''}<div class="class-compact-grid">${show.slice(0,12).map(c=>renderClaseMotor(c,!live)).join('')}</div>${show.length>12?`<div class="empty" style="text-align:left;margin-top:14px;">Se muestran las primeras 12 clases del ciclo para evitar scroll excesivo. El detalle completo queda disponible en la fuente viva.</div>`:''}${!live?`<div class="empty" style="text-align:left;margin-top:14px;"><b>Actividad real registrada hoy:</b><br>Visión ya monitoreó <b>${num(k.clasesMonitoreadasHoy)}</b> clases, registró <b>${num(k.eventosRegistradosHoy)}</b> eventos, envió <b>${num(k.recordatoriosEnviadosHoy)}</b> recordatorios y detectó <b>${num(k.incidenciasDetectadasHoy)}</b> incidencias.</div>`:''}</div></section>`}
function obtenerClaseDemoMotor_(){const now=new Date(),ini=new Date(now.getTime()-38*60000),fin=new Date(ini.getTime()+90*60000);return[{sigla:'2026 EET CR FIS17',programa:'ANUAL',asignatura:'Física',profesor:'Profesor Alexis Henríquez',fecha:formatearFechaDemo_(now),inicio:formatearHoraDemo_(ini),fin:formatearHoraDemo_(fin),inicioMsDemo:ini.getTime(),finMsDemo:fin.getTime(),meetingId:'89304922082',zoomActivo:true,participantes:31,agendados:46,estado:'INICIADA_NORMAL',severidad:'NORMAL',accionSugerida:'MANTENER_MONITOREO',observacion:'Clase activa con participación dentro de rango esperado. Visión mantiene monitoreo automático.'}]}
function renderClaseMotor(c,demo){const cls=estadoClass(c.estado);const pct=c.agendados>0?Math.round((Number(c.participantes||0)/Number(c.agendados||1))*100):0;return `<div class="vision-class-card compact ${cls}"><div class="vision-class-layout"><div class="vision-class-title">${escapeHtml(c.sigla||'-')}</div><div class="vision-class-status">${demo?'<span class="badge media">DEMO</span>':''}<span class="badge ${cls}">${escapeHtml(c.estado||'-')}</span></div><div class="vision-class-donut">${renderDonutParticipacion_(c.participantes,c.agendados)}</div><div class="class-mini-meta"><div><b>Participación:</b> ${num(c.participantes)} / ${num(c.agendados)} (${num(pct)}%)</div><div><b>Zoom:</b> ${c.zoomActivo?'Activo':'No activo'}</div>${c.inicio||c.fin?`<div><b>Horario:</b> ${escapeHtml(c.inicio||'-')} - ${escapeHtml(c.fin||'-')}</div>`:''}</div><details class="class-detail"><summary>Ver detalle operativo</summary><div class="class-detail-body">${renderBarraAvanceClase_(c)}<div class="vision-class-note">${escapeHtml(c.observacion||'')}</div></div></details></div></div>`}
function renderBarraAvanceClase_(c){const t=obtenerTiemposClase_(c);if(!t)return `<div class="vision-class-progress"><div class="empty" style="text-align:left;">No fue posible calcular el avance temporal de esta clase porque falta horario válido.</div></div>`;const a=calcularAvanceClase_(t.inicioMs,t.finMs);return `<div class="vision-class-progress vision-class-clock" data-inicio-ms="${t.inicioMs}" data-fin-ms="${t.finMs}"><div class="vision-class-time"><span><b>Tiempo transcurrido:</b> <span class="js-transcurrido">${a.transcurridoTexto}</span></span><span><b>Tiempo restante:</b> <span class="js-restante">${a.restanteTexto}</span></span></div><div class="vision-progress-label"><b>Avance de la clase</b><span class="js-pct">${a.pct}%</span></div><div class="vision-progress-track"><div class="vision-progress-fill js-fill" style="width:${a.pct}%;"></div><div class="vision-progress-dot js-dot" style="left:calc(${a.pct}% - 8px);"></div></div></div>`}
function renderDonutParticipacion_(p,a){p=Number(p||0);a=Number(a||0);const pct=a>0?Math.min(100,Math.round((p/a)*100)):0;return `<div class="vision-donut-box"><div class="vision-donut" style="background:conic-gradient(#1d7df2 ${pct*3.6}deg,#e6edf6 0deg);"><div class="vision-donut-inner">${pct}%</div></div><div class="vision-donut-caption">Participación<br>${p} / ${a}</div></div>`}
function renderBandeja(b){const items=b.items||[],r=b.resumen||{},live=b.liveResumen||{},k=window.__visionKpis||{},total=Number(b.total||0);let body='';if(items.length){body=`<div class="inc-list">${items.map(renderIncidencia).join('')}</div>${renderGestionHumanaDemo_('real')}`}else if(total>0||Number(k.incidenciasDetectadasHoy||0)>0){body=`<div class="management-grid"><div class="management-card"><h3>Pendientes de revisión</h3><div class="big">${num(total)}</div><p>Casos que requieren revisión humana o auditoría posterior, aunque Visión haya cerrado operacionalmente algunos eventos.</p></div><div class="management-card"><h3>Incidencias detectadas hoy</h3><div class="big">${num(k.incidenciasDetectadasHoy||0)}</div><p>Eventos convertidos en casos por Visión durante la jornada.</p></div><div class="management-card"><h3>Incidencias cerradas por Visión</h3><div class="big">${num(k.incidenciasCerradasHoy||0)}</div><p>Cierres automáticos o normalizados que igualmente pueden requerir justificación humana.</p></div></div>${renderGestionHumanaDemo_('demo')}`}else{body=`<div class="empty">No hay incidencias pendientes en bandeja.</div>${renderGestionHumanaDemo_('demo-vacio')}`}return `<section class="panel"><div class="panel-header"><div><h2 class="panel-title">Bandeja ejecutiva</h2><div class="panel-subtitle">Pendientes revisión: ${num(total)} · Incidencias hoy: ${num(k.incidenciasDetectadasHoy||0)} · Cerradas: ${num(k.incidenciasCerradasHoy||0)}</div></div><span class="badge ${total>0?'alta':'ok'}">${total>0?'Con gestión':'Sin pendientes activos'}</span></div><div class="panel-body">${body}</div></section>`}
function renderIncidencia(x){const cls=prioridadClass(x.prioridad);return `<div class="inc-card ${cls}"><div class="inc-top"><div><div class="inc-title">${escapeHtml(x.sigla||'-')}</div><div class="inc-note">${escapeHtml(x.estadoDetectado||'')} · ${escapeHtml(x.asignatura||'')}</div></div><span class="badge ${cls}">${escapeHtml(x.prioridad||'-')}</span></div><div class="inc-meta"><div><b>Profesor/a:</b> ${escapeHtml(x.profesor||'-')}</div><div><b>Horario:</b> ${escapeHtml(x.horario||'-')}</div><div><b>Participantes:</b> ${num(x.participantes)} / ${num(x.agendados)}</div><div><b>Responsable:</b> ${escapeHtml(x.responsable||'-')}</div></div><div class="inc-note">${escapeHtml(x.observacion||'')}</div></div>`}

function renderGestionHumanaDemo_(modo){
  const demo=modo!=='real';
  return `<div class="management-card" style="margin-top:14px;"><h3>${demo?'Ejemplo de cierre asistido':'Cierre asistido'}</h3><p>${demo?'Demostración funcional para mostrar al equipo cómo Implementación podría justificar y cerrar un caso sin salir de Visión.':'Registrar justificación antes de cerrar o escalar.'}</p><div class="management-actions"><select ${demo?'':'disabled'}><option>Clase inició tarde y luego se normalizó</option><option>Profesor usó sala distinta</option><option>Suspensión informada por Implementación</option><option>Error de configuración corregido</option><option>Requiere recuperación de clase</option></select><textarea ${demo?'placeholder="Ejemplo: Se contactó al profesor. La clase inició 7 minutos tarde y luego continuó normalmente. Se deja trazabilidad para reporte."':'disabled'}></textarea><button type="button" ${demo?'':'disabled'}>${demo?'Guardar comentario demo':'Guardar comentario'}</button></div></div>`;
}

function renderImpacto(i){const a=i.funcionesAbsorbidas||[],p=i.proximasAutomatizaciones||[];return `<section class="panel"><div class="panel-header"><div><h2 class="panel-title">Impacto organizacional</h2><div class="panel-subtitle">Visión no solo monitorea: absorbe trabajo repetitivo, crea evidencia y permite gestión por datos.</div></div><span class="badge media">Estrategia</span></div><div class="panel-body"><div class="impact-exec"><div class="impact-metric"><div class="big">24/7</div><p>Monitoreo automático sin depender de revisión manual permanente.</p></div><div class="impact-metric"><div class="big">1 fuente</div><p>Eventos, incidencias, recordatorios y salud operativa dentro de una misma vitrina.</p></div><div class="impact-metric"><div class="big">↓ fricción</div><p>Menos preguntas cruzadas entre Campus Virtual, Implementación y Comunicaciones.</p></div><div class="impact-metric"><div class="big">↑ evidencia</div><p>Reportes defendibles para gerencia frente a reclamos o percepciones de suspensión.</p></div></div><div class="function-grid"><div class="function-card"><h3>Funciones ya absorbidas</h3><div class="check-list">${a.map(x=>`<div class="check-item"><span class="check">✓</span><span>${escapeHtml(x)}</span></div>`).join('')}</div></div><div class="function-card next"><h3>Próximas funciones absorbibles</h3><div class="check-list">${p.map(x=>`<div class="check-item"><span class="check">→</span><span>${escapeHtml(x)}</span></div>`).join('')}</div><div class="empty" style="margin-top:14px;text-align:left;"><b>Conclusión:</b><br>${escapeHtml(i.conclusion||'')}</div></div></div></div></section>`}
function startImplementationHealthLoading_(){
  implLoadingIndex=0;
  setImplStatus_(IMPL_LOADING_STEPS[0]);
  setImplProgress_(8);
  renderImplementationPlaceholderDuringLoading_();
  stopImplementationHealthLoading_();
  implLoadingTimer=setInterval(()=>{
    implLoadingIndex=(implLoadingIndex+1)%IMPL_LOADING_STEPS.length;
    const pct=Math.min(92,8+implLoadingIndex*8.4);
    setImplStatus_(IMPL_LOADING_STEPS[implLoadingIndex]);
    setImplProgress_(pct);
  },850);
}
function stopImplementationHealthLoading_(){if(implLoadingTimer){clearInterval(implLoadingTimer);implLoadingTimer=null}}
function setImplProgress_(pct){pct=Math.max(0,Math.min(100,Number(pct||0)));const f=document.getElementById('implProgressFill'),r=document.getElementById('implRobot');if(f)f.style.width=pct+'%';if(r){r.style.left=pct+'%';r.style.opacity='1'}}
function setImplStatus_(text){const s=document.getElementById('implStatus');if(s)s.innerHTML=escapeHtml(text)}
function renderImplementationPlaceholderDuringLoading_(){const nodes=implNodeCatalog_();const cont=document.getElementById('implNodes');if(!cont)return;cont.classList.add('iconic');cont.innerHTML=nodes.map((n,i)=>`<div class="impl-node"><div class="impl-dot icon ${i<=implLoadingIndex?'ok':'pending'}">${n.icon}</div><div>${escapeHtml(n.short)}</div></div>`).join('')}
function renderImplementationHealthResult_(diag){
  stopImplementationHealthLoading_();
  const matriz=diag.matrizComparacion||[];
  const total=matriz.length||1;
  const ok=matriz.filter(x=>x.estado==='OK').length;
  const pendientes=matriz.filter(x=>x.estado==='FALTA_VALIDAR').length;
  const brechas=matriz.filter(x=>x.estado==='ERROR'||x.estado==='OBSERVAR').length;
  const pct=Math.round((ok/total)*100);
  setImplProgress_(pct);
  document.getElementById('implPercent').textContent=pct+'%';
  document.getElementById('implOk').textContent=ok;
  document.getElementById('implBrechas').textContent=brechas;
  document.getElementById('implPendientes').textContent=pendientes;
  setImplStatus_(`${diag.estadoGeneral||'-'} · ${diag.resumenComparacion||diag.resumenEvidencia||''}`);
  renderImplementationNodes_(matriz);
  renderImplementationEvidence_(diag);
  renderImplementationTable_(matriz);
  renderImplementationJson_(diag);
}
function renderImplementationNodes_(matriz){
  const cont=document.getElementById('implNodes');if(!cont)return;
  cont.classList.add('iconic');
  const catalog=implNodeCatalog_();
  cont.innerHTML=(matriz||[]).map((item,index)=>{const cls=implStateClass_(item.estado),sym=implNodeIcon_(item.nodo,catalog);return `<div class="impl-node"><div class="impl-dot icon ${cls}">${sym}</div><div>${escapeHtml(item.nodo||('Nodo '+(index+1)))}</div></div>`}).join('');
}
function renderImplementationEvidence_(diag){
  const cont=document.getElementById('implEvidence');if(!cont)return;
  const ok=(diag.verificacionesConfirmadas||[]).map(x=>`<span class="impl-pill ok">✓ ${escapeHtml(x)}</span>`).join('')||'<span class="impl-pill pending">Sin datos</span>';
  const pend=(diag.validacionesPendientes||[]).map(x=>`<span class="impl-pill pending">○ ${escapeHtml(x)}</span>`).join('')||'<span class="impl-pill ok">Sin pendientes</span>';
  const bre=(diag.brechasDetectadas||[]).map(x=>`<span class="impl-pill ${x.includes('ERROR')?'error':'warn'}">! ${escapeHtml(x)}</span>`).join('')||'<span class="impl-pill ok">Sin brechas</span>';
  cont.innerHTML=`<div class="impl-evidence-card"><h3>Verificado por API</h3><div class="impl-pill-list">${ok}</div></div><div class="impl-evidence-card"><h3>Pendiente avanzado</h3><div class="impl-pill-list">${pend}</div></div><div class="impl-evidence-card"><h3>Brechas</h3><div class="impl-pill-list">${bre}</div></div>`;
}
function renderImplementationTable_(matriz){
  const cont=document.getElementById('implTable');if(!cont)return;
  cont.innerHTML=`<table class="impl-table"><thead><tr><th>Nodo</th><th>Esperado desde CURSOS</th><th>Capturado Moodle/API</th><th>Estado</th></tr></thead><tbody>${(matriz||[]).map(item=>`<tr><td><span class="node-name">${escapeHtml(item.nodo||'')}</span><span class="criterion">${escapeHtml(item.criterio||'')}</span></td><td>${escapeHtml(item.esperadoCursos||'')}</td><td>${escapeHtml(item.capturadoMoodle||'')}</td><td><span class="impl-state ${implStateClass_(item.estado)}">${escapeHtml(item.estado||'')}</span></td></tr>`).join('')}</tbody></table>`;
}
function renderImplementationJson_(diag){
  const cont=document.getElementById('implJsonGrid');if(!cont)return;
  cont.innerHTML=`<div class="impl-json-box"><b>Datos originales desde CURSOS</b><pre>${escapeHtml(JSON.stringify(diag.datosCursos||{},null,2))}</pre></div><div class="impl-json-box"><b>Datos capturados desde Moodle/API</b><pre>${escapeHtml(JSON.stringify(diag.datosMoodle||{},null,2))}</pre></div>`;
}

function implNodeCatalog_(){
  return [
    {short:'CURSOS',icon:'📋',match:'CURSOS'},
    {short:'Curso',icon:'🏫',match:'Curso Moodle'},
    {short:'Grupo',icon:'👥',match:'Grupo Moodle'},
    {short:'Cohorte',icon:'🎯',match:'Cohorte Moodle'},
    {short:'Asistencia',icon:'📝',match:'Recurso asistencia'},
    {short:'Rest. asist.',icon:'🔐',match:'Restricciones asistencia'},
    {short:'Zoom',icon:'🎥',match:'Recurso Zoom'},
    {short:'HTML',icon:'🔗',match:'HTML Zoom'},
    {short:'Rest. Zoom',icon:'🛡️',match:'Restricciones Zoom'},
    {short:'Profesor',icon:'👨‍🏫',match:'Profesor en grupo'},
    {short:'Regla',icon:'⚙️',match:'Regla perfil→cohorte'}
  ];
}
function implNodeIcon_(nodo,catalog){
  const n=String(nodo||'');
  const hit=(catalog||implNodeCatalog_()).find(x=>n.includes(x.match)||x.match.includes(n));
  return hit?hit.icon:'•';
}

function implStateClass_(estado){if(estado==='OK')return'ok';if(estado==='FALTA_VALIDAR')return'pending';if(estado==='OBSERVAR')return'warn';if(estado==='ERROR')return'error';return'pending'}
function implStateSymbol_(estado){if(estado==='OK')return'✓';if(estado==='FALTA_VALIDAR')return'○';if(estado==='OBSERVAR')return'!';if(estado==='ERROR')return'×';return'○'}

function startClassClock(){if(classClockTimer)clearInterval(classClockTimer);classClockTimer=setInterval(actualizarRelojesClase_,1000)}
function actualizarRelojesClase_(){document.querySelectorAll('.vision-class-clock').forEach(clock=>{const ini=Number(clock.dataset.inicioMs||0),fin=Number(clock.dataset.finMs||0);if(!ini||!fin)return;const d=calcularAvanceClase_(ini,fin);const tr=clock.querySelector('.js-transcurrido'),re=clock.querySelector('.js-restante'),pct=clock.querySelector('.js-pct'),fill=clock.querySelector('.js-fill'),dot=clock.querySelector('.js-dot');if(tr)tr.textContent=d.transcurridoTexto;if(re)re.textContent=d.restanteTexto;if(pct)pct.textContent=d.pct+'%';if(fill)fill.style.width=d.pct+'%';if(dot)dot.style.left=`calc(${d.pct}% - 8px)`})}
function calcularAvanceClase_(ini,fin){const now=Date.now(),dur=Math.max(1,fin-ini),tr=Math.max(0,Math.min(now-ini,dur)),re=Math.max(0,fin-now),pct=Math.min(100,Math.max(0,Math.round((tr/dur)*100)));return{pct,transcurridoTexto:formatearDuracionClase_(tr),restanteTexto:formatearDuracionClase_(re)}}
function obtenerTiemposClase_(c){if(c.inicioMsDemo&&c.finMsDemo)return{inicioMs:Number(c.inicioMsDemo),finMs:Number(c.finMsDemo)};const f=parseFechaClase_(c.fecha);if(!f)return null;const ini=parseHoraSobreFecha_(f,c.inicio),fin=parseHoraSobreFecha_(f,c.fin);if(!ini||!fin)return null;if(fin.getTime()<=ini.getTime())fin.setDate(fin.getDate()+1);return{inicioMs:ini.getTime(),finMs:fin.getTime()}}
function parseFechaClase_(v){if(!v){const h=new Date();return new Date(h.getFullYear(),h.getMonth(),h.getDate())}const txt=String(v).trim();let m=txt.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(m)return new Date(Number(m[3]),Number(m[2])-1,Number(m[1]));m=txt.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);if(m)return new Date(Number(m[3]),Number(m[2])-1,Number(m[1]));const d=new Date(txt);if(!isNaN(d.getTime()))return new Date(d.getFullYear(),d.getMonth(),d.getDate());const h=new Date();return new Date(h.getFullYear(),h.getMonth(),h.getDate())}
function parseHoraSobreFecha_(f,h){if(!h)return null;const m=String(h).trim().match(/^(\d{1,2}):(\d{2})/);if(!m)return null;const d=new Date(f.getTime());d.setHours(Number(m[1]),Number(m[2]),0,0);return d}
function formatearDuracionClase_(ms){const t=Math.max(0,Math.floor(ms/1000)),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;if(h>0)return `${h} h ${m} min ${String(s).padStart(2,'0')} s`;if(m>0)return `${m} min ${String(s).padStart(2,'0')} s`;return `${s} s`}
function formatearHoraDemo_(d){return d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',hour12:false})}
function formatearFechaDemo_(d){return d.toLocaleDateString('es-CL')}
function prioridadClass(p){const t=String(p||'').toUpperCase();if(t==='ALTA'||t==='CRITICA')return 'alta';if(t==='BAJA')return 'baja';return 'media'}
function estadoClass(e){const t=String(e||'').toUpperCase();if(t.includes('NORMAL')||t==='FINALIZADA')return 'ok';if(t.includes('BAJA'))return 'baja';if(t.includes('NO_INICIADA')||t.includes('ANTICIPADA'))return 'alta';if(t.includes('PROXIMA')||t.includes('VENTANA'))return 'media';return 'media'}
function num(v){const n=Number(v||0);return isNaN(n)?'0':String(n)}
function escapeHtml(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
document.addEventListener('DOMContentLoaded',cargarVision);
</script>

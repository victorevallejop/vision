<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visión | Centro Operativo Inteligente</title>

  <style>
    :root {
      --bg: #071426;
      --bg2: #0b1f3a;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-soft: rgba(255, 255, 255, 0.84);
      --line: rgba(148, 184, 220, 0.25);
      --text: #102033;
      --muted: #64748b;
      --blue: #1d7df2;
      --blue2: #54b6ff;
      --cyan: #7ee7ff;
      --green: #1f9d63;
      --yellow: #b98000;
      --red: #d92d20;
      --orange: #f97316;
      --shadow: 0 22px 60px rgba(0,0,0,.22);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 10% 0%, rgba(84, 182, 255, .26), transparent 32%),
        radial-gradient(circle at 90% 10%, rgba(126, 231, 255, .16), transparent 35%),
        linear-gradient(135deg, var(--bg) 0%, var(--bg2) 55%, #06111f 100%);
      overflow-x: hidden;
    }

    .shell {
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) 360px;
      gap: 22px;
      align-items: stretch;
      min-height: 270px;
      margin-bottom: 20px;
    }

    .hero-main,
    .hero-bot,
    .panel {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(237,247,255,.90));
      color: var(--text);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-main {
      padding: 28px;
      position: relative;
    }

    .hero-main::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(29,125,242,.10), transparent 52%),
        radial-gradient(circle at 86% 15%, rgba(84,182,255,.20), transparent 28%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(29,125,242,.12);
      color: #0b4fa4;
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 16px;
    }

    .pulse {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(31,157,99,.55);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(31,157,99,.55); }
      70% { box-shadow: 0 0 0 10px rgba(31,157,99,0); }
      100% { box-shadow: 0 0 0 0 rgba(31,157,99,0); }
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 62px);
      line-height: .96;
      letter-spacing: -0.055em;
      color: #0b1f3a;
    }

    .subtitle {
      margin-top: 14px;
      max-width: 860px;
      font-size: 17px;
      line-height: 1.5;
      color: #425466;
    }

    .hero-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(110,148,190,.28);
      color: #28425e;
      font-weight: 700;
      font-size: 12px;
    }

    .hero-bot {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 270px;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 22%, rgba(84,182,255,.28), transparent 36%),
        linear-gradient(180deg, rgba(255,255,255,.95), rgba(230,245,255,.88));
    }

    .bot-wrap {
      flex: 1;
      display: grid;
      place-items: center;
      min-height: 185px;
    }

    .bot-wrap img {
      width: min(230px, 85%);
      filter: drop-shadow(0 18px 28px rgba(11,31,58,.25));
      animation: floatBot 3.4s ease-in-out infinite;
    }

    @keyframes floatBot {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .bot-caption {
      padding: 13px 14px;
      border-radius: 16px;
      background: rgba(11,31,58,.88);
      color: #eaf6ff;
      font-size: 13px;
      line-height: 1.4;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .status-card,
    .kpi-card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      color: var(--text);
      border-radius: 18px;
      box-shadow: 0 14px 36px rgba(0,0,0,.14);
      padding: 16px;
    }

    .status-label,
    .kpi-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 800;
    }

    .status-value {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 900;
      color: #0b1f3a;
    }

    .status-detail {
      margin-top: 6px;
      font-size: 12px;
      color: #64748b;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(130px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .kpi-card {
      min-height: 118px;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::after {
      content: "";
      position: absolute;
      right: -32px;
      top: -32px;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(29,125,242,.10);
    }

    .kpi-value {
      margin-top: 12px;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #0b1f3a;
    }

    .kpi-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .grid-main {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .panel {
      padding: 0;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(120,150,180,.18);
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(246,251,255,.92));
    }

    .panel-title {
      margin: 0;
      font-size: 19px;
      color: #0b1f3a;
      letter-spacing: -0.02em;
    }

    .panel-subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .panel-body {
      padding: 18px 20px 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .badge.operando,
    .badge.ok,
    .badge.baja {
      background: rgba(31,157,99,.12);
      color: #11643c;
      border-color: rgba(31,157,99,.22);
    }

    .badge.alta,
    .badge.alerta {
      background: rgba(249,115,22,.13);
      color: #a94700;
      border-color: rgba(249,115,22,.24);
    }

    .badge.critica {
      background: rgba(217,45,32,.12);
      color: #b42318;
      border-color: rgba(217,45,32,.25);
    }

    .badge.media,
    .badge.go {
      background: rgba(29,125,242,.12);
      color: #0b4fa4;
      border-color: rgba(29,125,242,.24);
    }

    .inc-list {
      display: grid;
      gap: 12px;
    }

    .inc-card {
      border: 1px solid rgba(120,150,180,.22);
      border-left: 6px solid var(--blue);
      border-radius: 16px;
      padding: 13px 14px;
      background: rgba(255,255,255,.86);
    }

    .inc-card.alta {
      border-left-color: var(--orange);
    }

    .inc-card.baja {
      border-left-color: var(--green);
    }

    .inc-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .inc-title {
      font-size: 14px;
      font-weight: 900;
      color: #0b1f3a;
      line-height: 1.25;
    }

    .inc-meta {
      margin-top: 7px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 12px;
      color: #475569;
      font-size: 12px;
    }

    .inc-meta b {
      color: #1e344d;
    }

    .inc-note {
      margin-top: 9px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.4;
    }

    .function-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .function-card {
      border: 1px solid rgba(120,150,180,.22);
      border-radius: 18px;
      background: rgba(255,255,255,.86);
      padding: 16px;
    }

    .function-card h3 {
      margin: 0 0 12px;
      color: #0b1f3a;
      font-size: 16px;
    }

    .check-list {
      display: grid;
      gap: 9px;
    }

    .check-item {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      color: #334155;
      font-size: 13px;
      line-height: 1.35;
    }

    .check {
      width: 19px;
      height: 19px;
      flex: 0 0 auto;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
      background: rgba(31,157,99,.14);
      color: #11643c;
    }

    .next .check {
      background: rgba(29,125,242,.12);
      color: #0b4fa4;
    }

    .empty {
      border: 1px dashed rgba(120,150,180,.38);
      border-radius: 16px;
      padding: 18px;
      color: #64748b;
      background: rgba(255,255,255,.58);
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
    }

    .footer {
      margin-top: 18px;
      color: rgba(255,255,255,.72);
      font-size: 12px;
      text-align: center;
    }

    .loading {
      display: grid;
      place-items: center;
      min-height: 220px;
      color: rgba(255,255,255,.82);
      font-weight: 700;
    }

    .error-box {
      padding: 18px;
      border-radius: 18px;
      background: rgba(217,45,32,.14);
      border: 1px solid rgba(217,45,32,.30);
      color: #fff;
    }

    /* Loader identitario de Visión */
    .loading-vision {
      display: grid;
      place-items: center;
      min-height: 520px;
      color: #fff;
    }

    .loading-vision-card {
      width: min(520px, calc(100vw - 42px));
      border: 1px solid rgba(148, 184, 220, 0.26);
      border-radius: 28px;
      padding: 34px 30px 28px;
      background:
        radial-gradient(circle at 50% 12%, rgba(84,182,255,.22), transparent 44%),
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(230,245,255,.88));
      box-shadow: 0 26px 70px rgba(0,0,0,.28);
      color: #0b1f3a;
      text-align: center;
    }

    .loading-vision-bot-stage {
      position: relative;
      width: 190px;
      max-width: 68%;
      margin: 0 auto;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 18px 28px rgba(11,31,58,.22));
    }

    .loading-vision-bot-base,
    .loading-vision-bot-fill {
      width: 100%;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .loading-vision-bot-base {
      opacity: .18;
      filter: grayscale(.18) saturate(.55);
      transform: scale(.96);
    }

    .loading-vision-bot-fill-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      clip-path: inset(100% 0 0 0);
      transition: clip-path .18s linear;
    }

    .loading-vision-bot-fill {
      opacity: 1;
      filter: saturate(1.15);
      transform: scale(.96);
    }

    .loading-vision-bot-glow {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 82%;
      height: 18px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(84,182,255,.55), rgba(84,182,255,0) 70%);
      opacity: .25;
      transition: opacity .18s linear, bottom .18s linear;
      pointer-events: none;
    }

    .loading-vision-title {
      margin-top: 18px;
      font-size: 28px;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .loading-vision-subtitle {
      margin-top: 6px;
      color: #607186;
      font-size: 14px;
      line-height: 1.4;
    }

    .loading-percent {
      margin-top: 18px;
      font-size: 42px;
      font-weight: 950;
      letter-spacing: -0.05em;
      color: #0b1f3a;
    }

    .loading-bar {
      width: 100%;
      height: 13px;
      margin-top: 14px;
      border-radius: 999px;
      background: #e6edf6;
      overflow: hidden;
      position: relative;
    }

    .loading-bar-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #1d7df2, #54b6ff);
      position: relative;
      transition: width .18s linear;
      overflow: hidden;
    }

    .loading-bar-fill::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,.25) 0px,
        rgba(255,255,255,.25) 7px,
        rgba(255,255,255,0) 7px,
        rgba(255,255,255,0) 14px
      );
      animation: stripesMoveVision 1.1s linear infinite;
    }

    .loading-vision-foot {
      margin-top: 14px;
      color: #64748b;
      font-size: 12px;
    }

    /* Card ejecutiva de clase */
    .vision-class-card {
      --accent: var(--blue);
      border: 1px solid rgba(120,150,180,.22);
      border-left: 8px solid var(--accent);
      border-radius: 20px;
      padding: 18px 18px 16px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 12px 28px rgba(11,31,58,.08);
    }

    .vision-class-card.alta {
      --accent: var(--orange);
    }

    .vision-class-card.baja {
      --accent: var(--green);
    }

    .vision-class-card.ok {
      --accent: var(--blue);
    }

    .vision-class-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(230px, .85fr) 140px;
      grid-template-areas:
        "title title status"
        "subtitle subtitle donut"
        "leftmeta rightmeta donut"
        "time time time"
        "progress progress progress"
        "note note note";
      gap: 12px 18px;
      align-items: start;
    }

    .vision-class-title {
      grid-area: title;
      font-size: 24px;
      font-weight: 950;
      color: #061a32;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .vision-class-subtitle {
      grid-area: subtitle;
      font-size: 17px;
      color: #607186;
      line-height: 1.35;
    }

    .vision-class-status {
      grid-area: status;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .vision-class-donut {
      grid-area: donut;
      display: grid;
      justify-items: center;
      align-content: start;
      padding-top: 4px;
    }

    .vision-class-meta-left {
      grid-area: leftmeta;
      display: grid;
      gap: 12px;
    }

    .vision-class-meta-right {
      grid-area: rightmeta;
      display: grid;
      gap: 12px;
    }

    .vision-class-meta-item {
      font-size: 16px;
      color: #334155;
      line-height: 1.35;
    }

    .vision-class-meta-item b {
      color: #061a32;
      font-weight: 900;
    }

    .vision-class-time {
      grid-area: time;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 16px;
      color: #334155;
      padding-top: 4px;
    }

    .vision-class-time b {
      color: #061a32;
      font-weight: 900;
    }

    .vision-class-progress {
      grid-area: progress;
    }

    .vision-class-note {
      grid-area: note;
      border-top: 1px solid rgba(120,150,180,.22);
      padding-top: 14px;
      color: #607186;
      font-size: 15px;
      line-height: 1.45;
    }

    .vision-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #64748b;
      margin-bottom: 7px;
    }

    .vision-progress-label b {
      color: #334155;
    }

    .vision-progress-track {
      height: 14px;
      border-radius: 999px;
      background: #e6edf6;
      overflow: visible;
      position: relative;
    }

    .vision-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #b77900, #f4b63f);
      position: relative;
      overflow: hidden;
      transition: width .35s linear;
    }

    .vision-progress-fill::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,.22) 0px,
        rgba(255,255,255,.22) 7px,
        rgba(255,255,255,0) 7px,
        rgba(255,255,255,0) 14px
      );
      animation: stripesMoveVision 1.2s linear infinite;
    }

    .vision-progress-dot {
      position: absolute;
      top: 50%;
      width: 17px;
      height: 17px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: #b77900;
      border: 3px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,.16);
      transition: left .35s linear;
    }

    .vision-donut-box {
      display: grid;
      place-items: center;
      gap: 7px;
    }

    .vision-donut {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: conic-gradient(#1d7df2 0deg, #e6edf6 0deg);
      display: grid;
      place-items: center;
    }

    .vision-donut-inner {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      color: #061a32;
      font-weight: 950;
      font-size: 20px;
    }

    .vision-donut-caption {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      line-height: 1.18;
    }

    @keyframes stripesMoveVision {
      from { background-position: 0 0; }
      to { background-position: 24px 0; }
    }

    @media (max-width: 1240px) {
      .kpi-grid {
        grid-template-columns: repeat(4, minmax(150px, 1fr));
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .hero-bot {
        min-height: auto;
        flex-direction: row;
        align-items: center;
      }

      .bot-wrap {
        min-height: 120px;
        flex: 0 0 180px;
      }

      .bot-wrap img {
        width: 145px;
      }
    }

    @media (max-width: 920px) {
      .status-row,
      .grid-main,
      .function-grid {
        grid-template-columns: 1fr;
      }

      .kpi-grid {
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }

      .vision-class-layout {
        grid-template-columns: 1fr 120px;
        grid-template-areas:
          "title status"
          "subtitle donut"
          "leftmeta donut"
          "rightmeta donut"
          "time time"
          "progress progress"
          "note note";
      }

      .vision-class-title {
        font-size: 21px;
      }

      .vision-class-subtitle {
        font-size: 15px;
      }
    }

    @media (max-width: 640px) {
      .vision-class-layout {
        grid-template-columns: 1fr;
        grid-template-areas:
          "title"
          "subtitle"
          "status"
          "donut"
          "leftmeta"
          "rightmeta"
          "time"
          "progress"
          "note";
      }

      .vision-class-status {
        justify-content: flex-start;
      }

      .vision-class-donut {
        justify-items: start;
      }

      .vision-class-time {
        display: grid;
        gap: 8px;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 18px, 1480px);
        padding-top: 10px;
      }

      .hero-main {
        padding: 20px;
      }

      .kpi-grid {
        grid-template-columns: 1fr;
      }

      .inc-meta {
        grid-template-columns: 1fr;
      }

      .hero-bot {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div id="app" class="loading">
      Cargando Visión...
    </div>

    <div class="footer">
      Visión | Centro Operativo Inteligente · Campus Virtual · Actualización automática
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwkrOVT4hZ-vKM7avoJKaZYyJpygSr-QV7oRILybqKa5moZhp7pI8h_MQM_YV9tfwcd/exec';
    const BOT_IMG = 'assets/vision-bot.png';
    const REFRESH_SECONDS = 180;

    let refreshLeft = REFRESH_SECONDS;
    let refreshTimer = null;
    let classClockTimer = null;
    let loadingTimer = null;
    let loadingProgress = 0;

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = '__visionCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

        window[callbackName] = function(data) {
          try {
            resolve(data);
          } finally {
            delete window[callbackName];
            script.remove();
          }
        };

        const script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') +
          'action=visionExecutiveSnapshot' +
          '&callback=' + encodeURIComponent(callbackName) +
          '&_=' + Date.now();

        script.onerror = function() {
          delete window[callbackName];
          script.remove();
          reject(new Error('No fue posible conectar con el endpoint de Visión.'));
        };

        document.body.appendChild(script);
      });
    }

    async function cargarVision() {
      const app = document.getElementById('app');
      const esPrimeraCarga = app.dataset.loaded !== '1';

      try {
        if (esPrimeraCarga) {
          mostrarCargaVision_();
        }

        const data = await jsonp(GAS_URL);

        if (!data || !data.ok) {
          throw new Error((data && data.error) || 'Respuesta inválida del backend.');
        }

        if (esPrimeraCarga) {
          completarCargaVision_(() => {
            app.dataset.loaded = '1';
            render(data);
          });
        } else {
          render(data);
        }

        refreshLeft = REFRESH_SECONDS;

      } catch (err) {
        detenerCargaVision_();

        app.className = '';
        app.innerHTML = `
          <div class="error-box">
            <strong>No fue posible cargar Visión.</strong><br><br>
            ${escapeHtml(err.message)}
          </div>
        `;
      }
    }

    function mostrarCargaVision_() {
      const app = document.getElementById('app');

      loadingProgress = 0;

      app.className = 'loading-vision';
      app.innerHTML = `
        <div class="loading-vision-card">
          <div class="loading-vision-bot-stage">

            </div>

            <div id="loadingVisionBotGlow" class="loading-vision-bot-glow"></div>
          </div>

          <div class="loading-vision-title">
            Cargando Visión

            Inicializando centro operativo, métricas, alertas y bandeja ejecutiva.
          </div>

          <div id="loadingVisionPct" class="loading-percent">
            0%
          </div>

          <div class="loading-bar">
            <div id="loadingVisionFill" class="loading-bar-fill"></div>
          </div>

          <div class="loading-vision-foot">
            Preparando snapshot ejecutivo en tiempo real...
          </div>
        </div>
      `;

      detenerCargaVision_();

      loadingTimer = setInterval(() => {
        if (loadingProgress < 92) {
          const salto = Math.floor(Math.random() * 5) + 2;
          loadingProgress = Math.min(92, loadingProgress + salto);
          actualizarCargaVision_(loadingProgress);
        }
      }, 140);
    }

    function completarCargaVision_(callback) {
      detenerCargaVision_();

      const inicio = loadingProgress;
      const duracion = 420;
      const t0 = performance.now();

      function animar(t) {
        const avance = Math.min(1, (t - t0) / duracion);
        const pct = Math.round(inicio + (100 - inicio) * avance);

        actualizarCargaVision_(pct);

        if (avance < 1) {
          requestAnimationFrame(animar);
        } else {
          setTimeout(callback, 160);
        }
      }

      requestAnimationFrame(animar);
    }

    function detenerCargaVision_() {
      if (loadingTimer) {
        clearInterval(loadingTimer);
        loadingTimer = null;
      }
    }

    function actualizarCargaVision_(pct) {
      const p = Math.max(0, Math.min(100, Number(pct || 0)));

      const pctEl = document.getElementById('loadingVisionPct');
      const fillEl = document.getElementById('loadingVisionFill');
      const botFillWrap = document.getElementById('loadingVisionBotFillWrap');
      const botGlow = document.getElementById('loadingVisionBotGlow');

      if (pctEl) pctEl.textContent = p + '%';
      if (fillEl) fillEl.style.width = p + '%';

      if (botFillWrap) {
        const topInset = 100 - p;
        botFillWrap.style.clipPath = `inset(${topInset}% 0 0 0)`;
      }

      if (botGlow) {
        botGlow.style.opacity = String(0.25 + (p / 100) * 0.65);
        botGlow.style.bottom = `${Math.max(0, p * 0.72)}%`;
      }
    }

      refreshTimer = setInterval(() => {
        refreshLeft--;

        const el = document.getElementById('refreshCounter');
        if (el) el.textContent = refreshLeft + ' s';

        if (refreshLeft <= 0) {
          cargarVision();
          refreshLeft = REFRESH_SECONDS;

      }, 1000);
    }

    function actualizarRelojesClase_() {
      const clocks = document.querySelectorAll('.vision-class-clock');

      clocks.forEach(clock => {
        const inicioMs = Number(clock.dataset.inicioMs || 0);
        const finMs = Number(clock.dataset.finMs || 0);

        if (!inicioMs || !finMs) return;

        const data = calcularAvanceClase_(inicioMs, finMs);

        const transcurrido = clock.querySelector('.js-transcurrido');
        const restante = clock.querySelector('.js-restante');
        const pct = clock.querySelector('.js-pct');
        const fill = clock.querySelector('.js-fill');
        const dot = clock.querySelector('.js-dot');

        if (transcurrido) transcurrido.textContent = data.transcurridoTexto;
        if (restante) restante.textContent = data.restanteTexto;
        if (pct) pct.textContent = data.pct + '%';
        if (fill) fill.style.width = data.pct + '%';
        if (dot) dot.style.left = `calc(${data.pct}% - 8px)`;
      });
    }

    function calcularAvanceClase_(inicioMs, finMs) {
      const ahora = Date.now();
      const duracion = Math.max(1, finMs - inicioMs);

      const transcurridoMs = Math.max(0, Math.min(ahora - inicioMs, duracion));
      const restanteMs = Math.max(0, finMs - ahora);
      const pct = Math.min(100, Math.max(0, Math.round((transcurridoMs / duracion) * 100)));

      return {
        pct,
        transcurridoTexto: formatearDuracionClase_(transcurridoMs),
        restanteTexto: formatearDuracionClase_(restanteMs)
      };
    }

    function obtenerTiemposClase_(c) {
      if (c.inicioMsDemo && c.finMsDemo) {
        return {
          inicioMs: Number(c.inicioMsDemo),
          finMs: Number(c.finMsDemo)
        };
      }

      const fechaBase = parseFechaClase_(c.fecha);
      if (!fechaBase) return null;

      const inicio = parseHoraSobreFecha_(fechaBase, c.inicio);
      const fin = parseHoraSobreFecha_(fechaBase, c.fin);

      if (!inicio || !fin) return null;

      if (fin.getTime() <= inicio.getTime()) {
        fin.setDate(fin.getDate() + 1);
      }

      return {
        inicioMs: inicio.getTime(),
        finMs: fin.getTime()
      };
    }

    function parseFechaClase_(valor) {
      if (!valor) {
        const hoy = new Date();
        return new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
      }

      const txt = String(valor).trim();

      let m = txt.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (m) {
        return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
      }

      m = txt.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
      if (m) {
        return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
      }

      const d = new Date(txt);
      if (!isNaN(d.getTime())) {
        return new Date(d.getFullYear(), d.getMonth(), d.getDate());
      }

      const hoy = new Date();
      return new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
    }

    function parseHoraSobreFecha_(fechaBase, valorHora) {
      if (!valorHora) return null;

      const txt = String(valorHora).trim();
      const m = txt.match(/^(\d{1,2}):(\d{2})/);

      if (!m) return null;

      const d = new Date(fechaBase.getTime());
      d.setHours(Number(m[1]), Number(m[2]), 0, 0);

      return d;
    }

    function formatearDuracionClase_(ms) {
      const totalSeg = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(totalSeg / 3600);
      const m = Math.floor((totalSeg % 3600) / 60);
      const s = totalSeg % 60;

      if (h > 0) {
        return `${h} h ${m} min ${String(s).padStart(2, '0')} s`;
      }

      if (m > 0) {
        return `${m} min ${String(s).padStart(2, '0')} s`;
      }

      return `${s} s`;
    }

    function formatearHoraDemo_(d) {
      return d.toLocaleTimeString('es-CL', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
    }

    function formatearFechaDemo_(d) {
      return d.toLocaleDateString('es-CL');
    }

    function prioridadClass(p) {
      const t = String(p || '').toUpperCase();
      if (t === 'ALTA' || t === 'CRITICA') return 'alta';
      if (t === 'BAJA') return 'baja';
      return 'media';
    }

    function estadoClass(e) {
      const t = String(e || '').toUpperCase();

      if (t.includes('NORMAL') || t === 'FINALIZADA') return 'ok';
      if (t.includes('BAJA')) return 'baja';
      if (t.includes('NO_INICIADA') || t.includes('ANTICIPADA')) return 'alta';
      if (t.includes('PROXIMA') || t.includes('VENTANA')) return 'media';

      return 'media';
    }

    function num(v) {
      const n = Number(v || 0);
      return isNaN(n) ? '0' : String(n);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    document.addEventListener('DOMContentLoaded', cargarVision);
  </script>
</body>
</html>
